id: components
title: CoSAI Risk Map components
description:
  - 'The CoSAI Risk Map categorizes AI development into four areas:'
  - - Data
    - Infrastructure
    - Model
    - Application
  - >
    This framing represents the broadened scope of AI development compared to traditional
    software development. In addition to the familiar code, infrastructure, and application
    components, AI introduces the complexities of data, training, and model development.
    Understanding how these dimensions work together is crucial to assessing the unique
    risks of AI development. The controls suggested to address the risks across this
    framing all align with the six core elements of Google's SAIF.
categories:
  - id: componentsInfrastructure
    title: Infrastructure components
    description:
      - >
        The data components of AI development depend on the infrastructure underpinning
        with secure hardware, resilient code, data storage, and development and deployment
        platforms. Risks to this infrastructure can affect model and framework code,
        model and data storage, and model serving.
      - >
        Attackers could try to poison, manipulate, or steal the data, models, or weights
        held in storage. If the model source code, dependencies, or any tools used
        to create and deploy them aren’t protected, attackers could tamper with them
        to create drastic changes to the model’s behavior, causing major security issues.
      - >
        The first step in securing these infrastructure components is to apply traditional
        security practices to the physical environments used for training, storage
        and serving. Host and network security is needed to restrict potential attackers.
        Authentication and authorization for any access to the physical environments
        is essential. Software supply chain integrity for all traditional software
        dependencies should be considered.
    subcategory:
      - id: componentsData
        title: Data components
        description:
          - >
            Traditional software development follows predictable instructions: the user
            inputs trigger static code, which determines the logic driving outcomes of the
            program. In AI development, data takes on aspects of the role previously played
            by code—which transforms the security and privacy risks.
          - >
            AI models are dynamic systems. They rely not only on their static code and user
            inputs, but also on learned patterns encoded in their internal parameters, referred
            to as 'model weights.' These weights are derived from the model's training
            data and training processes.
          - >
            Compromising these model weights can have a significant impact on the model's
            behavior and outputs. This makes attacks on model weights as potentially damaging
            as attacks targeting the code in traditional software development.
      - id: componentsDeployment
        title: Deployment components
        description:
          - >
            Infrastructure that stores trained model artifacts and serves them for inference.
            Distinct from training infrastructure (which produces models) and from data
            infrastructure (which feeds training), model deployment infrastructure carries
            the production-time risks of model integrity, availability, and access control.
      - id: componentsRegistries
        title: Registry components
        description:
          - >
            Registration-authority, catalog, and discovery infrastructure for AI/ML
            assets. Distinct from deployment infrastructure (which stores and serves
            artifacts), registries hold the authoritative metadata and pointers that
            inform which asset to select and how to obtain it. They share a common
            threat surface — metadata tampering, namespace governance, publisher
            identity, and provenance attacks — regardless of what they catalog,
            spanning both model registries and tool registries.
      - id: componentsIdentity
        title: Identity components
        description:
          - >
            The identity and access-management plane: the authorities that authenticate
            principals, issue and validate the tokens other components rely on, and
            evaluate authorization policy. Distinct from deployment infrastructure (which
            hosts and serves workloads) and from registries (which catalog assets),
            identity components are the trust root every other component's authentication
            and authorization decisions are grounded in.
  - id: componentsModel
    title: Model components
    description:
      - >
        The central concept for AI-powered applications is the model. The purpose of
        a model is to apply the  statistical patterns extracted from training data
        and use these to generate new text, images, videos, or other output data (also
        known as inferences) from input data provided to it.
    subcategory:
      - id: componentsModelTraining
        title: Model training components
        description:
          - >
            Primary processes and artifacts leveraged in the training of models from source
            data
            and algorithms.
      - id: componentsModelCore
        title: Model core
        description:
          - >
            The trained model artifact itself — the pairing of code and weights produced
            by
            training and consumed at inference. Distinct from the training-time processes
            that produce it and from the orchestration tooling that augments it at runtime.
      - id: componentsOrchestration
        title: Orchestration
        description:
          - >
            Beyond its core reasoning and planning capabilities, an agent relies on a  variety
            of external components to access information, process data, and  execute actions.
            This process is called orchestration because it involves  managing and coordinating
            a variety of independent services and data sources  to achieve a single, complex
            task. These resources provide the agent with its  memory, its ability to act
            in the physical world, and the specific knowledge  needed to complete tasks.
            Securing these external components is critical,  since they represent key interaction
            points that can be targeted by attackers  to manipulate the agent’s behavior.
  - id: componentsApplication
    title: Application components
    description:
      - >
        Users interact with AI models differently than with traditional algorithm-based
        searches and services. Some AI models act in response to more natural user
        prompting, with wording and phrasing choices directly affecting how an LLM,
        for example, infers requests, actions, and intent. When compared to interactions
        processed through an API, this more direct interaction introduces new avenues
        of risk, such as prompt injection.
      - >
        Additionally, Generative AI models are increasingly used as agents or assistants
        that can act on a user’s behalf to provide helpful functions. In these situations,
        AI models are interacting with other systems to get information or run specialized
        computational functions, including state-changing actions. While this networking
        opens up exciting possibilities of more complex behaviors, each connection
        also increases the potential impact of a successful attack on the AI model
        or network.
    subcategory:
      - id: componentsAgent
        title: Agent components
        description:
          - >
            Agentic systems differ from other AI systems in their ability to take autonomous
            actions.
      - id: componentsApplicationCore
        title: Application core
        description:
          - >
            The application that consumes the model and the input/output handling that
            filters traffic crossing the application boundary. Agent components add
            autonomous reasoning and tool-use capabilities on top of this surface.
  - id: componentsTools
    title: Tools components
    description:
      - >
        External tools are third-party services an AI system integrates with but does
        not own — a distinct trust domain from the system's own infrastructure, model,
        and application tiers. This category collects the tool and tool-authorization
        components: the runtime tool services agents invoke, and the control-plane
        components that mediate and authorize that access.
    subcategory:
      - id: componentsToolControls
        title: Tool control plane
        description:
          - >
            The policy-enforcement and authorization components that mediate access to
            external tools, distinct from the tool services themselves.
      - id: componentsToolCore
        title: Tool data plane
        description:
          - >
            The runtime tool services an agent invokes and their request/response
            handling, distinct from the control-plane components that authorize access
            to them.
components:
  - id: componentDataSources
    title: Data Sources
    description:
      - >
        The original sources or repositories from which data is gathered for potential
        use in training an AI model. These can include databases, APIs, web scraping,
        or even sensor data. The quality and diversity of data sources significantly
        impact the model's capabilities.
    category: componentsInfrastructure
    subcategory: componentsData
    edges:
      to:
        - componentDataFilteringAndProcessing
      from: []
  - id: componentDataFilteringAndProcessing
    title: Data Filtering and Processing
    description:
      - >
        The processes of cleaning, transforming, and preparing raw data from various
        sources to make it suitable for training. This may include labeling data, removing
        duplicates or errors, and even generating new synthetic data to enhance the
        model's learning.
    category: componentsInfrastructure
    subcategory: componentsData
    edges:
      to:
        - componentTrainingData
      from:
        - componentDataSources
  - id: componentTrainingData
    title: Training Data
    description:
      - >
        The final, curated subset of data that is fed into the AI model during the training
        process. This data is used to adjust the model's internal parameters, enabling
        it to learn patterns and make predictions or inferences.
    category: componentsInfrastructure
    subcategory: componentsData
    edges:
      to:
        - componentDataStorage
      from:
        - componentDataFilteringAndProcessing
  - id: componentDataStorage
    title: Data Storage Infrastructure
    description:
      - >
        Storage for training data. Training data is stored from ingestion through filtering
        and usage during training.
    category: componentsInfrastructure
    subcategory: componentsData
    edges:
      to:
        - componentModelTrainingTuning
      from:
        - componentTrainingData
  - id: componentModelFrameworksAndCode
    title: Model Frameworks and Code
    description:
      - >
        The code and frameworks necessary to train and use a model. Model code defines
        the model architecture and number and types of layers in the model. Framework
        code implements the steps for each layer to train and evaluate the model. The
        framework code is generally necessary not just for training a model, but also
        required to run inferences (i.e., make predictions) when the model is in use.
        Usually framework code is shipped separately from the model itself and needs
        to be installed to use the model.
    category: componentsModel
    subcategory: componentsModelTraining
    edges:
      to:
        - componentModelTrainingTuning
  - id: componentModelEvaluation
    title: Model Evaluation
    description:
      - >
        The process of testing the model against new data to see how well it performs
        (evaluation).  Evaluation happens in two stages: during the training
        process, when each checkpointed update to the model is evaluated, and after
        the model is trained, to assess how well it performs at its intended purpose.
    category: componentsModel
    subcategory: componentsModelTraining
    edges:
      to:
        - componentModelTrainingTuning
      from:
        - componentTheModel
  - id: componentModelTrainingTuning
    title: Training and Tuning
    description:
      - >
        The process of teaching a model to extract the correct patterns and inferences
        from data by adjusting the probability of a given outcome (training) and adjusting
        a smaller set of probabilities to tune a model to a specific task (tuning).
        Given the enormous cost of training, many model creators take a preexisting
        model and tune it to their needs, by focusing only on the training related
        to a specific type of task.
    category: componentsModel
    subcategory: componentsModelTraining
    edges:
      to:
        - componentTheModel
        - componentModelRegistry
      from:
        - componentModelEvaluation
        - componentModelFrameworksAndCode
        - componentDataStorage
  - id: componentModelStorage
    title: Model Storage
    description:
      - >
        Storage for the model artifact itself — weights, checkpoints, and serialized
        model files. Model storage refers to multiple stages in the development process:
      - - >
          Local storage during training, in which each checkpoint is stored until overwritten.
        - >
          Published storage, after training is completed and the model artifact is uploaded
          to an artifact repository (object storage, model registry-backed storage, or
          vendor-managed artifact endpoints).
      - >
        Note: Many model consumers use remote models served by API. Those model consumers
        that store models themselves, though, should consider the same Model Storage
        risks that apply to model creators.
      - >
        The discovery, cataloging, and metadata layer that consumers query to find which
        model to retrieve is handled separately by {{componentModelRegistry}}; storage's
        scope is strictly the artifact bytes and their lifecycle.
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to:
        - componentTheModel
      from:
        - componentModelRegistry
  - id: componentModelServing
    title: Model Serving Infrastructure
    description:
      - >
        The systems and process to deploy a model in production, making them available
        for services and applications.
      - >
        Note: Many model consumers use remote models served via API. Those that serve
        their own models, though, should consider the same Model Serving risks that
        apply to model creators.
      - When serving infrastructure is deployed remotely or as a shared,
        multi-tenant service rather than on a local or single-operator host, its
        security posture shifts to the hosting environment's cloud infrastructure
        controls. Such deployments depend on tenant isolation, centrally managed
        identity, and access control at the platform layer to prevent cross-tenant
        access to served endpoints and model artifacts.
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to:
        - componentTheModel
        - componentSecureLogging
        - componentApplicationNetworkPolicyEnforcementPoint
      from:
        - componentModelRegistry
        - componentIsolationRuntime
        - componentApplicationNetworkPolicyEnforcementPoint
  - id: componentModelRegistry
    title: Model Registry and Marketplace
    description:
      - >
        The infrastructure that serves as the registration authority for AI/ML models:
        cataloging and indexing them, holding the authoritative metadata (model cards,
        provenance records, evaluation results, licensing terms, version history), and
        publishing authoritative pointers to the storage endpoints where artifacts are
        retrieved. This includes model hubs (e.g., HuggingFace Hub), model marketplaces,
        enterprise model catalogs, and model discovery APIs.
      - >
        Model registries serve a fundamentally different function from model storage
        ({{componentModelStorage}}). Storage holds the physical artifacts (weights,
        checkpoints, binaries); the registry references those artifacts via authoritative
        pointers and holds the metadata that informs selection. The threat models are
        distinct: attacks on storage target artifact integrity ({{riskModelSourceTampering}},
        {{riskModelDeploymentTampering}}), while attacks on a registry target the metadata
        that informs model selection — model cards, evaluation claims, provenance records,
        and licensing assertions. A compromised registry can direct consumers to a
        backdoored model ({{riskInsecureIntegratedComponent}}) by altering its evaluation
        scores ({{riskEvaluationBenchmarkManipulation}}), misrepresenting its training-data
        provenance, or changing its licensing terms — even when the model artifacts in
        storage remain untouched.
      - >
        Registries are decoupled from storage: the same artifact in storage may be
        referenced by multiple registries from different sector-focused authorities
        (compliance-flavored, performance-flavored, licensing-flavored), and registries
        are not required in all deployments — internal-only or air-gapped environments
        may operate without any public registry layer. Controls targeting registry
        integrity apply only where a registry is part of the deployment.
    category: componentsInfrastructure
    subcategory: componentsRegistries
    edges:
      to:
        - componentModelServing
        - componentTheModel
        - componentModelStorage
      from:
        - componentModelTrainingTuning
  - id: componentTheModel
    title: The Model
    description:
      - >
        A pairing of code and weights, created with data during a training process.
        In the CoSAI Risk Map, the model is represented as the result of the output
        of the Data Components being trained, stored, and served using the Infrastructure
        Components. A model is ultimately useful when deployed in applications, using
        Application Components.
    category: componentsModel
    subcategory: componentsModelCore
    edges:
      to:
        - componentModelEvaluation
        - componentAgentInputHandling
        - componentOrchestrationInputHandling
      from:
        - componentModelTrainingTuning
        - componentModelServing
        - componentModelStorage
        - componentModelRegistry
        - componentAgentOutputHandling
        - componentOrchestrationOutputHandling
  - id: componentApplication
    title: Application
    description:
      - >
        The application, product, or feature that uses an AI model for functionality.
        These applications might be directly user-facing, as in the case of a customer
        service chatbot, or the “user” might be a service within an organization,
        querying the model to power an upstream process. If an application has the
        ability to execute tools on behalf of its user, it is sometimes referred to
        as an Agent.
    category: componentsApplication
    subcategory: componentsApplicationCore
    edges:
      to:
        - componentApplicationOutputHandling
      from:
        - componentApplicationInputHandling
  - id: componentApplicationOutputHandling
    title: Output Handling
    description:
      - >
        Similar to input handling, output handling components filter, sanitize, and
        protect against unwanted, unexpected or dangerous outputs from a model. Output
        handling is a major line of defense against various risks and an area primed
        for more development.
      - >
        This is also the application's own outbound gate: any influence the application
        directs outward — including handing off to an agent it hosts — passes through
        this component rather than reaching another tier's core directly, mirroring
        the discipline this corpus already applies to reaching cores through their
        own input gate.
    category: componentsApplication
    subcategory: componentsApplicationCore
    edges:
      to:
        - componentApplicationNetworkPolicyEnforcementPoint
        - componentApplicationConsentSurface
        - componentAgentInputHandling
      from:
        - componentApplication
  - id: componentApplicationInputHandling
    title: Input Handling
    description:
      - >
        Input handling components filter, sanitize, and protect against potentially
        malicious inputs, whether from a user or more generally from anything outside
        the trusted system. Input handling acts as a control against numerous risks
        and is an area ripe for more research and development.
    category: componentsApplication
    subcategory: componentsApplicationCore
    edges:
      to:
        - componentApplication
      from:
        - componentApplicationNetworkPolicyEnforcementPoint
        - componentApplicationConsentSurface
        - componentAgentOutputHandling
  - id: componentReasoningCore
    title: Agent Reasoning Core
    description:
      - >
        The core of an agent’s functionality is its ability to reason about a user’s goal
        and create a plan to achieve it. The reasoning core processes system instructions,
        user queries, and contextual information to generate a sequence of actions. The  actions,
        or tool calls, allow the agent to affect the real world—interacting with  external
        systems, retrieving new information, or making changes to data and resources.

        The reasoning core typically consists of one or more models—possibly separate  models
        for the reasoning and then planning steps, or potentially one large model  able
        to do both. The process of planning is often iterative, taking place in a  “reasoning
        loop” where the plan is refined based on new information or the results  of previous
        actions. This iterative nature, combined with the ingestion of  external data,
        creates a vulnerability to indirect prompt injection, where  adversarially crafted
        information can manipulate the agent's planning process.

        The complexity of plans determines the agent’s level of autonomy, which can  range
        from selecting a predefined workflow to dynamically orchestrating  multi-step
        actions. This level of autonomy directly governs the potential  severity of a
        security failure—the more an agent can do on its own, the greater  the risk from
        manipulation or misalignment. This risk can be, at least partially,  mitigated
        through guardrails that constrain actions taken by an agent; for  example, by
        making certain actions subject to mandatory user confirmation.  However, this
        can in turn result in limitations on the agent's autonomy, thus  requiring a careful
        tradeoff between autonomy and security.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentOutputHandling
        - componentSecureLogging
      from:
        - componentAgentInputHandling
  - id: componentOrchestrationOutputHandling
    title: Output Handling
    description:
      - >
        Orchestration output is responsible for validating, sanitizing, and safely  formatting
        data as it exits the system to external or downstream components.  This control
        ensures outbound data meets defined schemas, strips sensitive  information that
        shouldn't be exposed, prevents injection attacks by properly  encoding outputs
        for their destination context (such as HTML encoding for  web responses or parameterization
        for database queries), and enforces  data classification policies.
    category: componentsModel
    subcategory: componentsOrchestration
    edges:
      to:
        - componentTheModel
        - componentSecureLogging
        - componentAgentNetworkPolicyEnforcementPoint
        - componentAgentToolTransport
        - componentFederationProxy
      from:
        - componentMemory
        - componentRAGContent
        - componentOrchestrationInputHandling
  - id: componentOrchestrationInputHandling
    title: Input Handling
    description:
      - >
        Orchestration input handling  is responsible for validating, sanitizing, and  normalizing
        all data entering the system from external sources before it  reaches core orchestration
        logic.
    category: componentsModel
    subcategory: componentsOrchestration
    edges:
      to:
        - componentMemory
        - componentRAGContent
        - componentSecureLogging
        - componentOrchestrationOutputHandling
      from:
        - componentTheModel
        - componentToolRegistry
        - componentAgentNetworkPolicyEnforcementPoint
        - componentAgentToolTransport
  - id: componentTools
    title: External Tools and Services
    description:
      - >
        Tools are the external APIs and services an agent uses to take action in the
        world. Each tool must be secured with least-privilege permissions; failures in
        tool functionality, authorization, or output handling produce risks distinct
        from those at the catalog layer.
      - >
        The discovery, cataloging, and metadata layer that agents query to find which
        tool to invoke (including parameter schemas, capability declarations, and
        invocation methods) is handled separately by {{componentToolRegistry}}; this
        component's scope is strictly the runtime tool services and their invocation
        surface. As that runtime tool-services component, it is one member of the
        broader Tools components category, not the category itself — which also groups
        the tool server, transport, and tool-authorization components.
      - Because these tools and services are sourced from many independent
        providers, the agent's security depends on a distributed set of trust
        relationships rather than a single vendor. Each provider is a separate point
        of provenance, so the integrity of a tool's identity, description, and
        supply chain must be established per provider rather than assumed across the
        set.
    category: componentsTools
    subcategory: componentsToolCore
    edges:
      to:
        - componentToolServer
        - componentToolRegistry
        - componentSecureLogging
      from:
        - componentToolRegistry
        - componentAuthorizationPolicyEnforcementPoint
        - componentAuthorizationPolicyEnforcementPoint
  - id: componentToolRegistry
    title: Tool Registry and Discovery
    description:
      - >
        The infrastructure that serves as the registration authority for tools available
        to AI agents: cataloging and indexing them, holding the authoritative metadata
        (tool descriptions, parameter schemas, capability declarations, publisher identity
        information, invocation methods, and org-specific use restrictions), and publishing
        authoritative pointers to the tool endpoints where invocations are made. This
        includes tool registries, MCP server manifest repositories, tool discovery
        endpoints, schema definition services, and namespace governance systems.
      - >
        Registry scope intentionally covers BOTH selection metadata (which tool to invoke)
        AND invocation metadata (how to invoke it). Selection and invocation are tightly
        coupled in real tool-registry formats — OpenAPI specs, MCP manifests, and tool
        schemas bundle "what this does" with "how to call it." Org-specific policies that
        restrict invocation methods (e.g., masking out invocation paths deemed too risky
        for a given deployment context) are enforced at the registry layer because that's
        where they sit between the agent and the tool. Splitting selection and invocation
        across separate components would force a parallel "use restrictions" component
        without addressing the coupling.
      - >
        Tool registries serve a fundamentally different function from tools themselves
        ({{componentTools}}). Tools are the external APIs and services that agents invoke
        (the tool functionality); the registry is the catalog/metadata layer that informs
        which tool is selected and how the agent should invoke it. The threat models are
        distinct: attacks on tools target functionality ({{riskInsecureIntegratedComponent}}),
        while attacks on a registry target the metadata that directs tool selection
        ({{riskToolSourceProvenance}}, {{riskToolRegistryTampering}}). A compromised
        registry can redirect an agent to the wrong tool — or to a corrupted invocation
        method on the right tool — even when the tools themselves remain secure.
      - >
        Registries are decoupled from tools: the same tool may be referenced by multiple
        registries from different sector-focused authorities (compliance-flavored,
        performance-flavored, licensing-flavored), and registries are not required in
        all
        deployments — internal-only or air-gapped agent systems may operate without any
        public registry layer. Controls targeting registry integrity apply only where
        a
        registry is part of the deployment.
      - The registry's scope also extends to the *publication and registration* step
        through which extensible artifacts — plugins, connectors, skill packages,
        and MCP server bundles — are made available and added to the catalog before
        they are installed into the agentic system. This is the point at which a new
        extension's metadata (its capability declarations, publisher identity, and
        invocation method) first enters the registry, expanding the set of
        {{componentTools}} an agent can invoke; it precedes and feeds the selection
        and invocation metadata this component already governs.
      - "The registry also functions as the asset-inventory population that governance
        processes and shadow-deployment detection act over: the enumerated set of tools,
        services, and serving endpoints an agentic system is permitted to reach, each
        carrying a trust-state marker that lets stale or unauthorized entries be flagged
        before an agent routes a call to them. This enumerated-endpoint role is protocol-agnostic
        — MCP server manifests, A2A peer directories, and classical service-discovery
        endpoints are deployment variations of the same function — and it is what {{componentOrchestrationInputHandling}}
        consults at resolution time, on the reasoning core's behalf, to determine which
        external tools exist and how to address them."
    category: componentsInfrastructure
    subcategory: componentsRegistries
    edges:
      to:
        - componentOrchestrationInputHandling
        - componentTools
      from:
        - componentTools
    externalReferences:
      - type: spec
        id: nist-800-53-cm-8
        title: NIST SP 800-53 Rev. 5 CM-8 System Component Inventory
        url: https://csrc.nist.gov/projects/risk-management/sp800-53-controls/release-search#!/control?version=5.1&number=CM-8
      - type: other
        id: cis-control-2
        title: 'CIS Critical Security Controls v8.1 Control 2: Inventory and Control of
          Software Assets'
        url: https://www.cisecurity.org/controls/inventory-and-control-of-software-assets
  - id: componentMemory
    title: Model Memory
    description:
      - >
        Memory allows a model or agent to retain context and learn facts across interactions.
        Memory implementations may result in additional security and data risk exposures
        requiring mitigation. Examples include:
      - - >
          Persistent attacks: Malicious data stored in memory could enable ongoing
          attacks against a user.
        - >
          Data loss through improper isolation: Sensitive data may be disclosed due
          to inadequate memory isolation between different users and contexts.
        - >
          Unintended data transfer: Sensitive information may be inappropriately
          transferred to third parties through undesired or unexpected tool calls.
    category: componentsModel
    subcategory: componentsOrchestration
    edges:
      to:
        - componentOrchestrationOutputHandling
      from:
        - componentOrchestrationInputHandling
  - id: componentRAGContent
    title: Retrieval Augmented Generation & Content
    description:
      - >
        Content for Retrieval-Augmented Generation (RAG) provides the agent with curated  knowledge
        to ground its responses and improve accuracy. The main security risk is  data
        poisoning, where an attacker corrupts this knowledge source to manipulate the  agent's
        output.
    category: componentsModel
    subcategory: componentsOrchestration
    edges:
      to:
        - componentOrchestrationOutputHandling
      from:
        - componentOrchestrationInputHandling
  - id: componentAgentUserQuery
    title: Agent User Query
    description:
      - >
        These contain the specific details of a user’s request after being processed.
        The  query is then combined with system instructions and other contextual data,
        like  agent memory or external information, to create a single, structured prompt
        for  the reasoning core to process.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentInputHandling
      from: []
  - id: componentAgentSystemInstruction
    title: Agent System Instructions
    description:
      - >
        These define an agent’s capabilities, permissions, and limitations, such as the  actions
        it can take and the tools it is allowed to use. For security, it’s  critical to
        unambiguously separate these instructions from user data and other  inputs, often
        using special control tokens as a defense against prompt  injection attacks.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentInputHandling
      from: []
  - id: componentAgentInputHandling
    title: Input Handling
    description:
      - >
        An agent’s interaction with the world begins at the User or Application, which  serves
        as the interface for collecting both explicit user instructions and passively  collected
        contextual data from its environment. This blend of inputs creates a  primary
        security challenge of reliably distinguishing trusted commands from the  controlling
        user versus potentially untrusted information from other sources.  An agent application
        processes explicit user instructions, which can be given  directly (synchronously)
        like a typed command, or be configured to execute  automatically when a specific
        event occurs (asynchronously). It also gathers  implicit contextual inputs—data
        that isn’t a direct command but is passively  collected from the environment,
        such as sensor readings, application state, tool
        call responses or the content of recently opened documents.

        Input Handling is is responsible for processing and understanding these inputs  before
        they are sent to the agent’s reasoning core. This handoff is a critical  security
        juncture, as the perception layer must reliably distinguish trusted user  commands
        from untrusted data to prevent manipulation of the agent’s core logic.
      - Tool metadata and descriptors a remote server returns (for example a
        {{ref:mcp-security}}-style tools/list response) pass through this facet
        before reaching {{componentReasoningCore}} — arriving via the tool
        server's own output gate and the network policy enforcement chain, not
        a direct connection from the tool server — so a compromised or
        impersonating server advertising deceptive tool capabilities is caught at
        the same perception-layer gate that screens every other implicit input,
        rather than reaching the reasoning core unchecked.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentReasoningCore
        - componentSecureLogging
      from:
        - componentAgentUserQuery
        - componentAgentSystemInstruction
        - componentTheModel
        - componentApplicationOutputHandling
        - componentAgentConsentSurface
        - componentAgentNetworkPolicyEnforcementPoint
    externalReferences:
      - type: spec
        id: mcp-security
        title: MCP Security Best Practices / Threat Model
        url: https://modelcontextprotocol.io/specification
  - id: componentAgentOutputHandling
    title: Output Handling
    description:
      - >
        The final step in an agent’s workflow is response rendering, the process or  formatting
        of an AI agent’s generated output for display and interaction within a  user application.
        This stage is a critical security boundary because it involves  taking dynamic
        content from the agent and displaying it within the trusted context  of a user’s
        application, such as a web browser or mobile application. Flaws in  this process
        can allow malicious content generated by a compromised agent to be  executed by
        the application, leading to significant security breaches.

        Agents often produce content in a universal format like Markdown, which is then  interpreted
        and rendered by the specific client application. If this output isn’t  properly
        sanitized according to the content type, it can create severe  vulnerabilities.
        For example, unsanitized output can enable data exfiltration when  content-embedded
        resources like images are automatically loaded by the  application, implicitly
        passing sensitive information to an attacker's server via  the resource's URL.
        Similarly, improper sanitization can lead to cross-site  scripting (XSS) attacks.

    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentApplicationInputHandling
        - componentTheModel
        - componentAgentConsentSurface
        - componentAgentNetworkPolicyEnforcementPoint
        - componentSecureLogging
      from:
        - componentReasoningCore
  - id: componentIdentityProvider
    title: Identity Provider
    description:
      - >
        The external identity and access management plane that authenticates principals
        and issues, exchanges, and validates the tokens downstream services and tools
        rely on for authorization. It is the authoritative source of identity for a deployment:
        it registers calling services as clients and mints scoped credentials so that
        every action taken by a served model, agent, or tool is attributable to an originating
        principal.
      - >
        In classical access-control terms ({{ref:nist-sp-800-162-abac}}) this plane is
        the Policy Information Point: the authoritative source of the subject identity
        and attributes — roles, claims, scopes — that an authorization decision consults.
        It does not itself decide whether a requested action is permitted ({{componentAuthorizationPolicyDecisionPoint}}
        evaluates policy against the identity this plane asserts) nor enforce that verdict
        ({{componentAuthorizationPolicyEnforcementPoint}}). Standard realizations include
        OAuth 2.0 ({{ref:rfc-6749-oauth2}}) authorization servers and OIDC identity providers;
        token exchange ({{ref:rfc-8693-token-exchange}}) propagates a verified principal
        across service hops, and Dynamic Client Registration ({{ref:rfc-7591-dynamic-client-registration}})
        admits calling services that cannot be provisioned in advance.
      - >
        The plane is cross-cutting rather than specific to any one protocol. Protocol
        bindings and deployment forms such as a hosted IdP versus a self-run authorization
        server are attributes of how identity is wired in, not the identity of the component
        itself; it remains the identity trust root on which dependent components — notably
        {{componentAuthorizationPolicyDecisionPoint}} — base every authorization decision.
    category: componentsInfrastructure
    subcategory: componentsIdentity
    edges:
      to:
        - componentAuthorizationPolicyDecisionPoint
        - componentFederationProxy
        - componentToolNetworkPolicyEnforcementPoint
    externalReferences:
      - type: spec
        id: rfc-6749-oauth2
        title: 'RFC 6749: The OAuth 2.0 Authorization Framework'
        url: https://www.rfc-editor.org/rfc/rfc6749
      - type: spec
        id: rfc-8693-token-exchange
        title: 'RFC 8693: OAuth 2.0 Token Exchange'
        url: https://www.rfc-editor.org/rfc/rfc8693
      - type: spec
        id: rfc-7591-dynamic-client-registration
        title: 'RFC 7591: OAuth 2.0 Dynamic Client Registration Protocol'
        url: https://www.rfc-editor.org/rfc/rfc7591
      - type: spec
        id: nist-sp-800-162-abac
        title: 'NIST SP 800-162: Guide to Attribute Based Access Control (ABAC)'
        url: https://csrc.nist.gov/pubs/sp/800/162/upd2/final
  - id: componentAuthorizationPolicyDecisionPoint
    title: Authorization Policy Decision Point
    description:
      - >
        The **authorization decision point** evaluates whether a requested action is permitted
        and returns an allow or deny verdict that enforcement points apply before the
        action proceeds. It implements a policy decision point (PDP) in the **NIST SP
        800-162** sense: given an authorization query, it evaluates subject, resource,
        and environmental attributes against a policy and returns a decision. It evaluates
        role-based or attribute-based policy against identity-provider claims such as
        role membership, job title, or work location.
      - >
        This component owns policy evaluation only. The attribute sources it consults
        (a policy information point) and the policy authoring surface (a policy administration
        point) are upstream; the enforcement that applies the verdict happens at the action
        and orchestration boundaries. Policy languages and engines that realize this role
        are deployment variations of the same locus, not distinct components.
      - >
        The key distinction is the separation of the decision point from the enforcement
        point: a single, auditable policy is applied consistently across many enforcement
        loci rather than re-implemented inline at each tool or service boundary.
    category: componentsInfrastructure
    edges:
      to:
        - componentAuthorizationPolicyEnforcementPoint
        - componentToolNetworkPolicyEnforcementPoint
      from:
        - componentIdentityProvider
    subcategory: componentsIdentity
  - id: componentExternalPromptTemplate
    title: External Prompt Templates
    description:
      - >
        **External prompt templates** are parameterized instruction or message templates
        that a remote tooling or service provider supplies at runtime, which the tool
        zone's content-layer handling fills in and injects into the model context.
      - >
        This component owns the provider-supplied template text and its injection point
        at the tool boundary. Upstream, the template originates outside the trusted
        system and is fetched from a third party; downstream, it enters through
        {{componentToolInputHandling}} — the same content-layer gate that screens every
        other tool-invocation request — rather than reaching {{componentToolServer}}
        directly, so a poisoned or impersonating template is caught at that gate instead
        of injecting straight into what the server serves.
      - >
        The key distinction from locally authored system instructions is origin and trust:
        because the text is *instruction-shaped* rather than reference data, yet enters
        from outside the trusted system, it is an untrusted, instruction-shaped input
        surface.
    category: componentsTools
    subcategory: componentsToolControls
    edges:
      to:
        - componentToolInputHandling
  - id: componentAgentConsentSurface
    title: Agent Consent Elicitation Surface
    description:
      - >
        The **agent consent elicitation surface** is the control point at which an autonomous
        agent pauses its own workflow to elicit explicit human confirmation before performing
        a consequential or irreversible tool action. It renders an elicitation request
        describing the pending action and returns the user's allow-or-deny decision to
        gate execution, generalizing protocol-specific confirmation primitives such as
        the server-side elicitation requests defined in {{ref:mcp-elicitation-spec}}.
      - >
        This surface owns the agent-driven elicitation prompt and the decision it returns.
        Because the agent itself initiates the request mid-loop and the prompt content
        can be populated by agent- or server-returned data, the surface is also an untrusted
        input channel: confirmation content must be sanitized before display and each
        returned approval must be integrity-bound to the exact action it described, so
        a compromised upstream cannot spoof, replay, or re-target the consent. It is distinct
        from the {{componentApplicationConsentSurface}}: that surface is the application's
        deliberate user-facing approval step, whereas this one is driven by the agent's
        autonomous reasoning loop.
      - >
        The defining attribute of this surface is request volume under autonomy. A naively
        designed agent elicits confirmation on a high proportion of its tool calls, so
        this is the locus where elicitation traffic concentrates and where habituation
        pressure on the human approver accumulates. Effective designs reserve elicitation
        for genuinely consequential or irreversible actions and bind each approval to
        one specific action rather than a standing class.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentInputHandling
      from:
        - componentAgentOutputHandling
    externalReferences:
      - type: spec
        id: mcp-elicitation-spec
        title: 'Model Context Protocol Specification: Elicitation'
        url: https://modelcontextprotocol.io/specification/2025-06-18/client/elicitation
  - id: componentIsolationRuntime
    title: Isolation Runtime Boundary
    description:
      - >
        The **isolation runtime boundary** is the execution locus that runs untrusted
        or partially-trusted code under enforced confinement. It is the runtime trust
        boundary around code whose behavior cannot be fully vouched for in advance: agent
        tool invocations, remotely-served tool backends, and model- or agent-generated
        code that is executed rather than merely returned.
      - >
        The role is realized through a spectrum of mechanisms with different boundary
        strengths, from process and OS-level confinement (seccomp, AppArmor/SELinux, namespaces)
        through application containers to hardware- and hypervisor-backed isolation ({{ref:gvisor}},
        {{ref:kata-containers}}, microVMs, TEE/confidential-computing enclaves), consistent
        with container-hardening guidance such as {{ref:nist-sp-800-190}}. The mechanism
        is an attribute of a given deployment, not the identity of the component; sizing
        the boundary to the trust level of the enclosed code is a *least-privilege* and
        *defense-in-depth* decision.
      - >
        This is a distinct architectural locus from the workloads it contains. Serving
        infrastructure makes a model available, and tools and the reasoning core do work;
        the isolation runtime is the confinement layer those workloads execute inside.
        The key distinction is that it owns the boundary itself rather than the code that
        runs within it.
      - >
        The boundary faces two inverse directions. Outward, it confines untrusted or agent-generated
        code so that a compromise inside it cannot reach the host (software sandboxing).
        Inward, hardware-backed enclaves and confidential-compute instances raise the
        cost and shrink the surface for a hostile host, administrator, or co-tenant to
        observe or tamper with a trusted workload's code and data in use (remote-attested
        hardware isolation). The inward direction is a hardening measure, not a guarantee:
        it does not fully protect against a malicious host — physical and hardware attacks,
        side channels, and vulnerabilities in the enclosed code itself remain outside
        its reach.
      - "At its hardware-backed instantiations, this boundary is anchored in a **hardware
        root of trust**: the enclave exposes a cryptographic measurement that a relying
        party checks through *remote attestation* before extending trust to it, for example
        before releasing data or credentials into the enclave. That verification step
        is not a property of the boundary itself — validating the attestation evidence
        and gating access on the result are control activities performed against this
        component, separate from the structural fact of the boundary's existence."
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to:
        - componentModelServing
        - componentToolHosting
        - componentRuntimeHosting
      from: []
    externalReferences:
      - type: spec
        id: nist-sp-800-190
        title: 'NIST SP 800-190: Application Container Security Guide'
        url: https://csrc.nist.gov/pubs/sp/800/190/final
      - type: other
        id: gvisor
        title: gVisor application kernel sandbox
        url: https://gvisor.dev/
      - type: other
        id: kata-containers
        title: Kata Containers lightweight-VM isolation runtime
        url: https://katacontainers.io/
  - id: componentToolServer
    title: Tool Server
    description:
      - >
        A **tool server** is the remote or out-of-process endpoint that hosts a set of
        capabilities (tools, callable resources, and prompt templates) and exposes them
        to an agent over a tooling protocol such as MCP, A2A, or a remote plugin interface
        ({{ref:mcp-spec}}).
      - >
        It owns the serving and brokering boundary where capabilities are advertised,
        discovered, and invoked. It is distinct from the {{componentTools}} it fronts:
        rather than being the underlying service, the tool server stands between the agent
        and those services, authenticating callers, presenting downstream credentials,
        and delegating to downstream services on behalf of multiple users.
      - >
        Its key distinction is deployment-dependent trust posture: an instance can range
        from a local subprocess sharing the host's user context to a multi-tenant remote
        service, so its trust boundary and isolation posture vary by deployment pattern
        — a zero-trust posture that verifies trust at each boundary rather than assuming
        it from position or prior connection ({{ref:nist-sp-800-207-zero-trust}}) applies
        regardless of deployment form.
      - "A tenant-isolation failure at a multi-tenant tool server is not hypothetical:
        in the 2025 Asana MCP incident ({{ref:bleepingcomputer-2025-asana-mcp-data-exposure}}),
        a flaw in tenant-session handling let one organization's data reach other organizations'
        users, affecting approximately 1,000 customers. The same incident is documented
        under {{riskCrossTenantCredentialPropagation}}; cited here, it grounds the deployment-dependent
        trust posture described above — the failure occurred at the server's own isolation
        boundary, not within any individual tool it fronted."
      - "In practice, this trust boundary is where standing-credential exposure can occur:
        a tool server provisioned with direct, broadly scoped access to a backing service
        — rather than a narrowly scoped, per-call delegation — holds a credential the
        direct caller does not have. If input that ultimately reaches the agent's request
        path is attacker-influenced, the tool server can be driven to exercise that standing
        access on the attacker's behalf, disclosing data or taking actions the caller
        was never authorized to reach directly. The exposure sits in the width of the
        credential the tool server itself holds and presents on the caller's behalf."
      - "Because callers reach this endpoint over a network, authentication at this boundary
        must be mutual rather than assumed: the connecting client and the server establish
        identity through mechanisms such as bearer tokens, OAuth, or mTLS before any capability
        is exposed, and weak, absent, or replayable authentication here lets an unauthorized
        client drive the hosted tools or lets a malicious server impersonate a trusted
        one. Capability exposure is also negotiated per connection rather than fixed in
        advance: the server determines, for each connecting client, which capabilities
        that client may invoke, and a server that over-advertises capabilities or mutates
        an advertised tool's behavior after the client has already approved it expands
        the agent's effective authority beyond what the operator intended. Because it
        fronts the {{componentTools}} it serves, the tool server also inherits their deceptive-tool-description
        and least-privilege concerns, so capability advertisements arriving from downstream
        must be treated as untrusted input subject to validation, not accepted at face
        value."
    category: componentsTools
    subcategory: componentsToolCore
    edges:
      to:
        - componentToolOutputHandling
        - componentAuthorizationPolicyEnforcementPoint
      from:
        - componentTools
        - componentToolInputHandling
    externalReferences:
      - type: spec
        id: mcp-spec
        title: Model Context Protocol Specification
        url: https://modelcontextprotocol.io/specification
      - type: spec
        id: nist-sp-800-207-zero-trust
        title: 'NIST SP 800-207: Zero Trust Architecture'
        url: https://csrc.nist.gov/pubs/sp/800/207/final
      - type: news
        id: bleepingcomputer-2025-asana-mcp-data-exposure
        title: Asana warns MCP AI feature exposed customer data to other orgs
        url: https://www.bleepingcomputer.com/news/security/asana-warns-mcp-ai-feature-exposed-customer-data-to-other-orgs/
  - id: componentAgentToolTransport
    title: Agent Tool Transport Channel
    description:
      - >
        The communications channel that carries request and response messages between
        an agent's orchestration layer and the external tools and services it invokes.
        It frames, delivers, and returns structured calls — typically JSON-RPC 2.0 messages
        ({{ref:jsonrpc-2-0}}) — over either a local inter-process stream or a networked
        session, abstracting the same agent-to-tool exchange across local and distributed
        deployments, as specified for remote-tooling protocols such as the Model Context
        Protocol ({{ref:mcp-spec-overview}}).
      - >
        This channel owns the transport between the calling orchestration layer and the
        serving tool endpoint: the underlying stream or socket and the session that carries
        messages in flight. On the graph it is realized as the segment between the orchestration
        gates and {{componentAgentNetworkPolicyEnforcementPoint}} — the agent's own egress
        enforcement — rather than a direct link to {{componentToolServer}}; the PEP chain
        on to the tool provider's own ingress gate is what actually reaches the endpoint,
        so no traffic conveyed by this channel bypasses that enforcement. Mutual authentication
        of the calling and serving ends is exercised here, though issuing and deciding
        that authentication is the job of dedicated components elsewhere in the graph
        ({{componentIdentityProvider}}, {{componentAgentNetworkPolicyEnforcementPoint}}).
        It is distinct from the tool itself, which performs the invoked action; the channel
        only conveys the call to and from that endpoint.
      - >
        The key distinction is that this is a connecting locus rather than an action endpoint.
        Transport-level assurances are established or lost here, independent of whether
        the tool endpoint is itself sound.
      - "This channel also multiplexes calls across one or more remote servers from a
        single agent. Identity verification is not limited to session establishment: each
        incoming response is checked against the remote server's verified identity, so
        a server impersonated or substituted after the session begins is caught before
        its response is trusted. Scoped, short-lived credentials issued per session are
        preferred over forwarding long-lived tokens, bounding what a captured credential
        can reach and for how long."
      - "This channel is also a trust boundary: tool servers and network intermediaries
        reaching it are often untrusted, so malformed or hostile frames, deserialization
        of attacker-controlled payloads, and session-lifecycle confusion from replayed
        or out-of-order initialization are the primary threats it must withstand, independent
        of whether the invoked tool logic is itself sound. The session it carries follows
        a defined lifecycle of initialization, capability negotiation, and teardown, governing
        how a connection is established and retired rather than just how messages are
        carried once in flight. Realizations extend beyond {{ref:jsonrpc-2-0}} framing
        under the Model Context Protocol to other agent-to-tool wire protocols such as
        gRPC and REST-over-HTTP, with encoding and deployment form varying while the channel's
        role stays the same. Payload-level validation of the calls themselves is out of
        scope for this channel and belongs to the adjacent {{componentOrchestrationInputHandling}}
        and {{componentOrchestrationOutputHandling}} components."
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentNetworkPolicyEnforcementPoint
        - componentOrchestrationInputHandling
      from:
        - componentAgentNetworkPolicyEnforcementPoint
        - componentOrchestrationOutputHandling
    externalReferences:
      - id: mcp-spec-overview
        title: Model Context Protocol specification — architecture and JSON-RPC
          messaging
        url: https://modelcontextprotocol.io/specification
        type: spec
      - id: jsonrpc-2-0
        title: JSON-RPC 2.0 Specification
        url: https://www.jsonrpc.org/specification
        type: spec
  - id: componentFederationProxy
    title: Authorization Federation Proxy
    description:
      - >
        The authorization federation proxy holds and presents delegated credentials on
        an agent's behalf when it invokes external tools. It is a federation proxy ({{ref:nist-sp-800-63c}}):
        a relying party toward the upstream identity provider and an identity provider
        toward the downstream tool, re-asserting the agent's identity to authorize the
        call. The presented credential is typically minted by on-behalf-of token exchange
        ({{ref:rfc-8693-token-exchange}}, over {{ref:rfc-6749-oauth2}}), so the proxy
        acts for the principal rather than as itself.
      - >
        Speaking for a principal other than itself makes the proxy the confused-deputy
        locus ({{ref:cwe-441}}): serving multiple users or tenants, it must bind each
        outbound request to the correct authorization context ({{ref:nist-sp-800-162-abac}}),
        or one principal's request travels under another's authority. As a proxy it inherits
        both roles' obligations — relying party upstream, identity provider downstream
        — and the standard mitigation is constrained delegation: an explicit allow-list
        of downstream targets and contexts rather than open delegation authority.
      - >
        It is distinct from {{componentIdentityProvider}}, which authenticates and asserts
        identity, and from {{componentAuthorizationPolicyEnforcementPoint}}, which adjudicates
        allow-or-deny: the proxy carries and binds authorization context rather than authenticating
        or deciding. Its lineage is the classical credential-delegation role — WS-Trust
        security token services, OAuth token-exchange brokers, Kerberos constrained delegation
        — each re-presenting a principal's authority across a trust boundary. It presents
        the delegated credential at the tool provider's own admission point, {{componentToolNetworkPolicyEnforcementPoint}},
        rather than reaching the tool server directly — the same resource-side ingress
        gate that {{componentIdentityProvider}} and {{componentAuthorizationPolicyDecisionPoint}}
        already reach as control-plane peers.
    category: componentsTools
    subcategory: componentsToolControls
    edges:
      to:
        - componentToolNetworkPolicyEnforcementPoint
      from:
        - componentOrchestrationOutputHandling
        - componentIdentityProvider
    externalReferences:
      - type: spec
        id: rfc-6749-oauth2
        title: RFC 6749 — The OAuth 2.0 Authorization Framework
        url: https://datatracker.ietf.org/doc/html/rfc6749
      - type: spec
        id: rfc-8693-token-exchange
        title: RFC 8693 — OAuth 2.0 Token Exchange
        url: https://datatracker.ietf.org/doc/html/rfc8693
      - type: spec
        id: nist-sp-800-63c
        title: 'NIST SP 800-63C-4 — Digital Identity Guidelines: Federation and Assertions'
        url: https://pages.nist.gov/800-63-4/sp800-63c.html
      - type: spec
        id: nist-sp-800-162-abac
        title: NIST SP 800-162 — Guide to Attribute Based Access Control (ABAC)
          Definition and Considerations
        url: https://csrc.nist.gov/pubs/sp/800/162/upd2/final
      - type: cwe
        id: cwe-441
        title: "CWE-441: Unintended Proxy or Intermediary ('Confused Deputy')"
        url: https://cwe.mitre.org/data/definitions/441.html
  - id: componentAgentNetworkPolicyEnforcementPoint
    title: Agent Network Policy Enforcement Point
    description:
      - >
        The agent network policy enforcement point is the client-side data-plane control
        through which an agent's outbound tool-call traffic transits on its way to external
        tool servers and services, typically over a tooling protocol such as the Model
        Context Protocol ({{ref:model-context-protocol}}). It is a Policy Enforcement
        Point in the {{ref:nist-sp-800-207}} sense — the runtime element that enables,
        monitors, and terminates connections — applied at the network layer on the agent
        operator's side: it admits or blocks each outbound connection against the operator's
        reviewed egress policy and enforces transport protections such as allowed destinations,
        TLS/mTLS, rate limiting, and audit on the traffic it carries ({{ref:nist-sp-800-162-abac}}).
      - >
        Its security value is enforcement of a reviewed policy, not centralization. Realized
        as a per-agent sidecar in a service-mesh data plane rather than a single shared
        gateway, each agent container gets its own enforcement instance — the same control
        without a single chokepoint to compromise or take offline, with {{ref:mitre-attack-m1037}}-style
        egress filtering applied close to the workload. It remains a high-value trust
        boundary: a compromised or misconfigured instance can blind the audit trail, leak
        the credentials it terminates, or relax the policy it enforces.
      - >
        It is distinct from {{componentAuthorizationPolicyEnforcementPoint}}, which enforces
        an allow-or-deny authorization decision on whether an action is permitted: this
        component governs how and to where the traffic may flow, not whether the action
        is allowed. As a network-layer control it nests outside the content-layer input
        and output handling — connection enforcement wraps prompt and context enforcement.
        It is the client-side half of a pair: the resource-side {{componentToolNetworkPolicyEnforcementPoint}}
        enforces the remote tool provider's ingress policy at the other end of the same
        connection.
    category: componentsApplication
    subcategory: componentsAgent
    edges:
      to:
        - componentAgentInputHandling
        - componentOrchestrationInputHandling
        - componentToolNetworkPolicyEnforcementPoint
        - componentAgentToolTransport
      from:
        - componentAgentOutputHandling
        - componentOrchestrationOutputHandling
        - componentToolNetworkPolicyEnforcementPoint
        - componentAgentToolTransport
    externalReferences:
      - type: spec
        id: nist-sp-800-207
        title: NIST SP 800-207 — Zero Trust Architecture
        url: https://doi.org/10.6028/NIST.SP.800-207
      - type: spec
        id: nist-sp-800-162-abac
        title: NIST SP 800-162 — Guide to Attribute Based Access Control (ABAC)
          Definition and Considerations
        url: https://csrc.nist.gov/pubs/sp/800/162/upd2/final
      - type: other
        id: mitre-attack-m1037
        title: 'MITRE ATT&CK M1037: Filter Network Traffic'
        url: https://attack.mitre.org/mitigations/M1037/
      - type: spec
        id: model-context-protocol
        title: Model Context Protocol specification
        url: https://modelcontextprotocol.io/specification
  - id: componentAuthorizationPolicyEnforcementPoint
    title: Authorization Policy Enforcement Point
    description:
      - >
        The **Authorization Policy Enforcement Point** is the locus at which a requested
        action's authorization is enforced: for each consequential operation a caller
        attempts — invoking a tool, calling a service, reaching a downstream resource
        — it obtains an allow-or-deny decision and applies it before the operation proceeds.
        In classical access-control terms ({{ref:nist-sp-800-162-abac}}) it is the Policy
        Enforcement Point, paired with {{componentAuthorizationPolicyDecisionPoint}}:
        it presents the request and the caller's identity to the decision point and forwards
        or blocks the operation on the returned verdict.
      - >
        It enforces the authorization decision but neither makes it nor sources identity:
        the decision is {{componentAuthorizationPolicyDecisionPoint}}'s, and the identity
        claims it submits — role, attributes, scope — come from {{componentIdentityProvider}}
        via a verified token or assertion, carried to the decision rather than re-derived
        here. It is distinct from the action surface it guards, such as {{componentTools}}:
        that surface performs the operation, while this component authorizes each invocation
        of it. Invocations reach this enforcement point as presented by {{componentToolServer}}
        on the caller's behalf, in line rather than bypassed by a client-side path directly
        into the action surface. Realizations vary — a sidecar policy engine, API-gateway
        authorization, or an in-process authorization library — deployment attributes,
        not the identity of the component.
      - >
        Its scope is the authorization of the action, not the network path. It governs
        *whether* a given identity may perform a specific operation on a specific resource
        — least privilege at the level of permitted actions — and is distinct from {{componentAgentNetworkPolicyEnforcementPoint}},
        which governs *how and to where* traffic may flow. The two compose: the network
        enforcement point admits the connection; this enforcement point authorizes the
        action carried over it.
    category: componentsTools
    subcategory: componentsToolControls
    edges:
      from:
        - componentAuthorizationPolicyDecisionPoint
        - componentToolServer
      to:
        - componentTools
    externalReferences:
      - type: spec
        id: nist-sp-800-162-abac
        title: NIST SP 800-162 — Guide to Attribute Based Access Control (ABAC)
          Definition and Considerations
        url: https://csrc.nist.gov/pubs/sp/800/162/upd2/final
  - id: componentToolNetworkPolicyEnforcementPoint
    title: Tool Network Policy Enforcement Point
    description:
      - >
        The tool network policy enforcement point is the resource-side data-plane control
        that fronts a remote tool server or service and admits or blocks inbound agent
        connections against the tool provider's reviewed ingress policy. It is the resource-side
        Policy Enforcement Point in the {{ref:nist-sp-800-207}} sense — the runtime element
        that terminates and authenticates incoming connections at the protected resource's
        edge.
      - >
        It is the counterpart to {{componentAgentNetworkPolicyEnforcementPoint}}: the
        two sit at opposite ends of the same connection but serve different owners and
        goals — the agent PEP enforces the operator's egress policy (self protecting self),
        this PEP enforces the tool provider's ingress policy (remote protecting self).
        Realized as a sidecar or gateway in front of {{componentToolServer}}, it applies
        allowed-source, TLS/mTLS, rate-limit, and audit controls ({{ref:mitre-attack-m1037}})
        at the resource boundary.
      - >
        As a network-layer control it is distinct from the tool server itself, which performs
        the served action, and from content-layer handling: it governs which connections
        reach the server, not what the server does or what the payloads say.
    category: componentsTools
    subcategory: componentsToolControls
    edges:
      to:
        - componentAgentNetworkPolicyEnforcementPoint
        - componentToolInputHandling
      from:
        - componentAgentNetworkPolicyEnforcementPoint
        - componentToolOutputHandling
        - componentAuthorizationPolicyDecisionPoint
        - componentIdentityProvider
        - componentFederationProxy
    externalReferences:
      - type: spec
        id: nist-sp-800-207
        title: NIST SP 800-207 — Zero Trust Architecture
        url: https://doi.org/10.6028/NIST.SP.800-207
      - type: other
        id: mitre-attack-m1037
        title: 'MITRE ATT&CK M1037: Filter Network Traffic'
        url: https://attack.mitre.org/mitigations/M1037/
  - id: componentApplicationConsentSurface
    title: Application Consent Surface
    description:
      - >
        The **application consent surface** is the control point inside a user-facing
        AI application at which the application obtains explicit human approval before
        executing a consequential action. It presents the pending action to the user and
        returns the allow-or-deny decision that gates execution. It is the application-layer
        realization of the classical explicit-consent / dual-control (four-eyes) authorization
        locus, sited in the application the system itself builds.
      - >
        This surface is a distinct locus from the {{componentAgentConsentSurface}}, and
        the distinction is a profile difference, not just a placement one. Application
        approvals are low-volume and high-stakes: each is an explicit, per-action authorization
        deliberately surfaced to the user, rather than the high-volume elicitation an
        autonomous agent generates. Because the approval is scoped to one specific action
        rather than a standing class, the human decision point stays aligned with the
        action actually executed downstream.
      - >
        The approval request and the returned decision cross the application's input/output
        boundary, so the surface owns the integrity of that exchange: the request content
        must be presented unambiguously and the returned decision must be bound to the
        exact action shown, so it cannot be spoofed or re-targeted by content originating
        elsewhere in the application flow.
    category: componentsApplication
    subcategory: componentsApplicationCore
    edges:
      to:
        - componentApplicationInputHandling
      from:
        - componentApplicationOutputHandling
  - id: componentApplicationNetworkPolicyEnforcementPoint
    title: Application Network Policy Enforcement Point
    description:
      - >
        The application network policy enforcement point is the client-side data-plane
        control through which the application's outbound model-serving traffic transits
        on its way to the model-serving endpoint it consumes. It is a Policy Enforcement
        Point in the {{ref:nist-sp-800-207}} sense — the runtime element that enables,
        monitors, and terminates connections — applied at the network layer on the
        application operator's side: it admits or blocks each outbound connection against
        the operator's reviewed egress policy and enforces transport protections such as
        allowed destinations, TLS/mTLS, rate limiting, and audit on the traffic it carries
        ({{ref:nist-sp-800-162-abac}}).
      - >
        It is distinct from {{componentAgentNetworkPolicyEnforcementPoint}}: the two
        enforce the same class of egress policy but for different authorities. The
        application is operated by the application developer/operator; the agentic
        runtime — agent and orchestration — is operated separately (an agentic platform
        or framework provider). Routing the application's model-serving traffic through
        the agent's enforcement point would place one operator's egress under another
        operator's reviewed policy, so each authority gets its own enforcement instance
        rather than sharing one across a trust boundary.
      - >
        Its security value is enforcement of a reviewed policy, not centralization,
        matching the same {{ref:mitre-attack-m1037}}-style egress-filtering posture as
        its agent-side counterpart. It remains a high-value trust boundary: a compromised
        or misconfigured instance can blind the audit trail, leak the credentials it
        terminates, or relax the policy it enforces.
    category: componentsApplication
    subcategory: componentsApplicationCore
    edges:
      to:
        - componentApplicationInputHandling
        - componentModelServing
      from:
        - componentApplicationOutputHandling
        - componentModelServing
    externalReferences:
      - type: spec
        id: nist-sp-800-207
        title: NIST SP 800-207 — Zero Trust Architecture
        url: https://doi.org/10.6028/NIST.SP.800-207
      - type: spec
        id: nist-sp-800-162-abac
        title: NIST SP 800-162 — Guide to Attribute Based Access Control (ABAC)
          Definition and Considerations
        url: https://csrc.nist.gov/pubs/sp/800/162/upd2/final
      - type: other
        id: mitre-attack-m1037
        title: 'MITRE ATT&CK M1037: Filter Network Traffic'
        url: https://attack.mitre.org/mitigations/M1037/
  - id: componentToolHosting
    title: Tool Hosting
    description:
      - >
        **Tool hosting** is the serving substrate that runs untrusted external tool code
        — third-party tool backends and plugin implementations — on behalf of the AI system.
        It owns the execution environment in which that external code actually runs, as
        a peer of model serving and runtime hosting within the deployment substrate.
      - >
        Its defining attribute is the trust posture of what it hosts. Because the hosted
        code is third-party and cannot be vouched for in advance, the controlling threat
        is arbitrary code execution, so strong isolation and sandboxing — process and
        OS-level confinement, application containers, and hardware/hypervisor-backed boundaries
        ({{ref:nist-sp-800-190}}) — together with least-privilege confinement are first-order
        rather than optional. This is what separates it from {{componentModelServing}}:
        both share the deployment subcategory, but model serving hosts the system's own
        trusted inference, while tool hosting hosts code it does not control.
      - >
        Tool hosting is the hosted workload, not the boundary it runs inside; the confinement
        itself is owned by {{componentIsolationRuntime}}, within which this substrate
        executes.
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to: []
      from:
        - componentIsolationRuntime
    externalReferences:
      - type: spec
        id: nist-sp-800-190
        title: 'NIST SP 800-190: Application Container Security Guide'
        url: https://doi.org/10.6028/NIST.SP.800-190
  - id: componentRuntimeHosting
    title: Runtime Hosting
    description:
      - >
        **Runtime hosting** is the serving substrate on which the AI system's own application
        and agent code execute. It owns the execution environment for first-party application
        and agent workloads, as distinct from model inference or external tool code, and
        sits alongside model serving and tool hosting within the deployment substrate.
      - >
        Application execution and agent execution share this one substrate and one set
        of hosting controls, so they are modeled as a single component rather than two.
        The autonomy/workload difference that would otherwise separate an application
        workload from a higher-autonomy agent workload is a deferred component attribute,
        not a second node; in the interim this component carries the agent / higher-autonomy
        control set as the conservative default. This keeps the distinction an attribute
        question rather than component sprawl.
      - >
        It is distinct from {{componentModelServing}}, which makes a model available for
        inference, and from {{componentToolHosting}}, which runs untrusted external tool
        code; runtime hosting runs the system's own application and agent logic. Like
        its peers it is the hosted workload, executing inside the confinement owned by
        {{componentIsolationRuntime}}.
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to: []
      from:
        - componentIsolationRuntime
  - id: componentToolInputHandling
    title: Tool Input Handling
    description:
      - >
        **Tool input handling** is the content-layer handling stage on the tool side of
        the tool-server boundary that validates, sanitizes, and filters incoming tool-invocation
        requests, and provider-supplied content such as {{componentExternalPromptTemplate}}
        entering the serving surface, before the tool server acts on them. It is the
        tool-boundary instance of the in-flow input-handling pattern the corpus already
        models at the application, orchestration, and agent boundaries.
      - >
        It sits between the connection-layer admission performed by {{componentToolNetworkPolicyEnforcementPoint}},
        which decides whether a request reaches the tool zone at all, and {{componentToolServer}},
        which performs the served action. Its responsibility is the *content* of the admitted
        request, not the connection: argument validation, schema and type checking, and
        filtering of malformed or over-scoped invocations at the resource edge.
      - >
        The threats it answers are tool-request-shaped — argument injection and malformed
        or coerced invocations arriving at the tool boundary — which are distinct from
        the orchestration-context filtering performed deeper in the agent. Keeping it
        separate from the tool server preserves the validation-locus / action-locus distinction
        the in-flow handling pattern relies on.
    category: componentsTools
    subcategory: componentsToolCore
    edges:
      to:
        - componentToolServer
      from:
        - componentToolNetworkPolicyEnforcementPoint
        - componentExternalPromptTemplate
  - id: componentToolOutputHandling
    title: Tool Output Handling
    description:
      - >
        **Tool output handling** is the content-layer handling stage that validates, sanitizes,
        and filters tool responses as they leave the tool server, before they cross the
        tool boundary back toward the agent. It is the output-side counterpart of {{componentToolInputHandling}}
        and the fourth instance of the in-flow output-handling pattern the corpus models
        at the application, orchestration, and agent boundaries.
      - >
        Its defining threat is tool-response poisoning and output injection: a compromised,
        malicious, or confused tool can embed instruction-shaped or otherwise harmful
        content in its response to steer the agent that consumes it. This surface is where
        response content is schema-checked, sanitized, and trust-labeled at the {{componentToolServer}}
        egress before it is handed to the connection-layer boundary at {{componentToolNetworkPolicyEnforcementPoint}}.
      - >
        These tool-response threats are distinct from orchestration-context filtering
        deeper in the agent: they originate at the tool boundary and target whatever consumes
        the tool output. Keeping the response-handling locus separate from the tool server
        preserves the action-locus / validation-locus distinction the handling pattern
        depends on.
    category: componentsTools
    subcategory: componentsToolCore
    edges:
      to:
        - componentToolNetworkPolicyEnforcementPoint
      from:
        - componentToolServer
  - id: componentSecureLogging
    title: Secure Logging
    description:
      - >
        The durable, tamper-evident storage substrate that other components write their
        logs and audit records to. Log storage here is treated as **write-once, append-only**
        infrastructure — comparable to WORM (write once, read many) storage and hash-chained
        or Merkle-linked audit trails — so that a written record cannot be silently altered
        or deleted after the fact, and any tampering is detectable.
      - >
        This substrate may be **centralized**, a single log store shared across the deployment,
        or **decentralized**, with each component or service maintaining its own tamper-evident
        log locally; either posture satisfies the same integrity property. It is distinct
        from {{componentDataStorage}} and {{componentModelStorage}}, which persist training
        data and model artifacts respectively, rather than the runtime record of what
        the system did.
      - >
        Secure Logging is the storage locus, not the practice of using it: {{controlAgentObservability}}
        and the detective controls it supports ({{controlThreatDetection}}, {{controlIncidentResponseManagement}})
        consume the records held here to provide auditability, debugging, and incident
        investigation. A compromised or unavailable log store undermines every control
        that depends on log integrity for its evidentiary value.
    category: componentsInfrastructure
    subcategory: componentsDeployment
    edges:
      to: []
      from:
        - componentModelServing
        - componentReasoningCore
        - componentTools
        - componentOrchestrationInputHandling
        - componentOrchestrationOutputHandling
        - componentAgentInputHandling
        - componentAgentOutputHandling
