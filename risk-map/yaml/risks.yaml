  - id: riskPromptInjection
    title: Prompt Injection
    shortDescription:
      - >
        Tricking a model to run unintended commands. In terms of impact, Prompt Injection
        can change a model's behavior.
    longDescription:
      - Causing a model to execute commands “injected” inside a prompt.
      - >
        Prompt Injection takes advantage of the blurry boundary between “instructions”
        and “input data” in a prompt, resulting in a change to the model’s
        behavior. These attacks can be both direct (entered directly by the user) or
        indirect (read from other sources such as a doc, email, or website).
      - >
        <a href="https://arxiv.org/pdf/2307.02483.pdf">Jailbreaks</a> are one type
        of Prompt Injection attack, causing the model to behave in ways that they’ve
        been trained to avoid, such as outputting unsafe content or leaking personally
        identifiable information.  These are well-known vulnerabilities such as "ignore
        your previous instructions" or “Do Anything Now” (DAN).
      - >
        Aside from jailbreaks, <a href="https://arxiv.org/pdf/2302.12173.pdf">Prompt
        Injections</a> generally cause the LLM to execute malicious “injected”
        instructions as part of data that were not meant to be executed by the LLM.
        The blast radius of such attacks can become much bigger in the presence of
        other risks such as <a href="#riskInsecureIntegratedComponent">Insecure Integrated Component</a> and
        <a href="#riskRogueActions">Rogue Actions</a>.
      - >
        With foundation models becoming multi-modal, multi-modal prompt injection has
        also become possible. These attacks use injection inputs other than text to
        trigger the intended model behavior.
    category: risksRuntimeInputSecurity
    personas:
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlInputValidationAndSanitization
      - controlAdversarialTrainingAndTesting
      - controlOutputValidationAndSanitization
    examples:
      - >
        An example of indirect Prompt Injection was performed by <a href="https://arxiv.org/abs/2302.12173"
        target="_blank" rel="noopener">planting malicious data inside a resource
        fed into the LLM's prompt</a>. In another example, a <a href="https://simonwillison.net/2023/Oct/14/multi-modal-prompt-injection/"
        target="_blank" rel="noopener">multi-modal prompt injection image attacks
        against GPT-4V</a> showed that images can contain text that triggers a Prompt
        Injection attack when the model is asked to describe the image.
    tourContent:
      introduced:
        - >
          Prompt Injection is an inherent risk in AI models, because of the potential
          confusion between instructions and input data.
      exposed:
        - >
          This risk is exposed during model usage, specifically within the model input
          handling and model components. Attackers may inject commands within prompts,
          potentially causing unintended model actions.
      mitigated:
        - >
          Mitigation involves robust filtering and processing of inputs and outputs.
          Additionally, thorough training, tuning, and evaluation processes help fortify
          the model against prompt injection attacks.
    mappings:
      mitre-atlas:
        - AML.T0051
      stride:
        - tampering
        - elevation-of-privilege
      owasp-top10-llm:
        - LLM01
    lifecycleStage:
      - runtime
    impactType:
      - integrity
      - confidentiality
      - safety
    actorAccess:
      - external
      - api
      - user
  - id: riskModelEvasion
    title: Model Evasion
    shortDescription:
      - >
        Changes to a prompt input to cause the model to produce incorrect inferences.
        Model Evasion can lead to reputational, legal, security, and privacy risks.
    longDescription:
      - >
        Causing a model to produce incorrect inferences by slightly perturbing the
        prompt input.
      - >
        Model Evasion can result in reputational or legal challenges and trigger other
        downstream risks, such as to security or privacy systems.
      - >
        A classic example is placing stickers on a stop sign to obscure the visual
        inputs to model piloting a self-driving car. Because of the change to the
        typical visual presentation of the sign, the model might not correctly infer
        its presence. Similarly, normal wear and tear on a stop sign could lead to
        misidentification if the model is not trained on images of signs in varying
        degrees of disrepair.
      - >
        In some cases, an attacker might gain clues about how to perturb inputs by discovering
        the underlying foundation model’s family, i.e., by knowing the particular
        architecture and evolution of a specific model. In other situations, an attacker
        might repeatedly probe the model (see <a href="#riskModelReverseEngineering">Model Reverse Engineering</a>)
        to figure out inference patterns in order to craft examples that evade those
        inferences. Adversarial examples might be constructed by perturbations to inputs
        that will provide the output the attacker wants while looking unaltered otherwise.
        This could be used, for example, for evading a classifier that serves as an
        important safeguard.
      - >
        Not all examples of model evasion attacks are necessarily visible to the naked
        eye. The inputs might be perturbed in such a way to appear unaltered, but still
        produce the output the attacker wants. For example, a homoglyph attack involves
        slight changes to typefaces that the human eye doesn’t perceive as a different
        letter, but could trigger unexpected inferences in the mode. Another example
        could be sending an image in the prompt but using steganography to encode text
        within the image pixels. This text would be part of the prompt for the LLM,
        but the user won’t see it.
    category: risksRuntimeInputSecurity
    personas:
      - personaModelServing
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlAdversarialTrainingAndTesting
    examples:
      - >
        Adversarial images have been used to <a href="https://spectrum.ieee.org/slight-street-sign-modifications-can-fool-machine-learning-algorithms"
        target="_blank" rel="noopener">modify street signs to confuse self-driving
        cars</a>.
    tourContent:
      introduced:
        - >
          Model Evasion is an inherent risk in AI models, as their core functionality
          relies on distinguishing between inputs to trigger specific inferences.
      exposed:
        - This risk is exposed within the model component itself during its usage.
      mitigated:
        - >
          Mitigation occurs in the training, tuning, and evaluation phases, where robust
          models can be developed using extensive and diverse data to better withstand
          such attacks.
    mappings:
      mitre-atlas:
        - AML.T0015
        - AML.T0043
      stride:
        - tampering
      owasp-top10-llm:
        - LLM01
    lifecycleStage:
      - evaluation
      - runtime
    impactType:
      - integrity
      - safety
      - reliability
    actorAccess:
      - external
      - api
      - user
  - id: riskSensitiveDataDisclosure
    title: Sensitive Data Disclosure
    shortDescription:
      - >
        Disclosure of sensitive data by the model. Sensitive Data Disclosure poses
        a threat to user privacy, organizational reputation, and intellectual property.
    longDescription:
      - Disclosure of private or confidential data through querying of the model.
      - >
        For non-agentic systems, this data might include memorized training/tuning data, 
        user chat history, and confidential data in the prompt preamble. Agentic systems 
        magnify this risk, as they may be granted privileged access to a user's email, 
        files, or even an entire computer, creating the potential to exfiltrate vast 
        amounts of personal or corporate data like source code and internal documents. 
        Sensitive data disclosure is a risk to user privacy, an organization's reputation, 
        and intellectual property.
      - >
        Sensitive information is generally disclosed in two ways: leakage of data provided 
        to the model or agent during use (such as user input and data that passes through 
        integrated systems, like emails, texts, or system prompts) and leakage of data 
        used for training and tuning of the model.
      - - >
          <strong>AI Systems:</strong> AI systems can leak sensitive data sourced from 
          three primary sources: 
          - data provided by the user
          - data used in model training and deployment including system prompts
          - data accessed or produced via tool call responses and external system usage 

          Data leakage occurs due to gaps in the system, application and deployment 
          security controls and is analogous to the leakage vectors that exist in 
          classical applications.  

          Data leakage can occur through several vectors: 
          - Application Logs: Logs may store entire interactions, including sensitive data 
            retrieved by tools
          - Retraining Data: User conversations retained for model retraining can create a 
            vulnerable database of sensitive information
          - Prompt Stealing: Attackers can use carefully crafted queries to trick the 
            model into revealing its confidential system prompts or instructions
          - Memorization: A model may inadvertently reveal parts of its training data 
            verbatim. This phenomenon, also called recitation, can expose sensitive 
            details like names, addresses, or other Personally Identifiable 
            Information (PII).
            Note: The risk of memorization is significantly higher when a model is 
            retrained on private user data and then used by others, as it could expose one 
            user's information to another.

          <strong>Agents:</strong> For agentic systems, the risk of sensitive data 
          disclosure is exponentially multiplied, since agents may access user data that 
          passes through integrated systems, like emails, texts, or proprietary 
          organizational information. In extreme cases, agents can even reveal credentials 
          and API keys they have been trusted with. Additionally, agents may use tools to 
          not only access sensitive data on behalf of the user, but also use those tools 
          to leak sensitive data. For example, an agent can leak information by: 
          - creating and sharing a document with an attacker 
          - writing an email
          - opening a website and leaking information in the URL or a markdown image
          - through any tool that allows it to pass information to the outside world. 

          Context-hijacking attacks show that an adversary can potentially confuse the 
          agent to reveal data that is not appropriate for a specific context, such as 
          sharing health history when the agent should be booking a restaurant reservation.
    category: risksRuntimeDataSecurity
    personas:
      - personaModelProvider
      - personaDataProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlModelPrivacyEnhancingTechnologies
      - controlRuntimePrivacyEnhancingTechnologies
      - controlUserDataManagement
      - controlOutputValidationAndSanitization
      - controlAdversarialTrainingAndTesting
      - controlAgentPluginPermissions
      - controlAgentPluginUserControl
      - controlAgentObservability
      - controlUserTransparencyAndControls
      - controlUserPoliciesAndEducation
    examples:
      - >
        One study showed that <a href="https://arxiv.org/abs/2210.17546" target="_blank"
        rel="noopener">recitation checkers that scan for verbatim repetition of training
        data</a> may be insufficient.
      - >
        An example of <a href="https://arxiv.org/pdf/1610.05820.pdf" target="_blank"
        rel="noopener">membership inference attacks</a> showed the possibility of
        inferring whether a specific user or data point was used to train or tune the
        model.
    tourContent:
      introduced:
        - >
          The risk of Sensitive Data Disclosure is introduced in several components.
          It can also be inherent to models due to their non-deterministic nature.
          This risk is amplified by data handling practices that fail to filter sensitive
          information, or by training processes that neglect to evaluate the model's
          potential for disclosure.
      exposed:
        - >
          This risk is exposed within the model itself, when it inadvertently reveals
          sensitive data it shouldn't.
      mitigated:
        - >
          Mitigate sensitive data disclosure by: filtering model outputs, rigorously
          testing the model during training, tuning, and evaluation, and removing or
          labeling sensitive data during sourcing, filtering, and processing before
          it's used for training.
    mappings:
      mitre-atlas:
        - AML.T0024
      stride:
        - information-disclosure
      owasp-top10-llm:
        - LLM02
        - LLM07
    lifecycleStage:
      - model-training
      - evaluation
      - runtime
    impactType:
      - confidentiality
      - privacy
    actorAccess:
      - external
      - api
      - user
      - agent
      - privileged
      - infrastructure-provider
  - id: riskInferredSensitiveData
    title: Inferred Sensitive Data
    shortDescription:
      - >
        Model inferring personal information not contained in training data or inputs.
        Inferred Sensitive Data may be considered a data privacy incident.
    longDescription:
      - >
        Models inferring sensitive information about people that is not contained in
        the model’s training data.
      - >
        Inferred information that turns out to be true, even if produced as part of
        a hallucination, can be considered a data privacy incident, whereas the same
        information when false would be treated as a factuality issue.
      - >
        For example, a model may be able to infer information about people (gender,
        political affiliation, or sexual orientation) based on their inputs and responses
        from integrated plugins, such as a social media plugin that accesses a public
        account’s liked pages or followed accounts. Though the data used for inference
        may be public, this type of inference poses two related risks: that a user
        may be alarmed if a model infers sensitive data about them, and that one user
        may use a model to infer sensitive data about someone else.
      - >
        This risk differs from <a href="#riskSensitiveDataDisclosure">Sensitive Data Disclosure</a> which involves
        sensitive data specifically from training, tuning or prompt data.
    category: risksRuntimeDataSecurity
    personas:
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlTrainingDataManagement
      - controlOutputValidationAndSanitization
      - controlAdversarialTrainingAndTesting
    examples:
      - >
        Examples include papers on <a href="https://osf.io/preprints/psyarxiv/hv28a"
        target="_blank" rel="noopener">AI inferences about sexual orientation</a>
        or <a href="https://confilegal.com/wp-content/uploads/2016/11/ESTUDIO-UNIVERSIDAD-DE-JIAO-TONG-SHANGHAI.pdf">criminal
        record from faces</a>.
    tourContent:
      introduced:
        - >
          The risk of Inferred Sensitive Data is introduced in several components. It's
          inherent to models due to their non-deterministic nature and is amplified
          by inadequate data handling practices that fail to filter sensitive information.
          It can also be due to training processes that neglect to evaluate the model's
          potential for sensitive inferences.
      exposed:
        - >
          This risk is exposed within the model when it generates a response containing
          inferred sensitive data that it shouldn't.
      mitigated:
        - >
          Mitigation is multi-pronged: filtering model outputs to prevent revealing
          inferred sensitive data, rigorously testing the model during training, tuning,
          and evaluation to prevent sensitive inferences, and proactively removing
          or labeling data that could lead to such inferences during sourcing, filtering,
          and processing before training.
    mappings:
      stride:
        - information-disclosure
      owasp-top10-llm:
        - LLM02
        - LLM09
    lifecycleStage:
      - runtime
    impactType:
      - privacy
      - fairness
    actorAccess:
      - external
      - api
      - user
  - id: riskInsecureModelOutput
    title: Insecure Model Output
    shortDescription:
      - >
        Unvalidated model output passed to the end user. Insecure Model Output poses
        risks to organizational reputation, security, and user safety.
    longDescription:
      - >
        Model output that is not appropriately validated, rewritten, or formatted before
        being passed to downstream systems or the user.
      - >
        Whether accidentally triggered or actively exploited, Insecure Model Output
        poses risks to organizational reputation, security, and user safety.
      - >
        For example, a user who asks an LLM to generate an email for their business’s
        promotion would be harmed if the model produces text that unexpectedly includes
        a link to a URL that delivers malware. Alternatively, a malicious actor could
        intentionally trigger insecure content, such as requesting the LLM to produce
        a phishing email based on specific details about the target.
    category: risksRuntimeOutputSecurity
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelConsumer
    controls:
      - controlOutputValidationAndSanitization
      - controlAdversarialTrainingAndTesting
    examples:
      - >
        <a href="https://www.theregister.com/2024/03/28/ai_bots_hallucinate_software_packages/"
        target="_blank" rel="noopener">Attackers can compromise users by creating
        fake malicious packages with names inspired by LLM hallucinations</a>.
    tourContent:
      introduced:
        - >
          The risk of Insecure Model Output is inherent to AI models due to their non-deterministic
          nature, which can lead to unexpected and a potentially harmful outputs.
      exposed:
        - >
          This risk is exposed within the model itself during usage, either through
          accidental triggers or deliberate exploitation.
      mitigated:
        - >
          Mitigation includes robust model validation and sanitization processes within
          the model output handling component to screen and filter for insecure responses.
    mappings:
      stride:
        - tampering
      owasp-top10-llm:
        - LLM05
        - LLM09
    lifecycleStage:
      - runtime
    impactType:
      - integrity
      - safety
      - reliability
    actorAccess:
      - external
      - api
      - user
  - id: riskRogueActions
    title: Rogue Actions
    shortDescription:
      - >
        Unintended or manipulated model-based actions executed via extensions.
        Rogue Actions can cascade across systems with severe impact on
        organizational reputation, user trust, security, and safety.
    longDescription:
      - >
        Unintended actions executed by a model-based agent via extensions, whether
        accidental or malicious.
      - >
        Given the projected ability for advanced generative AI models to not only
        understand their environment, but also to initiate actions with varying levels
        of autonomy, Rogue Actions have the potential to become a serious risk to 
        organizational reputation, user trust, security, and safety.
      - - >
          <strong>Accidental rogue actions:</strong> This risk, sometimes known as 
          misalignment, could be due to mistakes in task planning, reasoning, or 
          environment sensing, and might be exacerbated by the inherent variability in 
          LLM responses. Prompt engineering shows the spacing and ordering of examples 
          can have a significant impact on the response, so varying input (even when not 
          maliciously planted) could result in unexpected outcomes. Even simple ambiguity 
          can cause rogue actions, such as an agent emailing the wrong "Mike," 
          unintentionally sharing private data.
        - >
          <strong>Malicious actions:</strong> This risk could include manipulating model
          output using attacks such as indirect prompt injection, poisoning, or evasion.
          The threat can be amplified in multi-agent systems, where the attacker can
          potentially hijack the communication between two agents to execute arbitrary
          malicious code, even if the individual agents are secured against direct attacks.
          Malicious actions may also be asynchronous. An attacker can plant a dormant
          "named trigger" that activates later during an unrelated task—for instance,
          a rule hidden in a calendar invite that opens the front door whenever the user
          says an unrelated keyword. Other actions may be time-based, occurring after a
          set number of interactions, making the rogue action appear spontaneous and
          disconnected from the malicious source.
        - >
          <strong>Over-permissioned agent capability amplification:</strong> Standing
          broad privileges granted to high-reasoning-capability agents create an
          elevated blast radius even absent direct compromise. An agent's ability to
          autonomously discover, plan, and chain tool invocations means that
          coarse-grained or long-lived permissions — such as persistent OAuth scopes
          in MCP environments — allow a single agent, whether manipulated or operating
          within its intended parameters, to traverse privilege boundaries across
          systems. Authorization design for agentic systems must be ephemeral and
          context-scoped, re-evaluated per action rather than granted at
          initialization.
      - >
        Rogue Actions are related to Insecure Integrated Components, but differ by the
        degree of model functionality or agency.  The severity of a rogue action is 
        directly proportional to the agent's capabilities, and the possibility that an 
        agent has excessive functionality or permissions available to it increases the 
        risk and blast radius of Rogue Actions when compared to Insecure Integrated 
        Components.
    category: risksRuntimeOutputSecurity
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelConsumer
    controls:
      - controlAgentPluginPermissions
      - controlAgentPluginUserControl
      - controlOutputValidationAndSanitization
      - controlAgentObservability
    examples:
      - >
        An attack on ChatGPT plugins was described in
        <a href="https://embracethered.com/blog/posts/2023/chatgpt-plugin-vulns-chat-with-code/"
        target="_blank" rel="noopener">Plugin Vulnerabilities: Visit a Website and
        Have Your Source Code Stolen</a>.
      - >
        The <a href="https://generalanalysis.com/blog/supabase-mcp-blog"
        target="_blank" rel="noopener">Supabase/Cursor data exfiltration (2025)</a>
        demonstrated capability amplification through over-permissioned agents: a
        developer's Cursor IDE agent connected to Supabase using service_role
        credentials that bypassed all Row-Level Security. An attacker embedded SQL
        exfiltration commands in a support ticket, and when the agent summarized
        tickets it executed the attacker's commands with its elevated permissions,
        traversing privilege boundaries the ticket author could never cross
        directly.
    tourContent:
      introduced:
        - >
          The risk of Rogue Actions is introduced when agents or plugins are integrated
          into an AI system, expanding the potential scope of actions that model output
          can trigger.
      exposed:
        - >
          This vulnerability is exposed during application usage, when model outputs
          inadvertently trigger unintended actions in another extension.
      mitigated:
        - >
          Mitigation involves model output handling and granting minimal, ephemeral,
          context-scoped permissions to agents and plugins — re-evaluated per action
          rather than granted at initialization. Human review of delegated actions
          remains necessary for added oversight, particularly for capability
          amplification across trust boundaries.
    mappings:
      mitre-atlas:
        - AML.T0051
        - AML.T0086
      stride:
        - tampering
        - elevation-of-privilege
      owasp-top10-llm:
        - LLM06
    lifecycleStage:
      - runtime
    impactType:
      - integrity
      - safety
      - confidentiality
      - availability
    actorAccess:
      - external
      - api
      - user
      - agent
  - id: riskAcceleratorAndSystemSideChannels
    title: Accelerator and System Side-channels
    shortDescription:
      - >
        Cross-tenant leakage via hardware side-channels in CPUs, GPUs, TPUs, memory
        systems, and interconnects. These vulnerabilities exploit timing, cache,
        speculative execution, and memory access patterns to compromise data
        confidentiality and infer sensitive information in shared computing
        environments.
    longDescription:
      - >
        In cloud and multi-tenant environments, AI systems rely on complex, shared
        hardware stacks. This resource sharing creates opportunities for side-channel
        attacks, where one tenant can exploit the physical properties of the
        hardware (like timing variations or cache behavior) to infer sensitive
        information from another tenant.
      - >
        Examples of these vulnerabilities are well-known: CPU-level attacks
        include cache timing (Flush+Reload) and speculative execution (Spectre,
        Meltdown), while memory attacks target DRAM (Rowhammer) or bus contention.
        Accelerators like GPUs and TPUs have their own vulnerabilities,
        exploiting shared memory, execution units, or interconnects.
      - >
        An attacker can exploit these channels to extract sensitive AI assets,
        including model weights, training data, private inputs, or cryptographic
        keys. These attacks bypass traditional software-based security by exploiting
        fundamental hardware properties. The risk is highest in shared environments 
        where an attacker can co-locate their workload with a victim's.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlSecureByDefaultMLTooling
      - controlModelAndDataAccessControls
      - controlIsolatedConfidentialComputing
    examples:
      - >
        Research has demonstrated <a href="https://arxiv.org/abs/2006.12784" target="_blank"
        rel="noopener">GPU side-channel attacks</a> that can extract neural network
        weights and training data from co-located processes on shared GPU hardware.
      - >
        Security researchers have shown <a href="https://arxiv.org/abs/2505.06738"
        target="_blank" rel="noopener">cache-based side-channel attacks</a> on
        local LLM inference that can leak sensitive input and output text by
        exploiting hardware cache access patterns.
    tourContent:
      introduced:
        - >
          Accelerator and System Side-channels are introduced when AI workloads share
          hardware resources (CPUs, GPUs, TPUs, memory systems, interconnects) without
          adequate isolation mechanisms, allowing malicious processes to exploit timing,
          cache, speculative execution, or memory access patterns to extract information
          from co-located tenants.
      exposed:
        - >
          This risk is exposed during model training, inference, or serving when
          multiple tenants share hardware infrastructure in cloud or multi-tenant
          environments, creating opportunities for side-channel attacks to extract
          sensitive information including model weights, training data, private inputs,
          or cryptographic keys from concurrent workloads.
      mitigated:
        - >
          Mitigation involves implementing hardware-level isolation (dedicated instances,
          partitioning), deploying microarchitectural defenses (cache partitioning,
          disabling hyperthreading), applying operating system protections (kernel
          page-table isolation, retpolines), using secure scheduling algorithms, applying
          noise injection or randomization techniques, and monitoring for anomalous
          access patterns indicative of side-channel attacks.
  - id: riskEconomicDenialOfWallet
    title: Economic Denial of Wallet
    shortDescription:
      - >
        Cost abuse via token inflation, long context, or tool loops that spike spend.
        Economic Denial of Wallet can lead to unexpected financial losses and service
        disruption through resource exhaustion attacks.
    longDescription:
      - >
        Attacks designed to cause excessive computational or financial costs by
        exploiting AI service pricing models, resource consumption patterns, or
        billing mechanisms to drain budgets or exhaust allocated resources.
      - >
        Many AI services operate on usage-based pricing models where costs scale
        with token consumption, compute time, API calls, or resource utilization.
        Attackers can exploit these models through various techniques including
        token inflation attacks (crafting prompts that generate extremely long
        responses), context window abuse (using maximum context lengths repeatedly),
        recursive tool calling, or triggering expensive operations.
      - >
        Economic attacks can be particularly devastating because they directly
        impact operational budgets and can force service shutdowns when cost limits
        are reached. Attackers may use automated scripts to repeatedly trigger
        expensive operations, exploit pricing arbitrage between different service
        tiers, or abuse free trial periods to maximize damage.
      - >
        The risk extends beyond direct API abuse to include attacks on model
        serving infrastructure where malicious inputs are designed to maximize
        computational overhead, memory usage, or processing time. These attacks
        can also target auto-scaling mechanisms to force unnecessary resource
        provisioning and associated costs.
    category: risksRuntimeInputSecurity
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelConsumer
    controls:
      - controlApplicationAccessManagement
      - controlAgentExecutionBounds
    examples:
      - >
        Research has shown <a href="https://arxiv.org/abs/2410.10760" target="_blank"
        rel="noopener">denial-of-service poisoning attacks</a> where injecting a
        single malicious training sample via a fine-tuning API can force LLMs to
        generate maximum-length outputs, amplifying inference costs.
      - >
        Security studies demonstrate <a href="https://arxiv.org/abs/2512.07086" target="_blank"
        rel="noopener">resource exhaustion attacks on LLM APIs</a> where crafted
        prompts cause infinite generation loops, achieving 100x latency increases
        and reducing throughput to 1% of normal capacity.
    tourContent:
      introduced:
        - >
          Economic Denial of Wallet risks are introduced when AI services lack
          proper cost controls, rate limiting, or resource monitoring, allowing
          malicious actors to exploit pricing models and resource consumption
          patterns to cause financial damage.
      exposed:
        - >
          This risk is exposed during service usage when attackers submit requests
          designed to maximize costs, trigger expensive operations, or exhaust
          allocated budgets through automated or manual abuse of pricing mechanisms.
      mitigated:
        - >
          Mitigation involves implementing robust cost quotas and guardrails,
          rate limiting and usage monitoring, anomaly detection for unusual
          consumption patterns, and access controls to prevent unauthorized
          or excessive resource usage.
  - id: riskFederatedDistributedTrainingPrivacy
    title: Federated/Distributed Training Privacy
    shortDescription:
      - >
        Gradient leakage and inversion attacks from untrusted clients in federated
        learning. Federated/Distributed Training Privacy risks can expose sensitive
        training data and compromise participant privacy.
    longDescription:
      - >
        Privacy breaches in federated learning systems where malicious participants
        or compromised clients can extract sensitive information from gradient
        updates, model parameters, or aggregation processes.
      - >
        Federated learning enables collaborative model training without centralizing
        raw data, but the shared gradient updates and model parameters can leak
        sensitive information about participants' private datasets. Attackers can
        use gradient inversion techniques, membership inference attacks, or property
        inference to reconstruct training samples, identify dataset characteristics,
        or determine if specific data points were used in training.
      - >
        The risk is amplified when federated learning systems lack proper privacy
        protections such as differential privacy, secure aggregation, or robust
        participant verification. Malicious clients can also poison the training
        process by submitting adversarial gradients designed to compromise model
        integrity while extracting information from honest participants.
      - >
        Advanced attacks may exploit the iterative nature of federated learning
        to gradually extract information over multiple training rounds, use auxiliary
        information to enhance reconstruction attacks, or coordinate between multiple
        compromised clients to amplify privacy breaches.
    category: risksSupplyChainAndDevelopment
    personas:
      - personaModelProvider
      - personaDataProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
    controls:
      - controlModelPrivacyEnhancingTechnologies
      - controlRuntimePrivacyEnhancingTechnologies
      - controlModelAndDataIntegrityManagement
      - controlSecureByDefaultMLTooling
    examples:
      - >
        Research demonstrates <a href="https://arxiv.org/abs/1906.08935" target="_blank"
        rel="noopener">gradient inversion attacks</a> that can reconstruct private
        training images from gradient updates in federated learning systems.
      - >
        Studies show <a href="https://arxiv.org/abs/2402.06289" target="_blank"
        rel="noopener">membership inference attacks on federated learning</a>
        where attackers can determine if specific data points were used in a
        target client's training set by exploiting updates from all participants.
    tourContent:
      introduced:
        - >
          Federated/Distributed Training Privacy risks are introduced when federated
          learning systems lack adequate privacy protections, participant verification,
          or secure aggregation mechanisms, allowing malicious clients to extract
          sensitive information from shared updates.
      exposed:
        - >
          This risk is exposed during federated training when gradient updates
          or model parameters are shared between participants, creating opportunities
          for privacy attacks that can reconstruct private data or infer sensitive
          information about other participants.
      mitigated:
        - >
          Mitigation involves implementing differential privacy mechanisms, secure
          multi-party computation for aggregation, robust participant authentication,
          gradient compression and noise injection, and monitoring for anomalous
          client behavior during training.
  - id: riskAdapterPEFTInjection
    title: Adapter/PEFT Injection
    shortDescription:
      - >
        Trojaned adapters merged at runtime to bypass safety or exfiltrate data.
        Adapter/PEFT Injection can compromise model behavior and enable unauthorized
        access to sensitive information or system resources.
    longDescription:
      - >
        Malicious injection of compromised adapters, LoRA modules, or Parameter-Efficient
        Fine-Tuning (PEFT) components that contain backdoors, trojans, or malicious
        functionality designed to subvert model behavior or extract sensitive information.
      - >
        Modern AI systems increasingly use adapter-based approaches like LoRA
        (Low-Rank Adaptation), prefix tuning, or other PEFT methods to customize
        foundation models for specific tasks without full retraining. These adapters
        are often shared through repositories, marketplaces, or collaborative platforms,
        creating opportunities for supply chain attacks where malicious actors
        distribute trojaned adapters.
      - >
        Compromised adapters can be designed to activate under specific trigger
        conditions, bypass safety guardrails, exfiltrate sensitive data from prompts
        or model states, or redirect model outputs to serve attacker objectives.
        The modular nature of adapters makes detection challenging since the malicious
        functionality may only manifest under specific conditions or inputs.
      - >
        Runtime adapter injection attacks can also exploit vulnerabilities in
        adapter loading mechanisms, merge processes, or dynamic adapter switching
        to inject malicious components into otherwise secure model deployments.
        These attacks may target adapter repositories, compromise distribution
        channels, or exploit weak verification processes.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlModelAndDataExecutionIntegrity
      - controlModelAndDataIntegrityManagement
      - controlModelAndDataAccessControls
      - controlSecureByDefaultMLTooling
    examples:
      - >
        Research demonstrates <a href="https://arxiv.org/abs/2403.00108" target="_blank"
        rel="noopener">backdoor attacks on LoRA adapters</a> where malicious
        fine-tuning components can compromise model behavior while appearing benign.
      - >
        Security studies show <a href="https://arxiv.org/abs/2310.00648" target="_blank"
        rel="noopener">trojan attacks targeting parameter-efficient fine-tuning</a>
        where compromised model weights propagate backdoors through downstream
        PEFT adaptation.
    tourContent:
      introduced:
        - >
          Adapter/PEFT Injection risks are introduced when adapter loading systems
          lack proper verification mechanisms, integrity checks, or secure distribution
          channels, allowing malicious actors to inject compromised adapters into
          model deployments.
      exposed:
        - >
          This risk is exposed during adapter loading, merging, or runtime switching
          when trojaned components are integrated into model systems, potentially
          activating malicious functionality or compromising model behavior under
          specific trigger conditions.
      mitigated:
        - >
          Mitigation involves implementing cryptographic verification of adapter
          integrity, secure adapter repositories with provenance tracking, runtime
          monitoring for anomalous behavior, sandboxed adapter loading processes,
          and comprehensive testing of adapter functionality before deployment.
  - id: riskToolRegistryTampering
    title: Tool Registry Tampering
    shortDescription:
      - >
        Compromise of previously vetted tool registries, MCP server manifests,
        or tool metadata, causing agents to select and invoke unintended tools
        through altered descriptions, schemas, or shadowed tool names.
    longDescription:
      - >
        Even when tool registries and MCP server manifests have been properly
        vetted and approved, they remain targets for post-vetting compromise.
        Attackers who gain access to a trusted registry can alter tool
        descriptions, modify schemas, or inject shadowed tool entries that
        redirect agent tool selection.
      - >
        This risk is distinct from <a href="#riskToolSourceProvenance">Tool Source Provenance</a>,
        which addresses the use of unvetted sources. riskToolRegistryTampering assumes the source
        was properly vetted but was subsequently compromised. The trust model
        is different: riskToolSourceProvenance is a failure to verify, while riskToolRegistryTampering is a failure of
        ongoing integrity assurance.
      - >
        riskToolRegistryTampering is structurally related to <a href="#riskOrchestratorRouteHijacking">Orchestrator/Route
        Hijack</a>, which targets model routing configuration. Both involve
        tampering with metadata that directs system behavior, but riskOrchestratorRouteHijacking
        operates on model routing infrastructure while riskToolRegistryTampering operates on tool
        discovery and selection mechanisms. A successful riskToolRegistryTampering exploit
        typically manifests as <a href="#riskRogueActions">Rogue Actions</a>.
      - >
        The attack surface includes tool registry databases, MCP server
        manifest files, schema definition endpoints, and discovery service
        APIs. Compromise may be persistent (modified registry entries) or
        transient (man-in-the-middle on discovery endpoints). Detection
        requires runtime integrity monitoring of tool metadata against
        known-good baselines.
      - >
        <a href="#riskInsecureIntegratedComponent">Insecure Integrated Component</a> addresses
        vulnerabilities in the tools themselves. riskToolRegistryTampering is complementary:
        it addresses the metadata that causes the agent to select a
        particular tool, regardless of whether the selected tool is
        itself secure.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaModelServing
    controls:
      - controlOrchestratorAndRouteIntegrity
      - controlAgentObservability
      - controlInterComponentTransportSecurity
    examples:
      - >
        <a href="https://www.paloaltonetworks.com/blog/cloud-security/model-context-protocol-mcp-a-security-overview/"
        target="_blank" rel="noopener">Palo Alto Networks</a> identified MCP
        security risks including prompt injection through compromised servers,
        credential exposure, and unverified third-party tool adoption.
      - >
        <a href="https://invariantlabs.ai/blog/mcp-security-notification-tool-poisoning-attacks"
        target="_blank" rel="noopener">Invariant Labs demonstrated</a>
        (April 2025) that MCP servers can silently modify tool descriptions
        after initial user approval, exfiltrating SSH keys and MCP
        credentials from Claude Desktop and Cursor without triggering
        re-approval prompts.
      - >
        A <a href="https://blog.gitguardian.com/breaking-mcp-server-hosting/"
        target="_blank" rel="noopener">tenant isolation failure</a>
        in the Smithery.ai MCP server hosting platform (October 2025)
        demonstrated that infrastructure compromise of a trusted registry
        can enable modification of hosted tool definitions across 3,000+
        MCP servers, allowing attackers to redirect agent tool selection
        at scale on a previously vetted platform.
    relevantQuestions:
      - Could a previously vetted tool registry or MCP server manifest be modified without triggering an integrity alert?
      - Do you monitor for unauthorized changes to tool descriptions, schemas, or metadata after initial registration?
      - Can tools in your system update their own descriptions or capabilities without explicit re-approval?
    tourContent:
      introduced:
        - >
          Tool Registry Tampering risk is introduced when vetted tool
          registries, MCP server manifests, or discovery endpoints lack
          ongoing integrity monitoring and tamper detection.
      exposed:
        - >
          This risk is exposed at deployment and runtime when compromised
          tool metadata redirects agent tool selection, causing invocation
          of unintended or malicious tools despite prior vetting.
      mitigated:
        - >
          Mitigation involves runtime integrity monitoring of tool metadata
          against known-good baselines, configuration integrity verification,
          anomalous tool selection detection, and vulnerability management
          for registry infrastructure.
    mappings:
      mitre-atlas:
        - AML.T0010.004
      stride:
        - tampering
      owasp-top10-llm:
        - LLM06
    lifecycleStage:
      - deployment
      - runtime
    impactType:
      - confidentiality
      - integrity
      - safety
    actorAccess:
      - external
      - agent
      - privileged
  - id: riskOrchestratorRouteHijacking
    title: Orchestrator/Route Hijack
    shortDescription:
      - >
        Silent model or route swaps via configuration tampering or prompt-based
        routing abuse. Orchestrator/Route Hijack can redirect requests to malicious
        models or compromise routing integrity in AI systems.
    longDescription:
      - >
        Attacks that manipulate AI orchestration systems, routing mechanisms, or
        configuration management to redirect requests to unauthorized models, compromise
        routing decisions, or subvert intended model selection processes.
      - >
        Modern AI deployments often use orchestration systems that route requests
        to different models based on various criteria such as prompt content, user
        context, load balancing, or cost optimization. Attackers can exploit vulnerabilities
        in these routing systems to redirect traffic to malicious models, compromise
        routing logic, or manipulate configuration files to alter intended behavior.
      - >
        Route hijacking attacks can target various components including configuration
        management systems, routing tables, load balancers, API gateways, or prompt-based
        routing logic. Malicious actors may inject crafted prompts designed to
        trigger routing to compromised models, exploit weak authentication in routing
        decisions, or tamper with configuration files to establish persistent redirections.
      - >
        The impact of successful route hijacking can be severe, as attackers can
        redirect users to models under their control, potentially exposing sensitive
        data, delivering malicious responses, or bypassing safety mechanisms. These
        attacks may be difficult to detect if the malicious models provide plausible
        responses while secretly logging data or performing unauthorized actions.
    category: risksRuntimeOutputSecurity
    personas:
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlIsolatedConfidentialComputing
      - controlModelAndDataIntegrityManagement
      - controlModelAndDataAccessControls
      - controlSecureByDefaultMLTooling
      - controlOrchestratorAndRouteIntegrity
      - controlInterComponentTransportSecurity
    examples:
      - >
        Security research shows <a href="https://arxiv.org/abs/2501.01818" target="_blank"
        rel="noopener">prompt-based routing attacks</a> where crafted inputs can
        manipulate AI orchestration systems to route requests to unintended models.
      - >
        A <a href="https://nvd.nist.gov/vuln/detail/CVE-2026-24779" target="_blank"
        rel="noopener">server-side request forgery vulnerability in vLLM</a>
        (CVE-2026-24779, patched in 0.14.1) demonstrated that host restriction
        bypasses in AI serving infrastructure can allow attackers to coerce the
        server into making arbitrary requests to internal network resources.
    tourContent:
      introduced:
        - >
          Orchestrator/Route Hijack risks are introduced when AI routing and orchestration
          systems lack proper access controls, integrity verification, or secure
          configuration management, allowing attackers to manipulate routing decisions
          or redirect requests to unauthorized models.
      exposed:
        - >
          This risk is exposed during request routing and model selection when
          compromised orchestration logic redirects traffic to malicious models
          or when configuration tampering alters intended routing behavior, potentially
          exposing users to unauthorized or compromised AI systems.
      mitigated:
        - >
          Mitigation involves implementing secure configuration management with
          integrity verification, robust access controls for routing systems,
          cryptographic signing of routing configurations, monitoring for anomalous
          routing patterns, and validation of model endpoints before request forwarding.
  - id: riskEvaluationBenchmarkManipulation
    title: Evaluation/Benchmark Manipulation
    shortDescription:
      - >
        Poisoned or leaked evaluation sets misleading safety and robustness signals.
        Evaluation/Benchmark Manipulation can compromise model assessment accuracy
        and lead to deployment of unsafe or unreliable AI systems.
    longDescription:
      - >
        Attacks that compromise the integrity of evaluation datasets, benchmarks,
        or assessment processes used to measure AI model performance, safety, or
        robustness, leading to misleading or false quality signals.
      - >
        Reliable evaluation is critical for assessing AI model capabilities, safety,
        and robustness before deployment. Attackers can compromise this process
        by poisoning evaluation datasets with crafted examples, leaking evaluation
        data to enable overfitting, manipulating benchmark results, or exploiting
        weaknesses in evaluation methodologies to make models appear safer or more
        capable than they actually are.
      - >
        Evaluation manipulation can occur through various vectors including data
        poisoning of benchmark datasets, insider threats that leak evaluation sets,
        adversarial examples designed to fool specific evaluation metrics, or
        systematic gaming of evaluation processes. The impact is particularly severe
        for safety-critical applications where compromised evaluations could lead
        to deployment of dangerous systems.
      - >
        Advanced attacks may target the evaluation infrastructure itself, compromise
        evaluation frameworks or tools, manipulate automated evaluation pipelines,
        or exploit biases in evaluation methodologies to achieve favorable but
        misleading results. These attacks can be difficult to detect and may have
        long-lasting impacts on model development and deployment decisions.
    category: risksRuntimeDataSecurity
    personas:
      - personaModelProvider
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
    controls:
      - controlModelAndDataIntegrityManagement
    examples:
      - >
        Research demonstrates <a href="https://arxiv.org/abs/2502.13295" target="_blank"
        rel="noopener">benchmark gaming attacks</a> where reasoning models hack
        benchmarks by exploiting task specifications rather than developing genuine
        capability.
      - >
        Studies show <a href="https://arxiv.org/abs/2510.13570" target="_blank"
        rel="noopener">selective adversarial attacks on LLM benchmarks</a> where
        semantic-preserving perturbations to evaluation questions can manipulate
        model rankings and mislead assessment processes.
    tourContent:
      introduced:
        - >
          Evaluation/Benchmark Manipulation risks are introduced when evaluation
          processes lack proper security controls, dataset integrity verification,
          or protection against data leakage, allowing attackers to compromise
          assessment accuracy and reliability.
      exposed:
        - >
          This risk is exposed during model evaluation and benchmarking when
          compromised datasets or manipulated evaluation processes produce misleading
          results, potentially leading to deployment of unsafe or unreliable models
          based on false quality signals.
      mitigated:
        - >
          Mitigation involves implementing secure evaluation pipelines with dataset
          integrity verification, using diverse and protected evaluation sets,
          employing red teaming and adversarial testing, monitoring for evaluation
          anomalies, and maintaining strict access controls for evaluation data.
  - id: riskCovertChannelsInModelOutputs
    title: Covert Channels in Model Outputs
    shortDescription:
      - >
        Hidden information transmission through model outputs or behavior patterns.
        Covert Channels in Model Outputs can enable unauthorized data exfiltration
        and steganographic communication bypassing security controls.
    longDescription:
      - >
        Exploitation of AI model outputs, behavior patterns, or response characteristics
        to establish hidden communication channels for unauthorized information
        transmission, data exfiltration, or steganographic messaging.
      - >
        AI models can be exploited to create covert communication channels through
        various mechanisms including steganographic encoding in generated text,
        images, or other outputs, subtle manipulation of response timing or patterns,
        exploitation of model randomness or sampling behavior, or encoding information
        in model confidence scores or attention patterns.
      - >
        These attacks can be used to exfiltrate sensitive information from restricted
        environments, establish command and control channels for malware, bypass
        network monitoring and data loss prevention systems, or enable unauthorized
        communication between isolated systems. The covert nature of these channels
        makes them particularly difficult to detect using traditional security monitoring.
      - >
        Advanced covert channel attacks may exploit model artifacts such as embedding
        spaces, latent representations, or internal model states to hide information.
        Attackers might also use adversarial techniques to encode data in model
        outputs that appear normal to human observers but contain hidden information
        extractable through specific decoding methods.
    category: risksRuntimeOutputSecurity
    personas:
      - personaModelServing
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlOutputValidationAndSanitization
      - controlModelAndDataIntegrityManagement
    examples:
      - >
        Research demonstrates <a href="https://arxiv.org/abs/2410.03768" target="_blank"
        rel="noopener">emergent steganographic collusion in LLMs</a> where models
        trained with misspecified reward incentives spontaneously develop hidden
        encoding schemes in generated text, undetectable by standard oversight.
      - >
        Studies show <a href="https://arxiv.org/abs/2410.17175" target="_blank"
        rel="noopener">remote timing attacks on LLM inference</a> where
        efficiency optimizations introduce data-dependent timing that leaks
        conversation topics and PII through encrypted network traffic.
    tourContent:
      introduced:
        - >
          Covert Channels in Model Outputs are introduced when AI systems lack
          proper output monitoring, steganography detection, or behavioral analysis
          capabilities, allowing attackers to exploit model outputs for hidden
          information transmission.
      exposed:
        - >
          This risk is exposed during model usage when attackers encode hidden
          information in model outputs, response patterns, or behavioral characteristics,
          potentially enabling unauthorized data exfiltration or covert communication
          that bypasses traditional security controls.
      mitigated:
        - >
          Mitigation involves implementing comprehensive output validation and
          sanitization, deploying steganography detection systems, monitoring
          for anomalous response patterns, analyzing model behavior for covert
          channels, and applying randomization techniques to disrupt potential
          information encoding mechanisms.
  - id: riskMaliciousLoaderDeserialization
    title: Malicious Loader/Deserialization
    shortDescription:
      - >
        Unsafe loaders for models and tokenizers that can cause remote code execution
        or integrity compromise. Malicious Loader/Deserialization poses significant
        security risks including system compromise and data breaches.
    longDescription:
      - >
        Exploitation of unsafe deserialization processes or malicious model loading
        mechanisms that can lead to remote code execution, system compromise, or
        integrity violations when loading AI models, tokenizers, or related artifacts.
      - >
        Many AI frameworks use serialization formats like pickle, joblib, or custom
        binary formats to store and load models, weights, tokenizers, and preprocessing
        pipelines. These formats can contain executable code that runs during the
        deserialization process. Attackers can craft malicious model files that
        execute arbitrary code when loaded, potentially compromising the entire system.
      - >
        This risk extends beyond traditional pickle-based attacks to include malicious
        model architectures, compromised tokenizer configurations, and poisoned
        preprocessing pipelines. Even seemingly safe formats can be exploited through
        buffer overflows, path traversal attacks, or by exploiting vulnerabilities
        in parsing libraries.
      - >
        The attack surface is particularly large because model loading often occurs
        with elevated privileges, and users frequently download models from untrusted
        sources or model repositories without proper verification. Malicious loaders
        can also be used to establish persistence, exfiltrate data, or serve as entry
        points for further attacks on AI infrastructure.
      - >
        Modern attacks may also target container images, model serving frameworks,
        or cloud-based model repositories, making the threat landscape even more
        complex and requiring comprehensive security measures throughout the model
        lifecycle.
    category: risksSupplyChainAndDevelopment
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlInputValidationAndSanitization
      - controlModelAndDataAccessControls
      - controlModelAndDataExecutionIntegrity
      - controlModelAndDataIntegrityManagement
      - controlSecureByDefaultMLTooling
    examples:
      - >
        Research has demonstrated <a href="https://blog.trailofbits.com/2021/03/15/never-a-dill-moment-exploiting-machine-learning-pickle-files/"
        target="_blank" rel="noopener">pickle deserialization attacks</a> where
        malicious model files execute arbitrary code during loading.
      - >
        Security researchers have shown <a href="https://hiddenlayer.com/research/weaponizing-machine-learning-models-with-ransomware/"
        target="_blank" rel="noopener">weaponized ML models</a> that can deploy
        ransomware or establish backdoors when loaded by unsuspecting users.
      - >
        Studies reveal <a href="https://arxiv.org/abs/2601.14163" target="_blank"
        rel="noopener">widespread remote code execution risks in ML model hosting
        ecosystems</a> where unsafe deserialization and custom code execution
        during model loading affect tens of thousands of repositories.
    tourContent:
      introduced:
        - >
          Malicious Loader/Deserialization risks are introduced when model loading
          processes use unsafe deserialization methods, lack proper input validation,
          or fail to verify the integrity and authenticity of model files before
          loading them into memory.
      exposed:
        - >
          This risk is exposed during model loading and initialization phases when
          malicious code embedded in model files, tokenizers, or related artifacts
          is executed, potentially compromising the entire system or infrastructure.
      mitigated:
        - >
          Mitigation involves using secure serialization formats, implementing strict
          input validation and sanitization, verifying model integrity through
          cryptographic signatures, sandboxing model loading processes, and using
          secure-by-default ML tooling that prevents code execution during deserialization.
  - id: riskToolSourceProvenance
    title: Tool Source Provenance
    shortDescription:
      - >
        Use of unvetted or unverified tool registries, MCP server manifests,
        or tool metadata sources that may provide agents with deceptive tool
        descriptions, altered schemas, or shadowed tool names.
    longDescription:
      - >
        Agents depend on tool metadata from registries, MCP server manifests,
        and discovery endpoints to decide which tools to invoke. When these
        sources are adopted without provenance verification, cryptographic
        signing, or publisher identity validation, the agent may receive
        deliberately deceptive tool descriptions or schemas.
      - >
        This risk operates at the tool selection layer, before a prompt is
        constructed. Unlike <a href="#riskPromptInjection">Prompt Injection</a>, which
        targets model input processing, riskToolSourceProvenance targets the trust assumptions
        in tool discovery. The agent's reasoning core treats tool metadata
        as authoritative, and unvetted sources exploit that trust.
      - >
        Attack patterns include Tool Poisoning (malicious logic hidden in
        tool descriptions), Tool Shadowing and Typosquatting (lookalike tools
        using similar names or Unicode homoglyphs), and Schema Poisoning
        (configuration files that alter tool behavior). These were
        cataloged by Checkmarx in their MCP risk taxonomy (December 2025).
      - >
        riskToolSourceProvenance is structurally analogous to <a href="#riskModelSourceTampering">Model Source
        Tampering</a>, which addresses unvetted model artifacts in the
        supply chain. Both are provenance failures where untrusted sources
        are consumed without verification. A successful riskToolSourceProvenance exploit
        typically manifests as <a href="#riskRogueActions">Rogue Actions</a> when the
        agent invokes the wrong tool.
    category: risksSupplyChainAndDevelopment
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
    controls:
      - controlModelAndDataIntegrityManagement
      - controlSecureByDefaultMLTooling
      - controlAgentPluginPermissions
    examples:
      - >
        The <a href="https://checkmarx.com/zero-post/11-emerging-ai-security-risks-with-mcp-model-context-protocol/"
        target="_blank" rel="noopener">Checkmarx CxZero MCP Risk Taxonomy</a>
        (December 2025) identified Tool Poisoning, Tool Shadowing, and Schema
        Poisoning as three of the top 11 MCP security risks.
      - >
        The NeurIPS 2025 paper <a href="https://arxiv.org/html/2508.02110v2"
        target="_blank" rel="noopener">"Attractive Metadata Attack"</a>
        demonstrated that metadata manipulation alone is sufficient to redirect
        tool selection in agentic systems, achieving 81-95% attack success rates.
    relevantQuestions:
      - Do you discover or register tools from third-party sources without verifying the publisher's identity or provenance?
      - Do you allow tool registries or MCP server manifests to be added to your system without cryptographic signature verification?
      - Does your tool selection process rely on tool descriptions or metadata without independent validation of the tool's claimed functionality?
    tourContent:
      introduced:
        - >
          Tool Source Provenance risk is introduced when tool registries,
          MCP server manifests, or discovery endpoints are adopted without
          provenance verification or publisher identity validation.
      exposed:
        - >
          This risk is exposed during tool discovery and selection when
          agents consume unvetted tool metadata and make invocation
          decisions based on unverified descriptions or schemas.
      mitigated:
        - >
          Mitigation involves cryptographic signing of tool manifests,
          publisher identity verification, namespace governance to prevent
          typosquatting, and least-privilege tool access policies.
    mappings:
      mitre-atlas:
        - AML.T0010.001
      stride:
        - spoofing
      owasp-top10-llm:
        - LLM03
        - LLM06
    lifecycleStage:
      - development
      - deployment
    impactType:
      - confidentiality
      - integrity
      - safety
    actorAccess:
      - supply-chain
      - agent
      - external
  - id: riskPromptResponseCachePoisoning
    title: Prompt/Response Cache Poisoning
    shortDescription:
      - >
        Cross-user contamination via shared LLM caches lacking isolation and validation.
        Prompt/Response Cache Poisoning can lead to information leakage, misinformation
        propagation, and unauthorized access to cached content.
    longDescription:
      - >
        Malicious manipulation of shared prompt and response caches used by language
        model systems to optimize performance, resulting in cross-user contamination
        and potential security breaches.
      - >
        Many LLM deployments use caching mechanisms to store frequently accessed prompts
        and their corresponding responses to reduce computational costs and improve
        response times. When these caches lack proper isolation, validation, or access
        controls, attackers can exploit them to inject malicious content, extract
        sensitive information from other users' sessions, or manipulate responses
        served to subsequent users.
      - >
        Cache poisoning attacks can occur through several vectors: injecting crafted
        prompts designed to pollute cache entries, exploiting weak cache key generation
        that allows cache collisions, or compromising cache storage systems directly.
        The attack becomes particularly dangerous when cached responses contain sensitive
        information, personal data, or malicious instructions that get served to
        unintended users.
      - >
        This risk is amplified in multi-tenant environments where multiple users or
        applications share the same caching infrastructure without adequate isolation.
        Attackers may also exploit cache timing attacks to infer information about
        cached content or use cache behavior to fingerprint other users' activities.
    category: risksRuntimeDataSecurity
    personas:
      - personaModelServing
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlModelAndDataAccessControls
      - controlModelAndDataIntegrityManagement
      - controlInputValidationAndSanitization
      - controlOutputValidationAndSanitization
      - controlUserDataManagement
    examples:
      - >
        Research has shown <a href="https://arxiv.org/abs/2601.23088" target="_blank"
        rel="noopener">semantic cache key collision attacks</a> where crafted
        prompts can hijack cached LLM responses, serving attacker-controlled
        content to other users through shared caching mechanisms.
      - >
        Studies demonstrate <a href="https://arxiv.org/abs/2508.09442" target="_blank"
        rel="noopener">privacy risks in KV-cache systems</a> where user inputs
        can be reconstructed from plaintext cache contents in multi-tenant LLM
        serving infrastructure.
    tourContent:
      introduced:
        - >
          Prompt/Response Cache Poisoning is introduced when caching systems lack
          proper isolation mechanisms, validation of cached content, or secure cache
          key generation, allowing malicious actors to manipulate shared cache entries.
      exposed:
        - >
          This risk is exposed during model serving when poisoned cache entries are
          retrieved and served to users, potentially delivering malicious content,
          sensitive information, or manipulated responses from previous interactions.
      mitigated:
        - >
          Mitigation involves implementing strong cache isolation per user or tenant,
          validating cached content integrity, using cryptographically secure cache
          keys, and applying access controls to prevent unauthorized cache manipulation.
  - id: riskRetrievalVectorStorePoisoning
    title: Retrieval/Vector Store Poisoning
    shortDescription:
      - >
        Poisoning retrieval corpora or vector indices to steer RAG outputs. Retrieval/Vector
        Store Poisoning can compromise the integrity of knowledge retrieval systems and
        lead to misinformation or malicious content injection.
    longDescription:
      - >
        Malicious modification of retrieval corpora, vector databases, or knowledge
        bases used in Retrieval-Augmented Generation (RAG) systems to influence model
        outputs in unintended ways.
      - >
        This attack involves injecting poisoned documents, embeddings, or metadata
        into vector stores or retrieval systems that are used to provide context to
        language models. When users query the system, the poisoned content gets retrieved
        and incorporated into the model's response, potentially spreading misinformation,
        biased content, or malicious instructions.
      - >
        Attackers may exploit vulnerabilities in data ingestion pipelines, compromise
        data sources, or use adversarial techniques to craft documents that rank highly
        in similarity searches while containing harmful content. The attack can be
        particularly effective because users often trust retrieved information as factual
        and authoritative.
      - >
        Vector store poisoning can also involve manipulating embedding spaces through
        adversarial examples that appear semantically similar to legitimate queries
        but retrieve malicious content, or by exploiting weaknesses in similarity
        metrics used for retrieval ranking.
    category: risksRuntimeOutputSecurity
    personas:
      - personaPlatformProvider
      - personaModelServing
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaEndUser
      - personaModelCreator
      - personaModelConsumer
    controls:
      - controlTrainingDataSanitization
      - controlModelAndDataIntegrityManagement
      - controlInputValidationAndSanitization
      - controlOutputValidationAndSanitization
      - controlRetrievalAndVectorSystemIntegrity
    examples:
      - >
        Researchers have demonstrated <a href="https://arxiv.org/abs/2310.19156"
        target="_blank" rel="noopener">adversarial attacks on retrieval systems</a>
        where malicious documents are crafted to rank highly for specific queries
        while containing harmful content.
      - >
        Studies show that <a href="https://arxiv.org/abs/2402.13532" target="_blank"
        rel="noopener">poisoning attacks on vector databases</a> can successfully
        manipulate RAG system outputs by injecting adversarial embeddings.
    tourContent:
      introduced:
        - >
          Retrieval/Vector Store Poisoning is introduced during data ingestion and
          indexing processes when malicious content is added to knowledge bases, vector
          stores, or retrieval corpora without proper validation and sanitization.
      exposed:
        - >
          This risk is exposed during retrieval and generation phases when poisoned
          content is retrieved and incorporated into model responses, potentially
          spreading misinformation or executing malicious instructions.
      mitigated:
        - >
          Mitigation involves implementing robust data validation and sanitization
          during ingestion, maintaining data integrity through cryptographic verification,
          and filtering both inputs and outputs to detect and prevent malicious content
          retrieval.
  - id: riskAgentDelegationChainOpacity
    title: Agent Delegation Chain Opacity
    shortDescription:
      - >
        Multi-hop agent delegation chains become opaque when intermediate agents
        do not emit structured delegation events, making it impossible to
        determine which human, agent, or system authorized or performed an
        action — even when individual authentication steps succeed.
    longDescription:
      - >
        Agentic systems frequently involve multi-hop delegation where one agent
        acts on behalf of another (or a human) across tools and MCP servers.
        Agent Delegation Chain Opacity occurs when the delegation chain is
        cryptographically valid — each hop holds a properly scoped token — but
        invisible to forensics because intermediate agents do not emit structured
        delegation events. The root cause is the absence of structured delegation
        event emission at each hop, not the failure of individual authentication
        steps.
      - >
        This risk extends classical identity federation accountability failures
        to the agentic domain. In traditional systems, delegation chain integrity
        is a known challenge: Kerberos constrained delegation struggles with
        tracing initiators through multiple hops, multi-hop OAuth OBO flows lose
        the original actor claim when intermediate services fail to propagate it,
        and RFC 8693 Token Exchange is vulnerable to delegation chain splicing
        where a compromised intermediary can forge chains that never occurred.
        The AI-specific amplifier is that agentic orchestration creates delegation
        chains that are longer, more dynamic, and less predictable than classical
        flows — agents may spawn sub-agents autonomously based on LLM reasoning,
        the chain topology is not known at design time, and intermediate agents
        make non-deterministic decisions about whether and how to delegate.
      - >
        The vulnerability manifests through missing or incomplete delegation
        metadata at the IAM, orchestration, or MCP layers — for example,
        omitting the original caller, intermediate agents, or token exchange
        steps in log records. Even when individual agents authenticate correctly,
        the provenance of a given action becomes opaque if correlation IDs and
        delegation context are not preserved in immutable, queryable logs.
      - >
        Potential impacts include inability to investigate incidents (the full
        actor path cannot be reconstructed), inability to attribute actions for
        compliance or forensics, failure to detect anomalous delegation patterns,
        and inability to perform effective credential revocation for a specific
        delegation chain. Consequences include accountability failures, regulatory
        violations, prolonged breach dwell time, and erosion of trust in
        autonomous agent systems.
      - >
        This risk is distinct from riskRogueActions, which addresses what an
        agent does wrong; Agent Delegation Chain Opacity addresses the inability
        to determine who authorized the action. riskAgenticDelegationConfusedDeputy
        addresses authorization failure at delegation boundaries; this risk
        addresses visibility failure across the full chain.
        riskCrossTenantCredentialPropagation addresses credential propagation
        across tenant boundaries, which may be a consequence of delegation chain
        opacity but is a distinct threat surface.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlAgentObservability
      - controlAgentIntegrityManagement
      - controlAgentInventoryManagement
    examples:
      - >
        Palo Alto Networks Unit 42 <a
        href="https://unit42.paloaltonetworks.com/agent-session-smuggling-in-agent2agent-systems/"
        target="_blank" rel="noopener">demonstrated "agent session smuggling"
        (2025)</a> in Google's Agent-to-Agent (A2A) protocol, where a malicious
        remote agent injects hidden instructions during established cross-agent
        communication sessions. The smuggled instructions trigger unauthorized
        tool execution while remaining invisible to end users who only see the
        final consolidated response — the delegation chain is opaque because no
        mechanism exposes intermediate agent activity or attributes the
        unauthorized action to the originating malicious agent.
    tourContent:
      introduced:
        - >
          Introduced during deployment when delegation chain architecture is
          configured — specifically when orchestration layers, IAM policies,
          and MCP server configurations do not require structured delegation
          event emission at each hop.
      exposed:
        - >
          Exposed at runtime when multi-hop agent delegation occurs without
          correlation ID propagation or structured delegation events. The
          opacity persists until an incident requires forensic reconstruction
          of the actor chain, at which point the gap becomes visible.
      mitigated:
        - >
          Mitigated by requiring orchestrators to emit signed delegation spans
          per hop with correlation IDs, actor identifiers, scope deltas, and
          timestamps, bound to an append-only store. Real-time detection of
          missing or out-of-order spans shifts the control from post-incident
          reconstruction to in-flight chain integrity monitoring.
    relevantQuestions:
      - Does every agent action carry an immutable delegation chain with correlation IDs?
      - Can you reconstruct the full actor path (human to agent1 to agent2 to tool) after the fact?
      - Do intermediate agents in your delegation chains emit structured delegation events that downstream consumers and auditors can independently verify?
      - Are delegation logs tamper-proof and accessible only to authorized auditors?
      - How do you detect broken or shadowed delegation chains in real time?
    mappings:
      stride:
        - repudiation
    lifecycleStage:
      - deployment
      - runtime
      - maintenance
    impactType:
      - accountability
      - compliance
      - integrity
    actorAccess:
      - agent
      - privileged
  - id: riskStaleAgentIdentityBinding
    title: Stale Agent Identity Binding
    shortDescription:
      - >
        Agent identity credentials persist unchanged after the underlying model
        artifact is replaced, allowing a substituted model to operate with the
        original agent's full permissions because no cryptographic binding ties
        identity to a specific model version.
    longDescription:
      - >
        In agentic systems, agents are assigned persistent identities with
        associated credentials and OAuth/MCP tokens granting access to tools
        and resources. Stale Agent Identity Binding occurs when the underlying
        model (weights, architecture, or inference endpoint) is replaced without
        invalidating the agent's credentials or identity. The substituted model
        inherits the original agent's full privileges because agent identity
        and model artifact exist on separate infrastructure layers with no
        cryptographic binding between them.
      - >
        This risk is the AI/agentic extension of classical stale credential
        binding failures. In Kubernetes, long-lived service account tokens
        persist after pods are replaced — a new pod running entirely different
        code inherits the previous workload's identity and RBAC permissions.
        In container orchestration, mutable image tags allow the artifact behind
        a tag to be replaced while the service identity persists unchanged. In
        VM environments, machine clones inherit the original's domain credentials
        and certificates. The AI-specific amplifier is that agent identity and
        model artifact are managed by entirely separate infrastructure layers
        (IAM vs. model serving) with no standard binding mechanism. A model can
        be swapped through supply-chain compromise, container replacement, or
        CI/CD manipulation, and the agent's credentials remain valid because
        the identity layer has no awareness of the artifact layer.
      - >
        This risk is distinct from riskModelSourceTampering and
        riskModelDeploymentTampering, which cover the tampering mechanics
        themselves. Stale Agent Identity Binding covers the identity lifecycle
        failure that persists after a swap — the agent continues to authenticate
        with valid credentials regardless of the model behind it.
        riskShadowAndUnknownAgents addresses agents that were never registered;
        this risk addresses registered agents whose identity binding becomes
        stale after the underlying artifact changes.
      - >
        Potential impacts include stealthy behavioral changes (data exfiltration,
        decision manipulation) under legitimate identity, compromise of connected
        tools and MCP servers, and accountability failures because actions are
        attributed to the original authorized model. Consequences include loss
        of integrity, safety incidents, regulatory violations, and systemic
        distrust in deployed agentic systems.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaModelProvider
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlModelAndDataIntegrityManagement
      - controlAgentIntegrityManagement
      - controlAgentCredentialIsolation
      - controlComponentIdentityProvenance
    examples:
      - >
        Zhou's framework for <a href="https://arxiv.org/abs/2603.14332"
        target="_blank" rel="noopener">governing dynamic AI agent capabilities
        (2026)</a> identifies the "capability-identity gap" as the central
        governance failure: an agent's capabilities can change after
        authorization — through silent escalation, underlying model
        substitution, or runtime behavioral drift — without any mechanism to
        detect that the identity credentials still authorizing the agent are
        now bound to a different capability set. The paper evaluates 12 such
        attack scenarios and proposes capability-bound certificates and
        reproducibility commitments as the cryptographic-binding mechanisms
        that close the gap.
    tourContent:
      introduced:
        - >
          Introduced during deployment when agent identities are provisioned
          without cryptographic binding to the specific model artifact they
          authorize, or when model serving infrastructure permits artifact
          replacement without triggering credential re-issuance.
      exposed:
        - >
          Exposed at runtime when the underlying model is replaced — through
          supply-chain compromise, serving infrastructure manipulation, or
          routine model updates — and the agent continues operating with the
          original identity and credentials. The stale binding persists through
          maintenance cycles if re-binding is not part of the update lifecycle.
      mitigated:
        - >
          Mitigated by cryptographic binding of agent identity to specific signed
          model manifests, runtime attestation of the model artifact before
          authorizing tool access, and automated credential invalidation on any
          change to the bound model artifact.
    relevantQuestions:
      - Is the agent identity cryptographically bound to a specific signed model artifact or manifest?
      - Does a model update or swap automatically invalidate or re-scope the agent's credentials?
      - Does the system perform runtime attestation of the model artifact before authorizing tool access?
      - How do you detect model substitution after initial credential issuance?
    mappings:
      stride:
        - spoofing
      mitre-atlas:
        - AML.T0012
    lifecycleStage:
      - deployment
      - runtime
      - maintenance
    impactType:
      - integrity
      - confidentiality
      - accountability
      - compliance
    actorAccess:
      - supply-chain
      - privileged
      - infrastructure-provider
  - id: riskMCPTransportHijacking
    title: MCP Transport Hijacking
    shortDescription:
      - >
        Transport-layer attacks on MCP connections — including man-in-the-middle,
        session hijacking, DNS rebinding, and replay — intercept or modify
        agent-to-tool communication because the MCP specification does not
        mandate transport encryption or mutual authentication.
    longDescription:
      - >
        The Model Context Protocol enables agents to discover and invoke tools
        by communicating with MCP servers over HTTP or stdio. MCP Transport
        Hijacking occurs when these connections lack transport-layer protections,
        allowing attackers to intercept, modify, or replay messages between the
        agent and the tool server.
      - >
        This risk extends classical transport-layer attacks to the MCP protocol.
        TLS stripping, man-in-the-middle interception, and DNS rebinding against
        locally-running services are well-documented attack patterns. The
        AI-specific amplifier is that the MCP specification (2025-11-25) does
        not mandate TLS for Streamable HTTP connections, uses "SHOULD" rather
        than "MUST" for authentication and localhost binding, and provides zero
        transport security for the stdio transport. Agents autonomously connect
        to MCP servers discovered at runtime without human verification of
        transport security properties. Session identifiers transmitted in HTTP
        headers are exposed to interception without mandatory TLS.
      - >
        Attack vectors include man-in-the-middle on unencrypted or weakly
        configured MCP connections, DNS rebinding against locally-running MCP
        servers (acknowledged in the MCP specification's own Security Warning),
        replay of captured JSON-RPC messages, and session hijacking via
        intercepted session identifiers.
      - >
        This risk is distinct from riskInsecureIntegratedComponent, which covers
        vulnerabilities within MCP server implementations (e.g., path traversal).
        This risk covers the transport channel between agent and server. It is
        distinct from riskOrchestratorRouteHijacking, which covers routing and
        configuration manipulation. It is distinct from riskToolRegistryTampering,
        which covers integrity of tool registration and discovery.
      - >
        Potential impacts include theft of tool schemas and sensitive data
        flowing between agents and tools, injection of malicious tool responses,
        unauthorized execution of agent actions, and compromise of the entire
        agent workflow. The breach may be difficult to detect because the agent
        identity remains valid while its communication channel is compromised.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlSecureByDefaultMLTooling
      - controlInterComponentTransportSecurity
      - controlComponentIdentityProvenance
    examples:
      - >
        The <a href="https://modelcontextprotocol.io/specification/2025-11-25/basic/transports"
        target="_blank" rel="noopener">MCP specification (2025-11-25)</a>
        includes a Security Warning acknowledging DNS rebinding as an attack
        vector against local MCP servers. Authentication and localhost binding
        are "SHOULD" rather than "MUST" requirements, TLS is not mandated for
        Streamable HTTP connections, and the stdio transport provides zero
        transport security. These protocol-level gaps make transport hijacking
        a design-level concern, not just an implementation oversight.
      - >
        The MCP specification's backward compatibility section advises that
        servers wanting to support older clients "continue to host both the
        SSE and POST endpoints of the old transport, alongside the new MCP
        endpoint." The deprecated HTTP+SSE transport placed session identifiers
        in URL parameters, exposing them in server logs, browser history, and
        proxy logs. Deployments following this backward compatibility guidance
        inherit the weaker transport's attack surface.
    tourContent:
      introduced:
        - >
          Introduced during deployment when MCP connections are configured
          without mandatory TLS, mutual authentication, or origin validation —
          particularly when MCP servers run locally or in environments where
          agents connect to third-party endpoints.
      exposed:
        - >
          Exposed at runtime when an attacker intercepts, modifies, or replays
          MCP messages on the transport channel. DNS rebinding attacks target
          locally-running MCP servers from remote websites.
      mitigated:
        - >
          Mitigated by enforcing mutual TLS for all MCP connections, binding
          session tokens to transport-layer identifiers, validating Origin
          headers on all incoming connections, restricting local servers to
          localhost binding, and implementing replay protection with short-lived
          sessions.
    relevantQuestions:
      - Is mutual TLS enforced for all MCP connections?
      - Are session tokens bound to transport-layer identifiers?
      - Do you enforce strict replay protection and short-lived sessions?
      - Do MCP servers validate the Origin header on all incoming connections to prevent DNS rebinding?
    mappings:
      stride:
        - tampering
        - information-disclosure
    lifecycleStage:
      - deployment
      - runtime
    impactType:
      - confidentiality
      - integrity
    actorAccess:
      - external
      - agent
  - id: riskShadowAndUnknownAgents
    title: Shadow and Unknown Agents
    shortDescription:
      - >
        Unregistered agents operate with inherited or valid credentials outside
        identity lifecycle controls, creating persistent blind spots in agentic
        systems.
    longDescription:
      - >
        In dynamic agentic environments, agents can be created ad-hoc or spawned
        through orchestration layers without central registration. Shadow and
        Unknown Agents describes the risk when these unregistered agents retain
        or inherit credentials and tokens, allowing them to interact with tools
        and MCP servers undetected. This breaks the identity lifecycle and
        creates persistent blind spots in monitoring, attribution, and
        revocation.
      - >
        This risk is the AI-specific extension of two classical security
        challenges: Shadow IT (unauthorized systems operating outside governance
        processes) and orphaned account management (failure to tombstone
        decommissioned credentials). The key AI-specific amplifier is that
        orchestration layers can dynamically spawn credentialed agents without
        human approval — a capability with no direct classical equivalent.
      - >
        The vulnerability arises from incomplete provisioning controls,
        credential reuse across sessions, or weak network isolation. Attack
        vectors include compromised orchestration components that spawn hidden
        agents and failure to decommission old agent instances (creating "zombie"
        agents). Supply-chain injection of backdoored agent templates is a
        related vector addressed by riskToolSourceProvenance and
        riskToolRegistryTampering; this risk covers the downstream identity
        lifecycle failure when such agents persist undetected.
      - >
        The insider threat dimension is also relevant: a compromised or rogue
        insider can create shadow agents that persist beyond their own access
        revocation, analogous to classical insider threats via undocumented
        service accounts or orphaned API keys.
      - >
        Potential impacts include stealthy data exfiltration, unauthorized
        actions across tenants, and long-term attacker persistence. Consequences
        include accountability gaps (actions cannot be reliably attributed),
        compliance violations, and increased difficulty in incident response.
      - >
        riskZombieShadowMCPServers addresses decommissioned tool server
        endpoints; this risk addresses unregistered agent identities. Both share
        the lifecycle management failure mode but differ in the entity type
        affected.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlSecureByDefaultMLTooling
      - controlAgentObservability
      - controlAgentInventoryManagement
      - controlAgentIntegrityManagement
      - controlAgentCredentialIsolation
    examples:
      - >
        A <a href="https://www.gartner.com/en/newsroom/press-releases/2025-11-19-gartner-identifies-critical-genai-blind-spots-that-cios-must-urgently-address"
        target="_blank" rel="noopener">Gartner survey of 302 cybersecurity
        leaders (2025)</a> found that 69% of organizations suspect or have
        evidence that employees are using prohibited public GenAI. Gartner
        predicts that by 2030, more than 40% of enterprises will experience
        security or compliance incidents linked to unauthorized shadow AI.
    tourContent:
      introduced:
        - >
          Introduced during deployment when orchestration layers or development
          teams create agents without central registration, or when provisioning
          controls do not require identity lifecycle enrollment before credential
          issuance.
      exposed:
        - >
          Exposed at runtime when unregistered agents interact with tools, MCP
          servers, or other agents using inherited or shared credentials. The
          exposure persists through maintenance cycles when decommissioning
          processes fail to revoke credentials for retired agents.
      mitigated:
        - >
          Mitigated by central agent inventory management requiring registration
          before credential issuance, cryptographic attestation of agent identity,
          runtime detection of unregistered agents, and automated credential
          revocation on lifecycle state changes.
    relevantQuestions:
      - Are all agents required to register with a central identity service before receiving credentials?
      - Can you detect and block actions from unregistered or decommissioned agents?
      - How do you handle credential reuse across ephemeral agents?
      - How do you handle credential inheritance when orchestration layers spawn new agents dynamically?
    mappings:
      stride:
        - spoofing
        - repudiation
      mitre-atlas:
        - AML.T0012
    lifecycleStage:
      - deployment
      - runtime
      - maintenance
    impactType:
      - confidentiality
      - integrity
      - accountability
      - compliance
    actorAccess:
      - agent
      - privileged
      - supply-chain
      - infrastructure-provider
  - id: riskRunawayAgentToolLoops
    title: Runaway Agent Tool Loops
    shortDescription:
      - >
        Agents enter uncontrolled recursive tool-calling cycles at the
        orchestration layer, exhausting context windows, compute resources, and
        API budgets through emergent autonomous behavior or adversarial trigger.
    longDescription:
      - >
        In agentic systems, autonomous agents invoke tools in sequence or
        recursively based on LLM reasoning. Runaway Agent Tool Loops occur when
        agents enter uncontrolled tool-calling cycles because termination
        conditions are absent, broken, or never satisfied. The primary failure
        mode is emergent: agents that loop because validation functions never
        return satisfying results, max_turns defaults are not set, or tool
        responses trigger further reasoning without convergence. No adversary
        is required.
      - >
        This risk extends classical infinite loop and fork bomb patterns to the
        agentic domain. In traditional systems, runaway processes are constrained
        by watchdog timers, process resource limits (ulimit, cgroups), and
        OS-level scheduling. The AI-specific amplifier is that LLM-driven agents
        make non-deterministic decisions about when to stop, and each tool call
        generates reasoning traces and tool response pairs that accumulate in
        the context window. The loop degrades the agent's ability to reason
        about stopping even as it continues — context-window saturation creates
        a feedback loop where the agent can no longer process enough history to
        recognize it should terminate.
      - >
        This risk is distinct from riskEconomicDenialOfWallet, which addresses
        adversarial resource exhaustion at the API billing layer through
        attacks on pricing models and billing mechanisms. Runaway Agent Tool
        Loops addresses autonomous agent behavior at the MCP orchestration
        layer, where impacts include context-window exhaustion (task fails
        silently or incompletely), availability degradation for co-tenants, and
        safety failures in time-sensitive systems — impacts with no financial
        dimension. Prompt injection can trigger runaway loops (see
        riskPromptInjection), but the underlying vulnerability is the absence
        of loop bounds at the orchestration layer.
      - >
        Potential impacts include context-window exhaustion leading to silent
        task failure, massive unexpected costs, service degradation for other
        users on shared infrastructure, and safety risks when time-sensitive
        agent tasks are delayed or never complete. Consequences range from
        financial damage to availability failures and loss of trust in
        autonomous agent systems.
    category: risksRuntimeInputSecurity
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlAgentObservability
      - controlAgentExecutionBounds
    examples:
      - >
        The <a href="https://github.com/microsoft/autogen/issues/108"
        target="_blank" rel="noopener">Microsoft AutoGen infinite loop issue
        (#108)</a> documented agents entering infinite tool-calling cycles
        because the termination condition checked for exact "TERMINATE" text,
        but agents generated variations that never matched. The loop continued
        until OpenAI rate limits triggered. No adversary was involved — the
        failure was emergent from a broken termination function, demonstrating
        the autonomous failure mode that distinguishes this risk from
        adversarial cost-spike attacks.
    tourContent:
      introduced:
        - >
          Introduced during deployment when agent orchestration frameworks are
          configured without default tool-call limits, context-window budgets,
          or termination condition validation.
      exposed:
        - >
          Exposed at runtime when an agent enters a recursive tool-calling cycle
          that consumes context window, compute, and API budget without
          converging on a result or triggering a termination condition.
      mitigated:
        - >
          Mitigated by enforcing per-agent, per-session, and per-tool-call
          resource budgets; setting mandatory max_turns defaults in orchestration
          frameworks; monitoring for context-window saturation and loop patterns;
          and implementing circuit breakers that halt agent execution when
          cumulative resource thresholds are exceeded.
    relevantQuestions:
      - Do you enforce per-agent, per-session, or per-tool-call resource budgets and rate limits?
      - Are recursive or deeply nested tool chains automatically bounded or human-approved?
      - Can MCP servers reject or throttle requests based on cumulative context or cost?
      - Do you monitor for context-window saturation during agent tool-calling sequences?
    mappings:
      stride:
        - denial-of-service
      mitre-atlas:
        - AML.T0034.002
      owasp-top10-llm:
        - LLM10
    lifecycleStage:
      - runtime
    impactType:
      - availability
      - safety
    actorAccess:
      - agent
  - id: riskAgenticDelegationConfusedDeputy
    title: Agentic Delegation Confused Deputy
    shortDescription:
      - >
        A high-privilege agent acts on behalf of a less-privileged caller
        without validating the caller's authorization at the delegation
        boundary, allowing the caller to escalate privileges through the
        deputy's own permissions.
    longDescription:
      - >
        In agentic systems, agents with elevated privileges frequently act on
        behalf of other agents, users, or external inputs through delegation
        mechanisms such as OAuth token exchange and MCP tool invocation. The
        Agentic Delegation Confused Deputy occurs when a high-privilege agent
        (the deputy) performs an action that the caller could not do directly,
        because the deputy does not validate the caller's authorization at the
        delegation boundary. The deputy uses its own permissions without
        distinguishing the caller's authority from its own.
      - >
        This risk is a direct extension of the classical confused deputy
        problem, first identified by Norm Hardy in 1988 when a compiler with
        file system privileges was tricked into overwriting its billing file by
        a user who supplied a system path as the output filename. The pattern
        recurs across computing eras: CSRF exploits the browser as a confused
        deputy (using session cookies on behalf of a malicious cross-origin
        caller), and <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/confused-deputy.html"
        target="_blank" rel="noopener">AWS cross-account role assumption</a>
        without ExternalId validation allows a third-party vendor to be tricked
        into assuming a victim's IAM role. The AI-specific amplifier is
        threefold: (1) the deputy's capability set expands dynamically at
        runtime via MCP server discovery, making the attack surface
        unpredictable; (2) the deputy autonomously decides which tools to invoke
        based on LLM reasoning, not static dispatch; (3) multi-hop delegation
        can chain multiple confused deputies, amplifying the privilege
        escalation.
      - >
        Attack vectors include indirect prompt injection via user-submitted
        data, poisoned MCP tool descriptions, crafted tool responses, and
        legitimate-looking API calls from less-privileged agents. The trigger
        mechanism varies (see riskPromptInjection for injection attacks
        specifically), but the underlying vulnerability is the same: the deputy
        does not check the caller's authorization scope before acting.
      - >
        This risk is distinct from riskRogueActions, which covers unintended
        agent actions broadly (accidental and malicious). The confused deputy
        specifically addresses the authorization failure at delegation
        boundaries — the caller could not perform the action directly, but the
        deputy does it using its own permissions. Rogue actions can occur in
        single-agent systems; the confused deputy requires asymmetric privilege
        across a delegation boundary. riskAgentDelegationChainOpacity addresses
        the inability to see who authorized an action; this risk addresses the
        failure to check whether the caller was authorized.
      - >
        Potential impacts include unauthorized data access across trust
        boundaries, financial transactions executed on behalf of unauthorized
        callers, infrastructure modifications, and privilege escalation chains
        in multi-agent systems. Consequences include accountability failures,
        regulatory non-compliance, and amplified blast radius when the deputy's
        permissions span multiple services or tenants.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlSecureByDefaultMLTooling
      - controlAgentPluginPermissions
      - controlAgentObservability
    examples:
      - >
        In the <a href="https://generalanalysis.com/blog/supabase-mcp-blog"
        target="_blank" rel="noopener">Supabase/Cursor data exfiltration
        (2025)</a>, a developer's Cursor IDE agent connected to Supabase using
        service_role credentials that bypassed all Row-Level Security. An
        attacker embedded SQL exfiltration commands in a support ticket. When
        the agent summarized tickets, it executed the attacker's commands with
        its elevated permissions, exfiltrating OAuth secrets the ticket author
        could never access directly — a textbook confused deputy where the
        agent used its own root-level database access without validating the
        caller's authorization.
      - >
        In the <a href="https://invariantlabs.ai/blog/whatsapp-mcp-exploited"
        target="_blank" rel="noopener">Invariant Labs WhatsApp MCP exploit
        (2025)</a>, a malicious MCP server poisoned its tool descriptions with
        hidden instructions targeting a co-installed WhatsApp MCP server. The
        agent — which had legitimate WhatsApp send authority — exfiltrated chat
        history to an attacker-controlled number. The malicious server had no
        WhatsApp access of its own; it exploited the agent as a confused deputy
        to launder its requests through the agent's cross-server authority.
    tourContent:
      introduced:
        - >
          Introduced during deployment when agent delegation boundaries are
          configured without caller authorization validation — specifically when
          high-privilege agents accept delegation requests without verifying
          whether the caller's authority matches the requested action's
          privilege level.
      exposed:
        - >
          Exposed at runtime when a less-privileged caller (another agent,
          external input, or low-privilege user) submits a request that the
          high-privilege deputy fulfills using its own permissions. The deputy
          cannot distinguish the caller's authorization scope from its own.
      mitigated:
        - >
          Mitigated by enforcing caller authorization validation at every
          delegation boundary, scoping the deputy's effective permissions to
          the intersection of its own permissions and the caller's
          authorization, and applying least-privilege narrowing at each
          delegation hop.
    relevantQuestions:
      - Does every delegation step enforce least-privilege narrowing and explicit caller authorization?
      - Can you detect when an agent executes an action that exceeds the caller's authorization scope at runtime?
      - Are confused deputy protections enforced at both the IAM and MCP layers?
      - Can the deputy distinguish the caller's authorization scope from its own permissions when selecting which tools to invoke?
    mappings:
      stride:
        - elevation-of-privilege
        - spoofing
      mitre-atlas:
        - AML.T0053
      owasp-top10-llm:
        - LLM06
    lifecycleStage:
      - deployment
      - runtime
    impactType:
      - confidentiality
      - integrity
      - accountability
      - compliance
    actorAccess:
      - agent
      - external
      - user
  - id: riskCrossTenantCredentialPropagation
    title: Cross-Tenant Credential Propagation
    shortDescription:
      - >
        Shared or insufficiently tenant-scoped agent credentials allow a
        compromise in one tenant to propagate access across tenant boundaries
        through the identity layer.
    longDescription:
      - >
        Multi-tenant agentic platforms frequently share infrastructure
        components across tenants for efficiency — base models, credential
        pools, MCP tool server endpoints, and OAuth token caches. Cross-Tenant
        Credential Propagation occurs when agent identities or credentials are
        not strictly scoped to individual tenants, allowing a compromise in one
        tenant to authenticate to another tenant's resources through the shared
        identity layer.
      - >
        This risk extends what the Cloud Security Alliance identifies as
        "Insufficient Identity, Credential, and Access Management" — a top
        cloud threat — to the agentic domain. Multi-tenant SaaS systems have
        long struggled with shared service accounts, wildcard TLS certificates,
        shared OAuth client credentials, and connection pool credentials that
        cross tenant boundaries. CWE-653 (Insufficient Compartmentalization)
        captures the general pattern of failing to isolate security domains.
        The AI-specific amplifier is that agentic platforms additionally share
        model serving endpoints, MCP tool registries, and OAuth token pools
        across tenants, and the dynamic nature of agent delegation means a
        compromised credential can propagate through delegation chains across
        tenant boundaries — agents autonomously use credentials without human
        verification at each hop.
      - >
        The vulnerability arises from insufficient tenant scoping at the agent
        identity layer: shared OAuth client credentials, MCP tokens that are
        valid across tenants, or agent identity pools that serve multiple
        organizations. A compromise in one tenant — through credential theft,
        infrastructure exploitation, or insider access — yields credentials
        that work across tenant boundaries because nothing restricts their
        scope to the originating tenant.
      - >
        This risk is distinct from riskAcceleratorAndSystemSideChannels, which
        covers hardware-layer cross-tenant leakage (timing, cache, speculative
        execution). It is also distinct from riskPromptResponseCachePoisoning,
        which covers cross-user contamination via shared LLM caches. This risk
        specifically addresses the identity and credential layer — shared or
        unscoped credentials that allow authentication across tenant boundaries.
      - >
        Potential impacts include widespread data breaches spanning multiple
        tenants, unauthorized cross-tenant actions, intellectual property theft,
        and complete breakdown of multi-tenancy guarantees. Consequences include
        major compliance violations (GDPR, SOC 2), loss of customer trust, and
        systemic risk across the shared platform.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlSecureByDefaultMLTooling
      - controlAgentPluginPermissions
      - controlIsolatedConfidentialComputing
      - controlAgentCredentialIsolation
    examples:
      - >
        The <a
        href="https://www.bleepingcomputer.com/news/security/asana-warns-mcp-ai-feature-exposed-customer-data-to-other-orgs/"
        target="_blank" rel="noopener">Asana MCP cross-tenant data exposure
        (2025)</a> demonstrated this pattern directly in the agentic domain:
        a logic flaw in Asana's MCP server feature exposed data from one
        organization's instance to other organizations' MCP users for
        approximately 1,000 customers, because tenant context was not
        maintained across MCP sessions.
      - >
        Wiz researchers discovered the <a
        href="https://www.wiz.io/blog/azure-active-directory-bing-misconfiguration"
        target="_blank" rel="noopener">BingBang vulnerability (2023)</a>
        affecting approximately 25% of Azure AD multi-tenant application
        registrations, which accepted valid OAuth tokens from any Azure tenant
        without checking the tenant ID claim. A token issued for an attacker's
        tenant was accepted by apps belonging to other tenants, including
        Microsoft's internal Bing management applications — a cross-tenant
        credential propagation through the identity layer where the credential
        itself was valid across tenant boundaries.
      - >
        In the <a
        href="https://www.valencesecurity.com/resources/blogs/salesforce-oauth-token-breach-what-every-security-team-must-know"
        target="_blank" rel="noopener">UNC6395/Salesloft Drift breach (2025)</a>,
        a threat actor compromised Salesloft's infrastructure and stole
        per-customer OAuth tokens that Drift stored for approximately 700
        Salesforce organizations. Each bearer token granted direct Salesforce
        API access bypassing MFA — a single compromise of a multi-tenant
        intermediary's centralized credential store yielded cross-tenant access
        through the identity layer.
    tourContent:
      introduced:
        - >
          Introduced during deployment when agent identities, credential pools,
          or MCP server endpoints are configured to serve multiple tenants
          without strict tenant-scoped isolation at the identity layer.
      exposed:
        - >
          Exposed at runtime when a compromise in one tenant (credential theft,
          infrastructure exploitation, or insider access) yields credentials
          that authenticate to other tenants' resources because the credentials
          are not tenant-scoped.
      mitigated:
        - >
          Mitigated by issuing strictly tenant-scoped agent credentials with no
          cross-tenant validity, enforcing tenant boundary validation at every
          MCP hop and delegation step, and isolating credential pools, token
          caches, and MCP endpoints per tenant.
    relevantQuestions:
      - Are agent identities strictly scoped to a single tenant with no shared credentials?
      - Does the system enforce tenant boundaries at every MCP hop and delegation step?
      - Can a compromised agent in one tenant affect resources in another?
      - Are credential pools, OAuth token caches, and MCP server endpoints isolated per tenant?
    mappings:
      stride:
        - elevation-of-privilege
        - information-disclosure
      mitre-atlas:
        - AML.T0012
        - AML.T0055
      owasp-top10-llm:
        - LLM06
    lifecycleStage:
      - deployment
      - runtime
    impactType:
      - confidentiality
      - integrity
      - compliance
      - privacy
    actorAccess:
      - agent
      - privileged
      - infrastructure-provider
  - id: riskZombieShadowMCPServers
    title: Zombie / Shadow MCP Servers
    shortDescription:
      - >
        Decommissioned or unregistered MCP servers remain accessible and respond
        to agent tool calls, allowing attackers to intercept or redirect
        legitimate requests.
    longDescription:
      - >
        MCP servers expose tools to agents and are frequently created, scaled,
        or retired during operations. Zombie / Shadow MCP Servers occur when
        decommissioned servers are not fully removed from service discovery,
        DNS, load balancers, or tool registries, leaving stale endpoints that
        remain responsive to agent connections. An attacker who claims the
        abandoned endpoint receives all tool calls that agents route to it.
      - >
        This risk is the agentic extension of dangling DNS and subdomain
        takeover — a <a
        href="https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/10-Test_for_Subdomain_Takeover"
        target="_blank" rel="noopener">well-documented vulnerability pattern</a>
        where orphaned DNS records to decommissioned cloud services allow
        attackers to claim abandoned resources and intercept traffic. The
        AI-specific amplifier is that agents autonomously discover and invoke
        tool servers without human verification at each call. In classical
        systems, a developer would notice a stale API endpoint returning
        unexpected responses; in agentic systems, the agent silently processes
        the zombie server's responses as legitimate tool output, potentially
        poisoning reasoning chains that influence downstream actions.
      - >
        Transport security alone does not close this gap: an attacker who
        controls DNS for a stale endpoint can obtain a valid ACME-issued
        certificate, and mTLS will authenticate them as a "valid" server.
        Transport security works as specified — the missing layer is provenance
        binding to the registered principal. This is why the risk requires a
        registry-bound provenance control (controlComponentIdentityProvenance)
        in addition to transport security and inventory management.
      - >
        The vulnerability stems from incomplete lifecycle management: tool
        server entries persist in registries, DNS, or agent configurations
        after the legitimate server is decommissioned. Dynamic discovery
        mechanisms that do not require runtime attestation or liveness
        verification exacerbate the risk — agents trust registry presence as
        proof of legitimacy.
      - >
        This risk is distinct from riskToolSourceProvenance, which addresses
        adopting unvetted tool sources — zombie servers were previously vetted
        and legitimate. It is distinct from riskToolRegistryTampering, which
        addresses active modification of registry entries — zombie servers
        involve stale entries that were never cleaned up. It is distinct from
        riskInsecureIntegratedComponent, which addresses vulnerabilities in
        running tool implementations — zombie servers involve the absence of a
        legitimate tool at an endpoint now controlled by an attacker.
        riskShadowAndUnknownAgents addresses unregistered agent identities;
        this risk addresses decommissioned tool server endpoints.
      - >
        Potential impacts include stealthy interception of tool calls, injection
        of malicious schemas or responses, data exfiltration from agent
        interactions, and persistent attacker access long after official
        decommissioning. Consequences include undetected breaches, compliance
        failures, and erosion of trust in the agentic infrastructure.
    category: risksDeploymentAndInfrastructure
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
      - personaEndUser
    controls:
      - controlAgentObservability
      - controlAgentInventoryManagement
      - controlInterComponentTransportSecurity
      - controlComponentIdentityProvenance
    examples:
      - >
        Dangling DNS and subdomain takeover is a <a
        href="https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/10-Test_for_Subdomain_Takeover"
        target="_blank" rel="noopener">well-documented vulnerability pattern
        (OWASP)</a> where orphaned DNS CNAME records to decommissioned cloud
        services allow attackers to claim the abandoned resource and intercept
        all traffic. The MCP equivalent: a tool registry entry persists after
        server decommissioning, and an attacker claims the stale endpoint URL —
        agents route tool calls to the attacker automatically because they
        trust registry presence without runtime liveness verification.
      - >
        ACME certificate authorities (e.g., Let's Encrypt) automate issuance of
        domain-validated certificates based solely on control of the DNS record
        at issuance time. An attacker who claims a decommissioned subdomain can
        obtain a valid ACME certificate within minutes, and mTLS between agent
        and the reclaimed endpoint will succeed. Transport security is not
        broken in this scenario — it is working exactly as specified. The
        missing control is runtime attestation that the authenticated key
        holder is the currently registered, non-revoked principal for the role,
        not merely the holder of a key bound to the domain.
    tourContent:
      introduced:
        - >
          Introduced during deployment when MCP servers are provisioned and
          registered in tool registries, DNS, or agent configurations.
      exposed:
        - >
          Exposed at runtime when decommissioned servers are not fully removed
          from all discovery mechanisms. Agents continue calling stale endpoints
          because registry presence implies legitimacy. The exposure persists
          through maintenance cycles when decommissioning processes are
          incomplete.
      mitigated:
        - >
          Mitigated by requiring cryptographic attestation and runtime liveness
          verification for all MCP server endpoints, automating removal from
          all discovery mechanisms on decommission, and monitoring for agent
          calls to unresponsive or unverified endpoints.
    relevantQuestions:
      - Are all MCP servers required to register with cryptographic attestation before being discoverable?
      - Does the system automatically detect and block calls to decommissioned or unverified MCP endpoints?
      - How do you ensure complete removal of MCP servers from all discovery mechanisms?
      - Do agents verify tool server liveness and identity at invocation time, not just at discovery time?
    mappings:
      stride:
        - spoofing
        - tampering
        - information-disclosure
      mitre-atlas:
        - AML.T0010.001
      owasp-top10-llm:
        - LLM03
    lifecycleStage:
      - deployment
      - runtime
      - maintenance
    impactType:
      - confidentiality
      - integrity
    actorAccess:
      - external
      - supply-chain
