  - id: controlAgentExecutionBounds
    title: Agent Execution Bounds
    description:
      - >
        Enforce per-agent, per-session, and per-tool-call execution limits
        at the orchestration layer to prevent runaway tool-calling cycles.
        This control addresses the enforcement of loop bounds, context-window
        budgets, and circuit breakers within agent reasoning and tool
        invocation sequences — as distinct from API-layer rate limiting
        (which operates at the external request boundary) and agent
        observability (which detects loops but does not halt them).
      - >
        Implementation requires: mandatory max_turns defaults for all
        agent-to-tool execution sequences, with no framework permitting
        unbounded execution by default; per-agent and per-session tool-call
        budgets that are enforced by the orchestration layer before each
        tool invocation; context-window budget tracking that halts agent
        execution before context saturation degrades reasoning quality;
        and circuit breakers that terminate agent execution when cumulative
        resource thresholds (compute, tokens, wall-clock time) are exceeded.
        Loop detection at the orchestration layer should identify repeated
        tool-call patterns and trigger early termination.
    category: controlsApplication
    personas:
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaPlatformProvider
    components:
      - componentReasoningCore
      - componentOrchestrationInputHandling
      - componentOrchestrationOutputHandling
    risks:
      - riskRunawayAgentToolLoops
      - riskEconomicDenialOfWallet
