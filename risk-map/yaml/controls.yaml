  - id: controlComponentIdentityProvenance
    title: Component Identity Provenance
    description:
      - >
        Ensure that when one component invokes another, the calling component
        can verify the callee is the currently registered, non-revoked
        principal for that role — not merely the holder of a key for a
        domain or network address. This control closes the gap that transport
        security leaves open: TLS and mTLS prove key possession for an
        endpoint, but do not attest that the endpoint is the legitimate
        principal a registry system of record says it should be.
      - >
        Implementation requires: a binding between a component's runtime
        identity and an authoritative registry entry, such that revocation
        in the registry is observable to callers within a bounded time
        window; verification of that binding at invocation time, not solely
        at channel establishment; and audit telemetry that records the
        provenance assertion used so post-hoc detection of calls against
        revoked or expired principals is possible.
      - >
        This control is mechanism-agnostic. Implementers may use SPIFFE/SVIDs,
        capability tokens, signed registration receipts, mTLS with a private
        CA whose issuance is gated on registry state, short-lived JWTs from
        a registration authority, hardware-attested identities, or other
        approaches that satisfy the intent. The control specifies the
        question that must be answered at invocation time — "is this the
        registered principal?" — not the cryptographic protocol used to
        answer it.
      - >
        This control is distinct from controlInterComponentTransportSecurity,
        which secures the channel, and from controlAgentInventoryManagement,
        which maintains the registry of authorized principals. Inventory is
        the lifecycle authority; provenance is the runtime attestation that
        surfaces inventory state to callers; transport is the channel over
        which both ride.
    category: controlsInfrastructure
    personas:
      - personaPlatformProvider
      - personaAgenticProvider
      - personaApplicationDeveloper
      - personaModelServing
