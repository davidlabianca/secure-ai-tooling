# ADR-content alignment manifest
# This template teaches/solicits conventions from:
#   - ADR-016: externalReferences field shape; sentinel grammar ({{ref:identifier}}, {{componentXxx}})
#   - ADR-017 D1: allowed prose authoring tokens
#   - ADR-018: components schema (category, description, edge fields)
#   - ADR-018 D3: component edge bidirectionality (downstream/upstream edge convention)
#   - ADR-018 D6: framework mappings field
#   - ADR-022 D5b: canonical framework mapping value forms
#   - ADR-002: branching strategy (component updates target develop branch)
name: Update Existing Component
description: Propose updates to an existing AI system component in the CoSAI Risk Map
title: '[Update Component]: '
labels: ['component', 'update-component']
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Component

        Use this template to propose changes to an existing component. Only fill out the sections relevant to your proposed changes.

        📋 **Before you submit**: Skim the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) for general conventions.

        ✨ **Automatic Bidirectionality**: When you modify edges, the reverse edges are automatically updated. If you add/remove an edge here, the connected components will be automatically updated to maintain bidirectional consistency.

  - type: input
    id: component-permalink
    attributes:
      label: Component Permalink*
      description: |
        GitHub permalink to the component in components.yaml (right-click line number → Copy permalink)

        📋 [Browse components.yaml](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/yaml/components.yaml)
      placeholder: 'https://github.com/org/repo/blob/abc123/risk-map/yaml/components.yaml#L45-L52'
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Change Type*
      description: What type of change are you proposing?
      options:
        - Update description/title (clarification or correction)
        - Modify edges (add or remove connections)
        - Change category or subcategory
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: proposed-changes
    attributes:
      label: Proposed Changes*
      description: |
        Describe what you want to change and why. Be specific about what should be added, removed, or modified.

        **Examples:**
        - "Update description to clarify this component's role in the agent workflow"
        - "Add edge to componentPromptCache - this component feeds data to the cache"
        - "Remove edge from componentDataSources - this connection doesn't accurately reflect the architecture"
        - "Change category from componentsModel to componentsApplication - better classification"

        Cross-reference framework entities using sentinels, e.g. {{componentModelServing}}.
        Outbound citations go in External Reference Changes below and are cited via {{ref:identifier}}.
      placeholder: |
        Current state: [what it says now]
        Proposed change: [what it should say]
        Rationale: [why this change improves the component definition]
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Quick Edge Changes (Optional)

        Use these fields for quick edge additions or removals. Use `+` to add, `-` to remove.

        ✨ **Automatic Bidirectionality**: Edge changes automatically update connected components. When you add/remove edges here, the reverse edges are automatically created/removed in the connected components.

        📋 [View component list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/components-summary.md)

  - type: textarea
    id: edges-to
    attributes:
      label: Edges To Changes (Downstream)
      description: |
        Add or remove downstream connections. Use `+` to add, `-` to remove (one per line)

        Components that this component flows TO
      placeholder: |
        + componentOutputHandling
        - componentOldComponent

  - type: textarea
    id: edges-from
    attributes:
      label: Edges From Changes (Upstream)
      description: |
        Add or remove upstream connections. Use `+` to add, `-` to remove (one per line)

        Components that flow TO this component
      placeholder: |
        + componentInputHandling
        - componentDeprecatedSource

  - type: textarea
    id: framework-mappings
    attributes:
      label: Framework Mapping Changes (Optional)
      description: |
        Add or update framework cross-walk mappings for this component. Each entry maps a framework ID
        (per `frameworks.schema.json`) to a framework-specific identifier.
        Format: `+/- framework-id: mapping-value`

        No framework currently declares `applicableTo: components`. Leave this blank unless you are
        submitting alongside a framework update that activates a component-side mapping.

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework value forms.
      placeholder: |
        # Leave blank unless a framework declares applicableTo: components.

  - type: textarea
    id: related-components
    attributes:
      label: Related Component Updates
      description: |
        List other components that need edge updates to maintain bidirectionality

        Format: `componentName: add/remove edge to/from [this component]`
      placeholder: |
        componentOutputHandling: add edge from componentMyComponent
        componentOldComponent: remove edge to componentMyComponent

  - type: textarea
    id: external-references
    attributes:
      label: External Reference Changes
      description: |
        Add or remove structured outbound citations for this component. Each entry populates or removes
        an entry in the `externalReferences` array in the YAML. Prose fields cite an entry via the
        sentinel {{ref:identifier}}, where `identifier` matches the entry's `id` field.

        Per-entry shape (YAML):
          type: <enum>   # cwe, cve, atlas, attack, advisory, paper, news, spec, editorial, other
          id: <string>   # author-chosen sentinel target; canonical-form for cwe/cve/atlas/attack
          title: <string>
          url: https://...  # https only

        Canonical id examples: cwe-89, cve-2024-0001, aml-t0040.001, attack-t1059.003.

        Example entry:
          - type: editorial
            id: example-reference
            title: Title of the reference
            url: https://example.com/...
      placeholder: |
        + type: spec
          id: example-spec
          title: Title of the specification
          url: https://example.com/spec/...

  - type: textarea
    id: supporting-evidence
    attributes:
      label: Supporting Evidence
      description: |
        Links to architecture diagrams, discussions, or other evidence supporting this change
      placeholder: |
        - Architecture diagram: https://example.com/diagram.png
        - Discussion in issue #123
        - Related component update: #456

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have provided a valid GitHub permalink to the component
          required: true
        - label: My proposed changes conform to the Submission Readiness Guide
          required: true
