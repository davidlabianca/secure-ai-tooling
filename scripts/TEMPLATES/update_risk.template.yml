# ADR-content alignment manifest
# This template teaches/solicits conventions from:
#   - ADR-016: externalReferences field shape; sentinel grammar ({{ref:identifier}}, {{riskXxx}})
#   - ADR-017 D1: allowed prose authoring tokens
#   - ADR-019 D6: relevantQuestions field retired (not solicited)
#   - ADR-022 D5b: canonical framework mapping value forms
name: Update Existing Risk
description: Propose updates to an existing AI security risk in the CoSAI Risk Map
title: '[Update Risk]: '
labels: ['risk', 'update-risk']
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Risk

        Use this template to propose changes to an existing risk. Only fill out the sections relevant to your proposed changes.

        📋 **Before you submit**: Skim the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) — the same persona, universal-control, and framework-mapping rules apply to updates.

  - type: input
    id: risk-permalink
    attributes:
      label: Risk Permalink*
      description: |
        GitHub permalink to the risk in risks.yaml (right-click line number → Copy permalink)

        📋 [Browse risks.yaml](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/yaml/risks.yaml)
      placeholder: 'https://github.com/org/repo/blob/abc123/risk-map/yaml/risks.yaml#L45-L90'
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Change Type*
      description: What type of change are you proposing?
      options:
        - Update descriptions (short/long description, clarification)
        - Add mappings (controls, frameworks)
        - Remove mappings (controls, frameworks)
        - Update examples
        - Add metadata (lifecycle, impact type, actor access)
        - Update tourContent
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: proposed-changes
    attributes:
      label: Proposed Changes*
      description: |
        Describe what you want to change and why. Be specific about what should be added, removed, or modified.

        **Examples:**
        - "Update long description to include recent research on this attack vector"
        - "Add controlThreatDetection to controls list - this control effectively mitigates this risk"
        - "Remove controlRedTeaming from controls - not directly applicable to this risk type"
        - "Add MITRE ATLAS mapping AML.T0051@5.0.1 - new technique relevant to this risk"
        - "Update examples section with recent CVE demonstrating this risk"

        Cross-reference related framework entities using sentinels, e.g. {{riskPromptInjection}} or {{controlInputValidationAndSanitization}}.
        Outbound citations go in External Reference Changes below and are cited via {{ref:identifier}}.
      placeholder: |
        Current state: [what it says now]
        Proposed change: [what it should say]
        Rationale: [why this change improves the risk definition]
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Quick Add/Remove (Optional)

        Use these fields for quick additions or removals. Use `+` to add, `-` to remove.
        Leave blank if not applicable.

  - type: textarea
    id: controls
    attributes:
      label: Control Changes
      description: |
        Add or remove control IDs. Use `+` to add, `-` to remove (one per line)

        ✨ **Automatic Cross-Mapping**: Control mappings are automatically bidirectional. When you add/remove controls here, the reverse risk mappings are automatically updated in those controls.

        📋 [View control list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/controls-summary.md)
      placeholder: |
        + controlThreatDetection
        + controlVulnerabilityManagement
        - controlRedTeaming

  - type: textarea
    id: framework-mappings
    attributes:
      label: Framework Mapping Changes
      description: |
        Add or remove framework mappings. Use `+` to add, `-` to remove.
        Format: `+/- framework-id: mapping-value`

        Valid frameworks for risks: {{RISK_FRAMEWORKS_LIST}}. Risks use MITRE ATLAS **techniques** (`AML.T####`).

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework rules.
      placeholder: |
        + mitre-atlas: AML.T0051@5.0.1
        + stride: InformationDisclosure
        - owasp-top10-llm: LLM01:2025

  - type: textarea
    id: examples
    attributes:
      label: Update Examples
      description: |
        Add new examples or update existing ones.

        Do not include raw URLs or HTML links here. Add outbound references to the External Reference
        Changes field below, then cite them in prose using the sentinel form {{ref:identifier}}.
      placeholder: |
        Add example: A recent incident described in {{ref:vendor-advisory-2024}} demonstrated this risk in production...

  - type: textarea
    id: external-references
    attributes:
      label: External Reference Changes
      description: |
        Add or remove structured outbound citations for this risk. Each entry populates or removes
        an entry in the `externalReferences` array in the YAML. Prose fields cite an entry via the
        sentinel {{ref:identifier}}, where `identifier` matches the entry's `id` field.

        Per-entry shape (YAML):
          type: <enum>   # cwe, cve, atlas, attack, advisory, paper, news, spec, editorial, other
          id: <string>   # author-chosen sentinel target; canonical-form for cwe/cve/atlas/attack
          title: <string>
          url: https://...  # https only

        Canonical id examples: cwe-89, cve-2024-0001, aml-t0040.001, attack-t1059.003.

        Example entry:
          - type: cve
            id: cve-2024-0001
            title: Example vulnerability
            url: https://nvd.nist.gov/vuln/detail/CVE-2024-0001
      placeholder: |
        + type: advisory
          id: vendor-advisory-2024
          title: Vendor advisory title
          url: https://example.com/advisory/...

  - type: textarea
    id: supporting-evidence
    attributes:
      label: Supporting Evidence
      description: |
        Links to research, discussions, CVEs, or other evidence supporting this change
      placeholder: |
        - Research paper: https://arxiv.org/...
        - Discussion in issue #123
        - Related CVE: CVE-2024-XXXXX
        - NIST guidance: https://nvlpubs.nist.gov/...

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have provided a valid GitHub permalink to the risk
          required: true
        - label: My proposed changes conform to the Submission Readiness Guide
          required: true
