# Pre-commit framework configuration for the CoSAI Risk Map.
#
# Run manually:    pre-commit run --all-files
# Install hook:    pre-commit install
# Update versions: pre-commit autoupdate
#
# Hook execution order matches the prior bash hook (scripts/hooks/pre-commit):
#   1. Schema validation (check-jsonschema, per yaml/schema pair)
#   2. Prettier formatting (yaml in risk-map/yaml/)
#   3. Ruff linting (Python)
#   4. Local validators (component edges, control-risk, framework refs)
#   5. Issue template regeneration + validation
#   6. Mermaid graph, markdown table, and SVG regeneration (Mode B auto-stage)

repos:
  # ---------------------------------------------------------------------------
  # Schema validation: one entry per yaml/schema pair so the framework only
  # invokes check-jsonschema when the matching yaml or its schema is staged.
  # BASE_URI is needed for cross-schema $ref resolution.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-jsonschema
        name: 'schema: actor-access.yaml'
        files: ^risk-map/(yaml/actor-access\.yaml|schemas/actor-access\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/actor-access.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: components.yaml'
        files: ^risk-map/(yaml/components\.yaml|schemas/components\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/components.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: controls.yaml'
        files: ^risk-map/(yaml/controls\.yaml|schemas/controls\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/controls.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: frameworks.yaml'
        files: ^risk-map/(yaml/frameworks\.yaml|schemas/frameworks\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/frameworks.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: impact-type.yaml'
        files: ^risk-map/(yaml/impact-type\.yaml|schemas/impact-type\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/impact-type.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: lifecycle-stage.yaml'
        files: ^risk-map/(yaml/lifecycle-stage\.yaml|schemas/lifecycle-stage\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/lifecycle-stage.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: mermaid-styles.yaml'
        files: ^risk-map/(yaml/mermaid-styles\.yaml|schemas/mermaid-styles\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/mermaid-styles.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: personas.yaml'
        files: ^risk-map/(yaml/personas\.yaml|schemas/personas\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/personas.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: risks.yaml'
        files: ^risk-map/(yaml/risks\.yaml|schemas/risks\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/risks.schema.json
          - --base-uri
          - file://./risk-map/schemas/
      - id: check-jsonschema
        name: 'schema: self-assessment.yaml'
        files: ^risk-map/(yaml/self-assessment\.yaml|schemas/self-assessment\.schema\.json)$
        args:
          - --schemafile
          - risk-map/schemas/self-assessment.schema.json
          - --base-uri
          - file://./risk-map/schemas/

  # ---------------------------------------------------------------------------
  # Schema-master trigger: when the master riskmap.schema.json changes, every
  # yaml file must be re-validated. The wrapper discovers (schema, yaml) pairs
  # from the filesystem so the list doesn't drift when files are added.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: validate-all-yaml-on-master-schema-change
        name: 'schema: validate all yaml (riskmap.schema.json changed)'
        language: system
        entry: python3 scripts/hooks/precommit/validate_all_schemas.py
        files: ^risk-map/schemas/riskmap\.schema\.json$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Prettier formatting for yaml under risk-map/yaml/. Local hook via npx so
  # the project's existing Node/.prettierrc.yml setup is reused; pre-commit's
  # mirrors-prettier is archived and rbubley's mirror adds external dependency.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier-yaml
        name: 'prettier: risk-map/yaml/'
        language: system
        entry: python3 scripts/hooks/precommit/prettier_yaml.py
        files: ^risk-map/yaml/.*\.ya?ml$
        pass_filenames: true

  # ---------------------------------------------------------------------------
  # Ruff lint + format for Python.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        name: 'ruff: lint'
      - id: ruff-format
        name: 'ruff: format'

  # ---------------------------------------------------------------------------
  # Local validators. Each runs only when its dependency files are staged
  # (framework filters via `files:`); validators do their own internal staged-
  # file detection, which is now redundant but harmless and preserves bash
  # behavior. pass_filenames is false because each validator scans the repo.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: validate-component-edges
        name: 'risk-map: component edge consistency'
        language: system
        entry: python3 scripts/hooks/validate_riskmap.py
        files: ^risk-map/yaml/components\.yaml$
        pass_filenames: false

      - id: validate-control-risk-references
        name: 'risk-map: control-to-risk reference consistency'
        language: system
        entry: python3 scripts/hooks/validate_control_risk_references.py
        files: ^risk-map/yaml/(controls|risks)\.yaml$
        pass_filenames: false

      - id: validate-framework-references
        name: 'risk-map: framework reference consistency'
        language: system
        entry: python3 scripts/hooks/validate_framework_references.py
        files: ^risk-map/yaml/(controls|frameworks|personas|risks)\.yaml$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Issue template regeneration. Runs before the validator so freshly
  # regenerated templates are validated in the same commit. Triggers on
  # template sources, any schema, or frameworks.yaml.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: regenerate-issue-templates
        name: 'generate: GitHub issue templates'
        language: system
        entry: python3 scripts/hooks/precommit/regenerate_issue_templates.py
        files: ^(scripts/TEMPLATES/.*\.yml|risk-map/schemas/.*\.schema\.json|risk-map/yaml/frameworks\.yaml)$
        pass_filenames: true

      - id: validate-issue-templates
        name: 'validate: GitHub issue templates'
        language: system
        entry: python3 scripts/hooks/validate_issue_templates.py
        files: ^(\.github/ISSUE_TEMPLATE/.*\.yml|scripts/TEMPLATES/.*\.yml)$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Generators (Mode B auto-stage). Each wrapper runs the appropriate
  # generation commands and `git add`s outputs so they land in the same commit
  # as the source change. Wrapper scripts encapsulate per-trigger conditionals.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: regenerate-graphs
        name: 'generate: Mermaid graphs (component, control, risk)'
        language: system
        entry: python3 scripts/hooks/precommit/regenerate_graphs.py
        files: ^risk-map/yaml/(components|controls|risks)\.yaml$
        pass_filenames: true

      - id: regenerate-tables
        name: 'generate: Markdown tables (yaml-to-md, xref refresh)'
        language: system
        entry: python3 scripts/hooks/precommit/regenerate_tables.py
        files: ^risk-map/yaml/(components|controls|risks|personas)\.yaml$
        pass_filenames: true

      - id: regenerate-svgs
        name: 'generate: Mermaid SVGs from .mmd/.mermaid'
        language: system
        entry: python3 scripts/hooks/precommit/regenerate_svgs.py
        files: ^risk-map/diagrams/.*\.(mmd|mermaid)$
        pass_filenames: true
