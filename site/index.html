<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="CoSAI-RM persona navigator for identifying the risks and controls that apply to your role in the AI ecosystem."
    />
    <title>CoSAI-RM Persona Navigator</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page-backdrop" aria-hidden="true"></div>
    <div class="page-grid" aria-hidden="true"></div>
    <div id="app-status" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>
    <main class="app-shell" data-app>
      <section class="loading-card">
        <p class="eyebrow">CoSAI-RM</p>
        <h1>Loading persona navigator</h1>
        <p>
          Generate the site data first when previewing locally:
          <code>python3 scripts/build_persona_site_data.py</code>
        </p>
      </section>
    </main>
    <noscript>
      <section class="loading-card">
        <p class="eyebrow">JavaScript Required</p>
        <h1>This experience needs browser-side JavaScript.</h1>
        <p>The CoSAI-RM persona navigator keeps answers in your browser and does not use a backend.</p>
      </section>
    </noscript>
    <script type="module" src="./assets/app.mjs"></script>
  </body>
</html>
