[tool.pytest.ini_options]
pythonpath = ["scripts/hooks"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "live_corpus: marks tests that read the live risk-map YAML corpus (deselect with '-m \"not live_corpus\"')",
]

[tool.coverage.run]
omit = [
    "*/test_*.py", # Exclude files matching 'test_*.py' pattern anywhere
    "*/conftest.py", # Exclude files matching 'test_*.py' pattern anywhere
]