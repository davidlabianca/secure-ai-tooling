name: CoSAI Risk Map Explorer

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/persona-pages.yml'
      - 'site/**'
      - 'risk-map/yaml/personas.yaml'
      - 'risk-map/yaml/risks.yaml'
      - 'risk-map/yaml/controls.yaml'
      - 'risk-map/schemas/**'
      - 'risk-map/docs/persona-pages.md'
      - 'scripts/build_persona_site_data.py'
      - 'scripts/hooks/tests/test_build_persona_site_data.py'
      - 'README.md'
      - 'risk-map/README.md'
      - 'requirements.txt'
  push:
    branches: [main]
    paths:
      - '.github/workflows/persona-pages.yml'
      - 'site/**'
      - 'risk-map/yaml/personas.yaml'
      - 'risk-map/yaml/risks.yaml'
      - 'risk-map/yaml/controls.yaml'
      - 'risk-map/schemas/**'
      - 'risk-map/docs/persona-pages.md'
      - 'scripts/build_persona_site_data.py'
      - 'scripts/hooks/tests/test_build_persona_site_data.py'
      - 'README.md'
      - 'risk-map/README.md'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: persona-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run persona site data tests
        run: pytest scripts/hooks/tests/test_build_persona_site_data.py

      - name: Run persona site logic tests
        run: node --test site/tests/*.test.mjs

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -a --exclude='.DS_Store' --exclude='.gitignore' site/ _site/
          python3 scripts/build_persona_site_data.py --site-dir _site
          test -f _site/generated/persona-site-data.json

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    timeout-minutes: 5
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  pages-summary:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Summarize pipeline outcome
        run: |
          deploy_result="${{ needs.deploy.result }}"
          if [[ "${{ github.event_name }}" == "pull_request" && "$deploy_result" == "skipped" ]]; then
            deploy_display="n/a (PRs don't deploy)"
          else
            deploy_display="$deploy_result"
          fi
          {
            echo "## CoSAI Risk Map Explorer — pipeline summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| build | ${{ needs.build.result }} |"
            echo "| deploy | $deploy_display |"
            if [[ "$deploy_result" == "success" ]]; then
              echo ""
              echo "Deployed: ${{ needs.deploy.outputs.page_url || 'n/a' }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
