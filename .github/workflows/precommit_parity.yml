# Pre-commit Framework Migration Parity Gate (#211)
#
# Runs scripts/hooks/tests/precommit_parity.sh to verify that the new
# pre-commit framework configuration produces a tree-identical commit to the
# legacy bash hook for the kitchen-sink fixture. Tree-hash equivalence is the
# merge gate.
#
# This workflow exists solely to gate #211 and is deleted in the same PR that
# lands the bash hook removal.
name: Pre-commit Parity Gate

on:
  pull_request:
    paths:
      - '.pre-commit-config.yaml'
      - 'scripts/hooks/precommit/**'
      - 'scripts/hooks/pre-commit'
      - 'scripts/install-precommit-hook.sh'
      - 'scripts/hooks/tests/fixtures/precommit_parity/**'
      - 'scripts/hooks/tests/precommit_parity.sh'
      - '.github/workflows/precommit_parity.yml'

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    name: Tree-hash parity (bash vs framework)
    steps:
      - name: Checkout repository (with full history for merge-base)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add upstream remote (so merge-base resolves)
        run: |
          git remote add upstream https://github.com/cosai-oasis/secure-ai-tooling.git
          git fetch --quiet upstream main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node (for npx prettier and mmdc)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Mermaid CLI for SVG generation
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Run parity harness
        run: |
          bash scripts/hooks/tests/precommit_parity.sh \
              --baseline-sha "$(git merge-base HEAD upstream/main)" \
              --candidate-sha "$(git rev-parse HEAD)"
