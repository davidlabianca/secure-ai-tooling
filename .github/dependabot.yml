version: 2
updates:
  # Python (pip) - requirements.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    assignees:
      - "davidlabianca"
      - "shrey-bagga"
    labels: ["dependencies", "python", "security"]
    commit-message:
      prefix: "deps(python)"
    groups:
      major:
        update-types:
          - "major"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Node.js (npm) - package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    assignees:
      - "davidlabianca"
      - "shrey-bagga"
    labels: ["dependencies", "node", "security"]
    commit-message:
      prefix: "deps(node)"
    groups:
      major:
        update-types:
          - "major"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions - .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    assignees:
      - "davidlabianca"
      - "shrey-bagga"
    labels: ["dependencies", "ci/cd", "security"]
    commit-message:
      prefix: "deps(actions)"
    groups:
      major:
        update-types:
          - "major"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker - .devcontainer/Dockerfile
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    assignees:
      - "davidlabianca"
      - "shrey-bagga"
    labels: ["dependencies", "infrastructure", "security"]
    commit-message:
      prefix: "deps(docker)"
    groups:
      major:
        update-types:
          - "major"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Devcontainer features - .devcontainer/devcontainer.json
  - package-ecosystem: "devcontainers"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    assignees:
      - "davidlabianca"
      - "shrey-bagga"
    labels: ["dependencies", "infrastructure", "security"]
    commit-message:
      prefix: "deps(devcontainer)"
    groups:
      major:
        update-types:
          - "major"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
