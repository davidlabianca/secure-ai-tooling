name: New Risk Proposal
description: Propose a new AI security risk for the CoSAI Risk Map
title: '[Risk]: '
labels: ['risk', 'new-risk']
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a New Risk
        Use this template to suggest a new AI security risk for the framework.

        📋 **Before you submit**: Read the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) to understand the quality bar and see [Common Review Findings](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/common-review-findings.md) to avoid the most frequent rework requests.

        **Required fields** are marked with an asterisk (*).

  - type: input
    id: risk-title
    attributes:
      label: Risk Title*
      description: |
        A concise noun phrase (2-5 words) naming the threat. The ID is mechanically derived from this title.

        📋 See the [Risk Titles Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/risk-titles-style-guide.md) for naming rules.
      placeholder: 'e.g., Membership Inference'
    validations:
      required: true

  - type: textarea
    id: risk-short-description
    attributes:
      label: Short Description*
      description: |
        One or two sentence summary of the risk (1-2 sentences)

        This appears in risk summary tables and overviews
      placeholder: 'Brief description of the risk, its cause, and primary impact...'
    validations:
      required: true

  - type: textarea
    id: risk-long-description
    attributes:
      label: Long Description*
      description: |
        Comprehensive explanation of the risk (multiple paragraphs)

        Include:
        - Detailed description of the attack/vulnerability
        - How it occurs and attack vectors
        - Potential impact and consequences
        - Known real-world examples or research
      placeholder: |
        Paragraph 1: Detailed description of what this risk entails...

        Paragraph 2: How this risk manifests and attack vectors...

        Paragraph 3: Impact and consequences...
    validations:
      required: true

  - type: dropdown
    id: risk-category
    attributes:
      label: Risk Category*
      description: Primary category this risk belongs to
      options:
        - risksSupplyChainAndDevelopment
        - risksDeploymentAndInfrastructure
        - risksRuntimeInputSecurity
        - risksRuntimeDataSecurity
        - risksRuntimeOutputSecurity
    validations:
      required: true

  - type: checkboxes
    id: personas
    attributes:
      label: Applicable Personas*
      description: |
        Which personas are **impacted by** this risk? (Risks list the personas harmed, not the personas who implement defenses.)

        Note: `personaGovernance` is a controls-only persona and is not listed here. `personaEndUser` applies to most risks.
      options:
        - label: personaModelProvider
        - label: personaDataProvider
        - label: personaPlatformProvider
        - label: personaModelServing
        - label: personaAgenticProvider
        - label: personaApplicationDeveloper
        - label: personaEndUser

  - type: textarea
    id: controls
    attributes:
      label: Applicable Controls*
      description: |
        ⚠️ **IMPORTANT - Automatic Bidirectional Mapping**: When you list controls here, those controls will automatically have this risk added to their mitigated risks. No need to update both sides manually.

        Control IDs that mitigate this risk (one per line)

        📋 [View control list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/controls-summary.md)
      placeholder: |
        controlModelAndDataAccessControls
        controlThreatDetection
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples (Optional)
      description: |
        Real-world examples, research papers, or case studies demonstrating this risk

        Can include HTML links: <a href="URL">description</a>
      placeholder: |
        Researchers demonstrated this attack in [paper/case study]...

        <a href="https://arxiv.org/..." target="_blank" rel="noopener">Research paper title</a>

  - type: textarea
    id: relevant-questions
    attributes:
      label: Relevant Questions (Optional)
      description: |
        Key questions organizations should ask when assessing this risk (one per line)
      placeholder: |
        How is training data sourced and validated?
        What access controls are in place for model storage?
        Are there monitoring systems to detect anomalous behavior?

  - type: textarea
    id: external-mapping
    attributes:
      label: Framework Mappings (Optional)
      description: |
        Map this risk to external security frameworks by listing relevant technique/attack IDs.
        Enter one ID per line. Format: `framework-id: mapping-value`

        Valid frameworks for risks include: mitre-atlas, stride, owasp-top10-llm. Risks use MITRE ATLAS **techniques** (`AML.T####`), not mitigations.

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework rules.
      placeholder: |
        mitre-atlas: AML.T0051
        stride: information-disclosure
        owasp-top10-llm: LLM01

  - type: checkboxes
    id: lifecycle-stage
    attributes:
      label: Lifecycle Stages (Optional)
      description: Which AI system lifecycle phases does this risk apply to?
      options:
        - label: planning
        - label: data-preparation
        - label: model-training
        - label: development
        - label: evaluation
        - label: deployment
        - label: runtime
        - label: maintenance

  - type: checkboxes
    id: impact-type
    attributes:
      label: Impact Types (Optional)
      description: What types of security/safety impacts does this risk create?
      options:
        - label: confidentiality
        - label: integrity
        - label: availability
        - label: privacy
        - label: safety
        - label: compliance
        - label: fairness
        - label: accountability
        - label: reliability
        - label: transparency

  - type: checkboxes
    id: actor-access
    attributes:
      label: Actor Access Levels (Optional)
      description: What threat actor access levels can exploit this risk?
      options:
        - label: external
        - label: api
        - label: user
        - label: privileged
        - label: agent
        - label: supply-chain
        - label: infrastructure-provider
        - label: service-provider
        - label: physical

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any additional information, references, or considerations
      placeholder: 'Provide additional context, related risks, mitigation strategies, etc.'

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have reviewed existing risks to ensure this is not a duplicate
          required: true
        - label: I have read the Submission Readiness Guide and believe my proposal meets the quality bar
          required: true
