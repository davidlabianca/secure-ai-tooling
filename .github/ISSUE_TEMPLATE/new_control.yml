# ADR-content alignment manifest
# This template teaches/solicits conventions from:
#   - ADR-016: externalReferences field shape; sentinel grammar ({{ref:identifier}}, {{controlXxx}})
#   - ADR-017 D1: allowed prose authoring tokens
#   - ADR-022 D5b: canonical framework mapping value forms
name: New Control Proposal
description: Propose a new security control for the CoSAI Risk Map
title: '[Control]: '
labels: ['control', 'new-control']
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a New Control
        Use this template to suggest a new security control for the AI risk framework.

        📋 **Before you submit**: Read the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) to understand the quality bar and see [Common Review Findings](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/common-review-findings.md) to avoid the most frequent rework requests.

        **Required fields** are marked with an asterisk (*).

  - type: input
    id: control-title
    attributes:
      label: Control Title*
      description: |
        A concise noun phrase naming the defense. The ID is mechanically derived from this title.

        📋 See the [Control Titles Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/control-titles-style-guide.md) for naming rules.
      placeholder: 'e.g., Prompt Isolation'
    validations:
      required: true

  - type: textarea
    id: control-description
    attributes:
      label: Control Description*
      description: |
        Detailed explanation of what the control does and how it mitigates risks.

        Cross-reference related framework entities using sentinels, e.g. {{controlInputValidationAndSanitization}} or {{riskPromptInjection}}.
        Outbound citations go in External References below and are cited via {{ref:identifier}}.
      placeholder: "Describe the control's purpose, implementation approach, and expected outcomes..."
    validations:
      required: true

  - type: dropdown
    id: control-category
    attributes:
      label: Control Category*
      description: Primary category this control belongs to
      options:
        - controlsData
        - controlsInfrastructure
        - controlsModel
        - controlsApplication
        - controlsAssurance
        - controlsGovernance
    validations:
      required: true

  - type: checkboxes
    id: personas
    attributes:
      label: Applicable Personas*
      description: Which personas should implement this control?
      options:
        - label: personaModelProvider
        - label: personaDataProvider
        - label: personaPlatformProvider
        - label: personaModelServing
        - label: personaAgenticProvider
        - label: personaApplicationDeveloper
        - label: personaGovernance
        - label: personaEndUser

  - type: textarea
    id: components
    attributes:
      label: Applicable Components*
      description: |
        List component IDs this control applies to (one per line), or use "all" or "none"

        📋 [View full component list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/components-summary.md)

        Common components: componentDataSources, componentTrainingData, componentModelServing, componentModelStorage, componentOutputHandling, etc.
      placeholder: |
        componentDataSources
        componentTrainingData
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Mitigated Risks*
      description: |
        ⚠️ **IMPORTANT - Automatic Bidirectional Mapping**: When you list risks here, those risks will automatically have this control added to their applicable controls. No need to update both sides manually.

        List risk IDs this control addresses (one per line), or use "all"

        📋 [View full risk list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/risks-summary.md)

        Common risks: riskDataPoisoning, riskModelSourceTampering, riskPromptInjection, riskSensitiveDataDisclosure, etc.
      placeholder: |
        riskDataPoisoning
        riskUnauthorizedTrainingData
    validations:
      required: true

  - type: textarea
    id: external-mapping
    attributes:
      label: Framework Mappings (Optional)
      description: |
        Map this control to external security frameworks by listing relevant mitigation or control IDs.
        Enter one ID per line. Format: `framework-id: mapping-value`

        Valid frameworks for controls include: mitre-atlas, nist-ai-rmf, owasp-top10-llm, eu-ai-act. Controls use MITRE ATLAS **mitigations** (`AML.M####`), not techniques.

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework rules.
      placeholder: |
        mitre-atlas: AML.M0007@5.0.1
        nist-ai-rmf: GOVERN-6.2@1.0

  - type: textarea
    id: external-references
    attributes:
      label: External References (Optional)
      description: |
        Structured outbound citations and editorial pointers for this control. Each entry populates
        the `externalReferences` array in the YAML. Prose fields cite an entry via the sentinel
        {{ref:identifier}}, where `identifier` matches the entry's `id` field.

        Per-entry shape (YAML):
          type: <enum>   # cwe, cve, atlas, attack, advisory, paper, news, spec, editorial, other
          id: <string>   # author-chosen sentinel target; canonical-form for cwe/cve/atlas/attack
          title: <string>
          url: https://...  # https only

        Canonical id examples: cwe-89, cve-2024-0001, aml-t0040.001, attack-t1059.003.

        Example entry:
          - type: spec
            id: nist-sp-800-218
            title: NIST SP 800-218 Secure Software Development Framework
            url: https://csrc.nist.gov/publications/detail/sp/800-218/final
      placeholder: |
        - type: spec
          id: example-spec
          title: Title of the specification
          url: https://example.com/spec/...

  - type: checkboxes
    id: lifecycle-stage
    attributes:
      label: Lifecycle Stages (Optional)
      description: Which AI system lifecycle phases does this control apply to?
      options:
        - label: planning
        - label: data-preparation
        - label: model-training
        - label: development
        - label: evaluation
        - label: deployment
        - label: runtime
        - label: maintenance

  - type: checkboxes
    id: impact-type
    attributes:
      label: Impact Types (Optional)
      description: What types of security/safety impacts does this control address?
      options:
        - label: confidentiality
        - label: integrity
        - label: availability
        - label: privacy
        - label: safety
        - label: compliance
        - label: fairness
        - label: accountability
        - label: reliability
        - label: transparency

  - type: checkboxes
    id: actor-access
    attributes:
      label: Actor Access Levels (Optional)
      description: What threat actor access levels does this control defend against?
      options:
        - label: external
        - label: api
        - label: user
        - label: privileged
        - label: agent
        - label: supply-chain
        - label: infrastructure-provider
        - label: service-provider
        - label: physical

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any additional information, use cases, or implementation considerations
      placeholder: 'Provide examples, related standards, implementation challenges, etc.'

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have reviewed existing controls to ensure this is not a duplicate
          required: true
        - label: I have read the Submission Readiness Guide and believe my proposal meets the quality bar
          required: true
