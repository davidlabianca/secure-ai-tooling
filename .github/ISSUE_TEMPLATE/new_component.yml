# ADR-content alignment manifest
# This template teaches/solicits conventions from:
#   - ADR-016: externalReferences field shape; sentinel grammar ({{ref:identifier}}, {{componentXxx}})
#   - ADR-017 D1: allowed prose authoring tokens
#   - ADR-018: components schema (category, description, edge fields)
#   - ADR-018 D3: component edge bidirectionality (downstream/upstream edge convention)
#   - ADR-018 D6: framework mappings field
#   - ADR-022 D5b: canonical framework mapping value forms
name: New Component Proposal
description: Propose a new AI system component for the CoSAI Risk Map
title: '[Component]: '
labels: ['component', 'new-component']
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a New Component
        Use this template to suggest a new AI system component for the risk framework.

        📋 **Before you submit**: Read the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) to understand the quality bar.

        **Required fields** are marked with an asterisk (*).

        ⚠️ **Important**: Component edges must be bidirectional. If you add `A → B`, then `B ← A` must also exist.

  - type: input
    id: component-title
    attributes:
      label: Component Title*
      description: |
        A concise, human-readable name for the component. The ID is mechanically derived from this title.

        📋 See the [Component Titles Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/component-titles-style-guide.md) for naming rules.
      placeholder: 'e.g., Prompt Cache'
    validations:
      required: true

  - type: textarea
    id: component-description
    attributes:
      label: Component Description*
      description: |
        Detailed explanation of what this component represents in the AI system.

        Describe its purpose, role, and how it fits into the broader architecture.
        Cross-reference related framework entities using sentinels, e.g. {{componentModelServing}}.
        Outbound citations go in External References below and are cited via {{ref:identifier}}.
      placeholder: "Describe the component's function, purpose, and architectural role..."
    validations:
      required: true

  - type: dropdown
    id: component-category-subcategory
    attributes:
      label: Component Category and Subcategory*
      description: |
        Select the category and subcategory that best describes this component.
        Each option encodes both values as "<category-id>: <subcategory-id>".
        Splitting on ": " yields the category and subcategory field values directly (ADR-026 D8).
      options:
        - "componentsInfrastructure: componentsData"
        - "componentsInfrastructure: componentsModelDeployment"
        - "componentsInfrastructure: componentsRegistries"
        - "componentsModel: componentsModelTraining"
        - "componentsModel: componentsModelCore"
        - "componentsModel: componentsOrchestration"
        - "componentsApplication: componentsAgent"
        - "componentsApplication: componentsApplicationCore"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Component Relationships*

        Define how this component connects to other components in the system.

        ✨ **Automatic Bidirectionality**: When you specify edges, the reverse edges are automatically created.
        - If you add `componentB` in "Edges To", then `componentB` will automatically get an "Edges From" entry for this component
        - If you add `componentA` in "Edges From", then `componentA` will automatically get an "Edges To" entry for this component

        📋 [View component list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/components-summary.md)

  - type: textarea
    id: edges-to
    attributes:
      label: Edges To (Downstream)*
      description: |
        Components that this component flows TO (one per line)

        These are components that receive data/control flow FROM this component
      placeholder: |
        componentOutputHandling
        componentModelServing
    validations:
      required: true

  - type: textarea
    id: edges-from
    attributes:
      label: Edges From (Upstream)*
      description: |
        Components that flow TO this component (one per line)

        These are components that send data/control flow TO this component
      placeholder: |
        componentInputHandling
        componentDataSources
    validations:
      required: true

  - type: textarea
    id: framework-mappings
    attributes:
      label: Framework Mappings (Optional)
      description: |
        Map this component to external framework classifications. Each entry maps a framework ID
        (per `frameworks.schema.json`) to a framework-specific identifier.
        Format: `framework-id: mapping-value`

        No framework currently declares `applicableTo: components`. Leave this blank unless you are
        submitting alongside a framework update that activates a component-side mapping.

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework value forms.
      placeholder: |
        # Leave blank unless a framework declares applicableTo: components.

  - type: textarea
    id: external-references
    attributes:
      label: External References (Optional)
      description: |
        Structured outbound citations and editorial pointers for this component. Each entry populates
        the `externalReferences` array in the YAML. Prose fields cite an entry via the sentinel
        {{ref:identifier}}, where `identifier` matches the entry's `id` field.

        Per-entry shape (YAML):
          type: <enum>   # cwe, cve, atlas, attack, advisory, paper, news, spec, editorial, other
          id: <string>   # author-chosen sentinel target; canonical-form for cwe/cve/atlas/attack
          title: <string>
          url: https://...  # https only

        Canonical id examples: cwe-89, cve-2024-0001, aml-t0040.001, attack-t1059.003.

        Example entry:
          - type: spec
            id: example-spec
            title: Title of the specification or standard
            url: https://example.com/spec/...
      placeholder: |
        - type: editorial
          id: example-reference
          title: Title of the reference
          url: https://example.com/...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Any additional information about this component

        Include use cases, examples, architectural diagrams, or implementation details
      placeholder: 'Provide examples, architectural context, related components, etc.'

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have reviewed existing components to ensure this is not a duplicate
          required: true
        - label: I have read the Submission Readiness Guide and believe my proposal meets the quality bar
          required: true
