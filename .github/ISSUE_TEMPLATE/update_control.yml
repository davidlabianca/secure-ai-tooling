# ADR-content alignment manifest
# This template teaches/solicits conventions from:
#   - ADR-016: externalReferences field shape; sentinel grammar ({{ref:identifier}}, {{controlXxx}})
#   - ADR-017 D1: allowed prose authoring tokens
#   - ADR-022 D5b: canonical framework mapping value forms
name: Update Existing Control
description: Propose updates to an existing security control in the CoSAI Risk Map
title: '[Update Control]: '
labels: ['control', 'update-control']
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Control

        Use this template to propose changes to an existing control. Only fill out the sections relevant to your proposed changes.

        📋 **Before you submit**: Skim the [Submission Readiness Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/submission-readiness-guide.md) — the same persona, universal-control, and framework-mapping rules apply to updates.

  - type: input
    id: control-permalink
    attributes:
      label: Control Permalink*
      description: |
        GitHub permalink to the control in controls.yaml (right-click line number → Copy permalink)

        📋 [Browse controls.yaml](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/yaml/controls.yaml)
      placeholder: 'https://github.com/org/repo/blob/abc123/risk-map/yaml/controls.yaml#L45-L52'
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Change Type*
      description: What type of change are you proposing?
      options:
        - Update description/title (clarification or correction)
        - Add mappings (components, risks, frameworks)
        - Remove mappings (components, risks, frameworks)
        - Change category or personas
        - Add metadata (lifecycle, impact type, actor access)
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: proposed-changes
    attributes:
      label: Proposed Changes*
      description: |
        Describe what you want to change and why. Be specific about what should be added, removed, or modified.

        **Examples:**
        - "Update description to clarify that this control also applies to fine-tuning scenarios"
        - "Add componentModelEvaluation to components list - this control is relevant during evaluation phase"
        - "Remove riskPromptInjection from risks - this control doesn't effectively mitigate prompt injection"
        - "Add MITRE ATLAS mapping AML.M0015 (Adversarial Input Detection)"

        Cross-reference framework entities using sentinels, e.g. {{controlInputValidationAndSanitization}} or {{riskPromptInjection}}.
        Outbound citations go in External Reference Changes below and are cited via {{ref:identifier}}.
      placeholder: |
        Current state: [what it says now]
        Proposed change: [what it should say]
        Rationale: [why this change improves the control]
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## Quick Add/Remove (Optional)

        Use these fields for quick additions or removals. Prefix with `+` to add, `-` to remove.
        Leave blank if not applicable.

  - type: textarea
    id: components
    attributes:
      label: Component Changes
      description: |
        Add or remove component IDs. Use `+` to add, `-` to remove (one per line)

        📋 [View component list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/components-summary.md)
      placeholder: |
        + componentModelEvaluation
        + componentOutputHandling
        - componentDataSources

  - type: textarea
    id: risks
    attributes:
      label: Risk Changes
      description: |
        Add or remove risk IDs. Use `+` to add, `-` to remove (one per line)

        ✨ **Automatic Cross-Mapping**: Risk mappings are automatically bidirectional. When you add/remove risks here, the reverse control mappings are automatically updated in those risks.

        📋 [View risk list](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/tables/risks-summary.md)
      placeholder: |
        + riskModelEvasion
        + riskInsecureIntegratedComponent
        - riskPromptInjection

  - type: textarea
    id: framework-mappings
    attributes:
      label: Framework Mapping Changes
      description: |
        Add or remove framework mappings. Use `+` to add, `-` to remove.
        Format: `+/- framework-id: mapping-value`

        Valid frameworks for controls: mitre-atlas, nist-ai-rmf, owasp-top10-llm, eu-ai-act. Controls use MITRE ATLAS **mitigations** (`AML.M####`).

        📋 See the [Framework Mappings Style Guide](https://github.com/cosai-oasis/secure-ai-tooling/blob/main/risk-map/docs/contributing/framework-mappings-style-guide.md) for per-framework rules.
      placeholder: |
        + mitre-atlas: AML.M0015
        + nist-ai-rmf: GOVERN-4.1
        - mitre-atlas: AML.M0007

  - type: textarea
    id: external-references
    attributes:
      label: External Reference Changes
      description: |
        Add or remove structured outbound citations for this control. Each entry populates or removes
        an entry in the `externalReferences` array in the YAML. Prose fields cite an entry via the
        sentinel {{ref:identifier}}, where `identifier` matches the entry's `id` field.

        Per-entry shape (YAML):
          type: <enum>   # cwe, cve, atlas, attack, advisory, paper, news, spec, editorial, other
          id: <string>   # author-chosen sentinel target; canonical-form for cwe/cve/atlas/attack
          title: <string>
          url: https://...  # https only

        Canonical id examples: cwe-89, cve-2024-0001, aml-t0040.001, attack-t1059.003.

        Example entry:
          - type: spec
            id: nist-sp-800-218
            title: NIST SP 800-218 Secure Software Development Framework
            url: https://csrc.nist.gov/publications/detail/sp/800-218/final
      placeholder: |
        + type: paper
          id: new-research-paper
          title: Title of relevant research
          url: https://arxiv.org/abs/...

  - type: textarea
    id: supporting-evidence
    attributes:
      label: Supporting Evidence
      description: |
        Links to discussions, references, standards, or other evidence supporting this change
      placeholder: |
        - NIST AI RMF section 3.2.1 describes this mitigation approach
        - Discussion in issue #123
        - Reference implementation: https://example.com/control-impl

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have provided a valid GitHub permalink to the control
          required: true
        - label: My proposed changes conform to the Submission Readiness Guide
          required: true
